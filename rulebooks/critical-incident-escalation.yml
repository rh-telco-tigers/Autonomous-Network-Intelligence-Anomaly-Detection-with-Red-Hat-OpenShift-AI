---
- name: Escalate selected critical incidents after RCA
  hosts: localhost
  sources:
    - eda.builtin.webhook:
        host: 0.0.0.0
        port: 5000
  rules:
    - name: Escalate critical incidents for coordination
      condition: >-
        event.payload.event_type == "rca_attached" and
        event.payload.severity == "Critical" and
        event.payload.anomaly_type in ["authentication_failure", "server_internal_error", "network_degradation"] and
        event.payload.status not in ["ESCALATED", "VERIFIED", "CLOSED"]
      action:
        run_playbook:
          name: automation/eda/playbooks/transition-incident-state.yml
          extra_vars:
            control_plane_url: "{{ control_plane_url }}"
            control_plane_api_key: "{{ control_plane_api_key }}"
            incident_id: "{{ event.payload.incident_id }}"
            approved_by: "{{ approved_by }}"
            target_state: ESCALATED
            source_url: "{{ source_url }}"
            notes: >-
              EDA policy {{ policy_name | default('critical_incident_escalation') }}
              escalated {{ event.payload.anomaly_type }} because RCA is attached
              and the incident remains critical.
