<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IMS Operations Console</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ink: "#0b1220",
            panel: "#101827",
            panel2: "#0f172a",
            line: "#1f2937",
            muted: "#94a3b8",
            success: "#10b981",
            warn: "#f59e0b",
            danger: "#ef4444",
            accent: "#38bdf8"
          },
          boxShadow: {
            soft: "0 10px 30px rgba(2,6,23,.25)"
          }
        }
      }
    };
  </script>
  <style>
    html { scroll-behavior: smooth; }
    body { background: #020617; }
    .glass { background: linear-gradient(180deg, rgba(15,23,42,.92), rgba(15,23,42,.82)); backdrop-filter: blur(10px); }
    .grid-lines {
      background-image: linear-gradient(rgba(148,163,184,.05) 1px, transparent 1px), linear-gradient(90deg, rgba(148,163,184,.05) 1px, transparent 1px);
      background-size: 28px 28px;
    }
    .mini-scroll::-webkit-scrollbar { width: 10px; height: 10px; }
    .mini-scroll::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 999px; }
    .traffic-line:nth-child(odd) { background: rgba(15,23,42,.6); }
  </style>
</head>
<body class="text-slate-100 antialiased">
  <div class="min-h-screen grid lg:grid-cols-[280px_minmax(0,1fr)]">
    <aside class="border-r border-slate-800 bg-slate-950/95 lg:sticky lg:top-0 lg:h-screen">
      <div class="p-5 border-b border-slate-800">
        <div class="flex items-center gap-3">
          <div class="h-11 w-11 rounded-2xl bg-sky-500/15 ring-1 ring-sky-400/30 flex items-center justify-center text-sky-300 font-bold">IMS</div>
          <div>
            <div class="text-xs uppercase tracking-[0.25em] text-slate-500">Operations Console</div>
            <div class="text-xl font-semibold">Anomaly Center</div>
          </div>
        </div>
      </div>

      <div class="p-4 space-y-2 text-sm">
        <button id="nav-overview" class="nav-btn w-full flex items-center justify-between rounded-2xl px-4 py-3" onclick="activateSection('overview')">
          <span>Overview</span><span class="text-xs">01</span>
        </button>
        <button id="nav-incidents" class="nav-btn w-full flex items-center justify-between rounded-2xl px-4 py-3" onclick="activateSection('incidents')">
          <span>Incidents</span><span class="text-xs">02</span>
        </button>
        <button id="nav-traffic" class="nav-btn w-full flex items-center justify-between rounded-2xl px-4 py-3" onclick="activateSection('traffic')">
          <span>Live Traffic</span><span class="text-xs">03</span>
        </button>
        <button id="nav-rca" class="nav-btn w-full flex items-center justify-between rounded-2xl px-4 py-3" onclick="activateSection('rca')">
          <span>RCA Analysis</span><span class="text-xs">04</span>
        </button>
        <button id="nav-models" class="nav-btn w-full flex items-center justify-between rounded-2xl px-4 py-3" onclick="activateSection('models')">
          <span>Models</span><span class="text-xs">05</span>
        </button>
        <button id="nav-services" class="nav-btn w-full flex items-center justify-between rounded-2xl px-4 py-3" onclick="activateSection('services')">
          <span>Services</span><span class="text-xs">06</span>
        </button>
        <button id="nav-audit" class="nav-btn w-full flex items-center justify-between rounded-2xl px-4 py-3" onclick="activateSection('audit')">
          <span>Audit</span><span class="text-xs">07</span>
        </button>
      </div>

      <div class="px-4 pb-4">
        <div class="rounded-3xl border border-slate-800 bg-slate-900 p-4 shadow-soft">
          <div class="text-xs uppercase tracking-[0.2em] text-slate-500">Current cluster</div>
          <div class="mt-2 flex items-center justify-between gap-4">
            <div class="min-w-0">
              <div id="clusterName" class="font-semibold">ims-demo-lab</div>
              <div id="clusterSubtitle" class="text-sm text-slate-400">Waiting for service health</div>
            </div>
            <span id="clusterStatusBadge" class="rounded-full border border-slate-700 bg-slate-950 px-2.5 py-1 text-xs text-slate-300">Loading</span>
          </div>
          <div class="mt-4 space-y-2 text-xs text-slate-400">
            <div class="flex justify-between gap-3"><span>Active incident</span><span id="clusterActiveIncident" class="text-slate-200 truncate">none</span></div>
            <div class="flex justify-between gap-3"><span>Auto refresh</span><span id="clusterAutoRefresh" class="text-slate-200">on</span></div>
            <div class="flex justify-between gap-3"><span>RCA status</span><span id="clusterRcaStatus" class="text-slate-200">none</span></div>
          </div>
          <label for="apiToken" class="mt-4 block text-xs uppercase tracking-[0.2em] text-slate-500">API token</label>
          <input id="apiToken" class="mt-2 w-full rounded-2xl border border-slate-800 bg-slate-950 px-4 py-3 text-sm text-slate-100 outline-none placeholder:text-slate-500" value="demo-token" placeholder="demo-token" />
        </div>
      </div>
    </aside>

    <main class="min-w-0 grid-lines">
      <div class="sticky top-0 z-20 border-b border-slate-800/80 bg-slate-950/75 backdrop-blur">
        <div class="px-4 md:px-8 py-4 flex flex-col gap-4 xl:flex-row xl:items-center xl:justify-between">
          <div>
            <div class="text-xs uppercase tracking-[0.25em] text-slate-500">Admin-grade workflow</div>
            <h1 id="pageTitle" class="text-2xl md:text-3xl font-semibold tracking-tight">Overview</h1>
          </div>
          <div class="flex flex-wrap items-center gap-3">
            <div id="lastRefreshBadge" class="rounded-2xl border border-slate-800 bg-slate-900 px-4 py-2 text-sm text-slate-300">Last refresh: waiting</div>
            <div id="currentScenarioBadge" class="rounded-2xl border border-slate-800 bg-slate-900 px-4 py-2 text-sm text-slate-300">Scenario: none</div>
            <button id="refreshButton" class="rounded-2xl bg-sky-500 px-4 py-2 text-sm font-medium text-slate-950" onclick="refreshDashboard()">Refresh now</button>
            <button id="autoRefreshButton" class="rounded-2xl border border-slate-800 bg-slate-900 px-4 py-2 text-sm text-slate-200" onclick="toggleAutoRefresh()">Auto refresh: on</button>
          </div>
        </div>
      </div>

      <div class="px-4 md:px-8 py-6 space-y-8">
        <div id="globalNotice"></div>
        <section id="overview" class="app-section space-y-6"></section>
        <section id="incidents" class="app-section hidden"></section>
        <section id="traffic" class="app-section hidden"></section>
        <section id="rca" class="app-section hidden"></section>
        <section id="models" class="app-section hidden"></section>
        <section id="services" class="app-section hidden"></section>
        <section id="audit" class="app-section hidden"></section>
      </div>
    </main>
  </div>

  <script>
    const controlPlaneService = window.location.origin.replace("demo-ui", "control-plane");
    const defaultToken = "demo-token";
    const defaultProject = "ims-demo";
    const sectionTitles = {
      overview: "Overview",
      incidents: "Incidents",
      traffic: "Live Traffic",
      rca: "RCA Analysis",
      models: "Models",
      services: "Services",
      audit: "Audit"
    };
    const storageKeys = {
      autoRefresh: "ims-console-auto-refresh",
      lastRun: "ims-console-last-run"
    };

    const state = {
      section: "overview",
      selectedIncidentId: null,
      selectedIncidentTab: "summary",
      autoRefresh: readBool(storageKeys.autoRefresh, true),
      console: null,
      lastRun: readJson(storageKeys.lastRun, null),
      refreshTimer: null,
      loading: false,
      error: ""
    };

    function readJson(key, fallback) {
      try {
        const raw = window.localStorage.getItem(key);
        return raw ? JSON.parse(raw) : fallback;
      } catch (error) {
        return fallback;
      }
    }

    function readBool(key, fallback) {
      const value = readJson(key, fallback);
      return typeof value === "boolean" ? value : fallback;
    }

    function writeJson(key, value) {
      try {
        window.localStorage.setItem(key, JSON.stringify(value));
      } catch (error) {
        // Best effort only.
      }
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll("\"", "&quot;")
        .replaceAll("'", "&#39;");
    }

    function humanize(value) {
      return String(value ?? "unknown").replaceAll("_", " ").trim();
    }

    function titleize(value) {
      return humanize(value).replace(/\b\w/g, (match) => match.toUpperCase());
    }

    function round(value, digits = 2) {
      const numeric = Number(value || 0);
      if (!Number.isFinite(numeric)) {
        return 0;
      }
      return Number(numeric.toFixed(digits));
    }

    function toNumber(value, fallback = 0) {
      const numeric = Number(value);
      return Number.isFinite(numeric) ? numeric : fallback;
    }

    function formatTime(value) {
      if (!value) {
        return "unknown";
      }
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) {
        return String(value);
      }
      return date.toLocaleString();
    }

    function formatClock(dateLike) {
      const date = dateLike instanceof Date ? dateLike : new Date(dateLike);
      if (Number.isNaN(date.getTime())) {
        return "00:00:00";
      }
      return date.toLocaleTimeString([], { hour12: false });
    }

    function formatScore(value) {
      return toNumber(value).toFixed(2);
    }

    function formatCount(value) {
      return new Intl.NumberFormat().format(Math.round(toNumber(value)));
    }

    function toneClasses(tone) {
      if (tone === "rose") {
        return { badge: "bg-rose-500/15 text-rose-300", border: "border-rose-400/20", soft: "bg-rose-500/10" };
      }
      if (tone === "amber") {
        return { badge: "bg-amber-500/15 text-amber-300", border: "border-amber-400/20", soft: "bg-amber-500/10" };
      }
      if (tone === "emerald") {
        return { badge: "bg-emerald-500/15 text-emerald-300", border: "border-emerald-400/20", soft: "bg-emerald-500/10" };
      }
      return { badge: "bg-sky-500/15 text-sky-300", border: "border-sky-400/20", soft: "bg-sky-500/10" };
    }

    function navButtonClass(active) {
      return active
        ? "nav-btn w-full flex items-center justify-between rounded-2xl px-4 py-3 bg-sky-500/10 text-sky-300 ring-1 ring-sky-400/30"
        : "nav-btn w-full flex items-center justify-between rounded-2xl px-4 py-3 hover:bg-slate-900 text-slate-300 ring-1 ring-transparent hover:ring-slate-800";
    }

    function authHeaders() {
      const input = document.getElementById("apiToken");
      const token = (input.value.trim() || defaultToken);
      input.value = token;
      return {
        "Content-Type": "application/json",
        "x-api-key": token
      };
    }

    async function fetchJson(url, options = {}, allowRetry = true) {
      const response = await fetch(url, options);
      const raw = await response.text();
      let payload;
      try {
        payload = raw ? JSON.parse(raw) : null;
      } catch (error) {
        payload = raw;
      }

      if (response.status === 401 && allowRetry) {
        document.getElementById("apiToken").value = defaultToken;
        return fetchJson(
          url,
          {
            ...options,
            headers: {
              ...(options.headers || {}),
              "x-api-key": defaultToken
            }
          },
          false
        );
      }

      if (!response.ok) {
        const detail = typeof payload === "string" ? payload : JSON.stringify(payload);
        throw new Error(`${response.status} ${response.statusText}: ${detail}`);
      }

      return payload;
    }

    function consoleState() {
      return state.console || {
        cluster: {
          name: "ims-demo-lab",
          status: "unknown",
          active_incident_id: null,
          rca_status: "none",
          current_scenario: "none",
          auto_refresh_seconds: 5
        },
        summary: {
          incident_count: 0,
          open_incidents: 0,
          critical_incidents: 0,
          latest_score: 0,
          healthy_services: 0,
          service_count: 0
        },
        incidents: [],
        audit: [],
        approvals: [],
        models: { models: [] },
        services: [],
        integrations: {},
        automation_actions: [],
        traffic_preview: { rows: [], stats: { requests_per_second: 0, retry_ratio: 0, active_node: "pcscf-1" }, packet_sample: "" }
      };
    }

    function autoRefreshSeconds() {
      const seconds = Math.floor(toNumber(consoleState().cluster.auto_refresh_seconds, 5));
      return seconds > 0 ? seconds : 5;
    }

    function ensureSelectedIncident() {
      const incidents = consoleState().incidents || [];
      if (!incidents.length) {
        state.selectedIncidentId = null;
        return null;
      }
      if (!state.selectedIncidentId || !incidents.some((incident) => incident.id === state.selectedIncidentId)) {
        state.selectedIncidentId = incidents[0].id;
      }
      return incidents.find((incident) => incident.id === state.selectedIncidentId) || incidents[0];
    }

    function selectedIncident() {
      return ensureSelectedIncident();
    }

    function latestScenarioLabel() {
      if (state.lastRun && state.lastRun.scenario) {
        return titleize(state.lastRun.scenario);
      }
      return titleize(consoleState().cluster.current_scenario || "none");
    }

    function latestScenarioStatus() {
      if (state.loading) {
        return "Executing scenario through feature generation, scoring, and RCA.";
      }
      if (state.lastRun && state.lastRun.score) {
        if (state.lastRun.score.is_anomaly) {
          return `${titleize(state.lastRun.scenario)} recorded anomaly score ${formatScore(state.lastRun.score.anomaly_score)} and incident ${escapeHtml(String(state.lastRun.score.incident_id || "").slice(0, 12))}...`;
        }
        return `${titleize(state.lastRun.scenario)} completed without recording an incident.`;
      }
      return "No scenario executed in this browser session.";
    }

    function metricSeries(incidents, key) {
      const values = incidents
        .slice(0, 6)
        .reverse()
        .map((incident) => toNumber((incident.feature_snapshot || {})[key], 0));
      if (values.length) {
        return values;
      }
      const lastWindow = state.lastRun && state.lastRun.feature_window ? state.lastRun.feature_window : null;
      if (lastWindow && lastWindow.features) {
        const value = toNumber(lastWindow.features[key], 0);
        return [value, value, value, value, value, value];
      }
      return [0, 0, 0, 0, 0, 0];
    }

    function renderBars(values, toneClass) {
      const maximum = Math.max(...values, 1);
      return values.map((value) => {
        const height = Math.max(12, Math.round((value / maximum) * 96));
        return `<div class="w-full rounded-t ${toneClass}" style="height:${height}px"></div>`;
      }).join("");
    }

    function renderLine(values, color) {
      const width = 320;
      const height = 120;
      const maximum = Math.max(...values, 1);
      const points = values.map((value, index) => {
        const x = (width / Math.max(values.length - 1, 1)) * index;
        const y = height - ((value / maximum) * (height - 18)) - 9;
        return `${Math.round(x)} ${Math.round(y)}`;
      }).join(" L");
      return `<svg viewBox="0 0 ${width} ${height}" class="mt-3 w-full h-28"><path d="M${points}" fill="none" stroke="${color}" stroke-width="4" /></svg>`;
    }

    function summarizePayload(payload) {
      if (!payload || typeof payload !== "object") {
        return "No details available.";
      }
      const entries = Object.entries(payload).slice(0, 6).map(([key, value]) => {
        const rendered = typeof value === "object" ? JSON.stringify(value) : String(value);
        return `${key}: ${rendered}`;
      });
      return entries.join("\n");
    }

    function auditTitle(eventType) {
      const mapping = {
        scenario_executed: "Scenario executed",
        incident_created: "Incident created",
        rca_attached: "RCA attached",
        incident_approved: "Action approved",
        slack_notified: "Slack notified",
        jira_created: "Jira ticket created",
        model_promoted: "Model promoted"
      };
      return mapping[eventType] || titleize(eventType);
    }

    function auditDetail(event) {
      const payload = event && event.payload && typeof event.payload === "object" ? event.payload : {};
      if (event.event_type === "scenario_executed") {
        return `${titleize(payload.scenario || "unknown")} window generated from ${payload.feature_source || "unknown"} and sent to scoring.`;
      }
      if (event.event_type === "incident_created") {
        return `${titleize(payload.anomaly_type || "unknown")} raised with score ${formatScore(payload.anomaly_score || 0)}.`;
      }
      if (event.event_type === "rca_attached") {
        return `RCA attached with confidence ${formatScore(payload.confidence || 0)}.`;
      }
      if (event.event_type === "incident_approved") {
        return `${titleize(payload.action || "unknown")} approved ${payload.execute ? "for execution" : "as recorded action"}.`;
      }
      if (event.event_type === "slack_notified") {
        return `Slack relay status: ${payload.status || "unknown"}.`;
      }
      if (event.event_type === "jira_created") {
        return `Jira issue ${payload.issue_key || "pending"} created.`;
      }
      if (event.event_type === "model_promoted") {
        return `Model ${payload.version || "unknown"} promoted to ${payload.stage || "prod"}.`;
      }
      const entries = Object.entries(payload).slice(0, 3);
      if (!entries.length) {
        return "No additional detail.";
      }
      return entries.map(([key, value]) => `${key}=${value}`).join(" · ");
    }

    function buildDerivedTrafficPreview(featureWindow) {
      if (!featureWindow) {
        return {
          scenario_name: "none",
          source: "none",
          rows: [],
          stats: { requests_per_second: 0, retry_ratio: 0, active_node: "pcscf-1" },
          packet_sample: ""
        };
      }

      const features = featureWindow.features || featureWindow;
      const scenarioName = featureWindow.scenario_name || featureWindow.anomaly_type || "normal";
      const latency = toNumber(features.latency_p95 ?? features.latency_p95_ms, 80);
      const registerRate = toNumber(features.register_rate);
      const inviteRate = toNumber(features.invite_rate);
      const byeRate = toNumber(features.bye_rate);
      const retransmissions = toNumber(features.retransmission_count);
      const requestsPerSecond = round(registerRate + inviteRate + byeRate);
      const retryRatio = round(Math.min(retransmissions / Math.max(requestsPerSecond, 1), 1));

      let templates;
      let packetSample;
      if (scenarioName === "registration_storm") {
        templates = [
          ["REGISTER", "UE → P-CSCF → S-CSCF", "401 retry", latency * 1.1],
          ["REGISTER", "UE → P-CSCF → S-CSCF", "202 accepted", latency],
          ["REGISTER", "UE → P-CSCF → S-CSCF", "200 OK", latency * 0.7],
          ["REGISTER", "UE → P-CSCF → S-CSCF", "401 retry", latency * 1.2],
          ["REGISTER", "UE → P-CSCF → S-CSCF", "200 OK", latency * 0.6],
          ["REGISTER", "UE → P-CSCF → S-CSCF", "202 accepted", latency * 0.9]
        ];
        packetSample = [
          "REGISTER sip:ims.demo.lab SIP/2.0",
          "Via: SIP/2.0/UDP 10.0.8.12:5060",
          "From: <sip:user@ims.demo.lab>",
          "To: <sip:user@ims.demo.lab>",
          "Call-ID: registration-surge",
          "CSeq: 314159 REGISTER"
        ].join("\n");
      } else if (scenarioName === "malformed_invite" || scenarioName === "malformed_sip") {
        templates = [
          ["INVITE", "UE → P-CSCF → Validation", "Malformed", 44],
          ["INVITE", "UE → P-CSCF → Validation", "400 reject", 38],
          ["REGISTER", "UE → P-CSCF → S-CSCF", "200 OK", 110],
          ["INVITE", "UE → P-CSCF → Validation", "Malformed", 42],
          ["INVITE", "UE → P-CSCF → Validation", "400 reject", 39],
          ["REGISTER", "UE → P-CSCF → S-CSCF", "200 OK", 105]
        ];
        packetSample = [
          "INVITE sip:user@ims.demo.lab SIP/2.0",
          "Via: SIP/2.0/UDP 10.0.8.44:5060",
          "From malformed header",
          "To: <sip:user@ims.demo.lab>",
          "Call-ID: malformed-invite",
          "CSeq: 11 INVITE"
        ].join("\n");
      } else {
        templates = [
          ["REGISTER", "UE → P-CSCF → S-CSCF", "200 OK", 90],
          ["INVITE", "UE → P-CSCF → S-CSCF", "200 OK", 70],
          ["BYE", "UE → P-CSCF → S-CSCF", "200 OK", 55],
          ["REGISTER", "UE → P-CSCF → S-CSCF", "200 OK", 85],
          ["INVITE", "UE → P-CSCF → S-CSCF", "200 OK", 68],
          ["BYE", "UE → P-CSCF → S-CSCF", "200 OK", 50]
        ];
        packetSample = [
          "REGISTER sip:ims.demo.lab SIP/2.0",
          "Via: SIP/2.0/UDP 10.0.8.10:5060",
          "From: <sip:user@ims.demo.lab>",
          "To: <sip:user@ims.demo.lab>",
          "Call-ID: nominal-register",
          "CSeq: 1 REGISTER"
        ].join("\n");
      }

      const now = Date.now();
      const rows = templates.map((template, index) => ({
        time: formatClock(new Date(now - ((templates.length - index) * 1000))),
        method: template[0],
        path: template[1],
        status: template[2],
        latency_ms: round(template[3], 1)
      }));

      return {
        scenario_name: scenarioName,
        source: featureWindow.feature_source || "derived",
        rows,
        stats: {
          requests_per_second: requestsPerSecond,
          retry_ratio: retryRatio,
          active_node: "pcscf-1"
        },
        packet_sample: packetSample
      };
    }

    function currentTrafficPreview() {
      if (state.lastRun && state.lastRun.feature_window) {
        return buildDerivedTrafficPreview(state.lastRun.feature_window);
      }
      const preview = consoleState().traffic_preview;
      if (preview && Array.isArray(preview.rows) && preview.rows.length) {
        return preview;
      }
      const incident = selectedIncident();
      if (incident) {
        return buildDerivedTrafficPreview({
          scenario_name: incident.anomaly_type,
          feature_source: "incident-feature-snapshot",
          features: incident.feature_snapshot || {}
        });
      }
      return buildDerivedTrafficPreview(null);
    }

    function renderChrome() {
      const current = consoleState();
      const incidents = current.incidents || [];
      const selected = selectedIncident();
      const healthyServices = current.summary.healthy_services || 0;
      const serviceCount = current.summary.service_count || 0;
      const clusterStatus = current.cluster.status || "unknown";
      const refreshLabel = state.autoRefresh ? `on (${autoRefreshSeconds()}s)` : "off";
      const clusterBadge = clusterStatus === "healthy"
        ? "rounded-full border border-emerald-500/30 bg-emerald-500/10 px-2.5 py-1 text-xs text-emerald-300"
        : "rounded-full border border-amber-500/30 bg-amber-500/10 px-2.5 py-1 text-xs text-amber-300";

      document.getElementById("pageTitle").textContent = sectionTitles[state.section] || "Overview";
      document.getElementById("lastRefreshBadge").textContent = current.generated_at ? `Last refresh: ${formatTime(current.generated_at)}` : "Last refresh: waiting";
      document.getElementById("currentScenarioBadge").textContent = `Scenario: ${latestScenarioLabel()}`;
      document.getElementById("clusterName").textContent = current.cluster.name || "ims-demo-lab";
      document.getElementById("clusterSubtitle").textContent = `${healthyServices}/${serviceCount} services healthy`;

                  <button class="rounded-2xl bg-amber-500/10 p-5 text-left ring-1 ring-amber-400/20 hover:bg-amber-500/15" onclick="approveSelected('rate_limit_pcscf')">
                    <div class="font-semibold text-amber-200">Approve P-CSCF rate limit</div>
                    <div class="mt-2 text-sm text-slate-400">Apply a temporary throttle while the incident remains open.</div>
                  </button>
                  <button class="rounded-2xl bg-sky-500/10 p-5 text-left ring-1 ring-sky-400/20 hover:bg-sky-500/15" onclick="notifySelected('slack')">
                    <div class="font-semibold text-sky-200">Send to Slack</div>
                    <div class="mt-2 text-sm text-slate-400">Broadcast incident status, RCA, and the next operator action.</div>
                  </button>
                  <button class="rounded-2xl bg-slate-950 p-5 text-left ring-1 ring-slate-800 hover:bg-slate-900" onclick="notifySelected('jira')">
                    <div class="font-semibold text-white">Open Jira</div>
                    <div class="mt-2 text-sm text-slate-400">Create a remediation work item with the evidence bundle.</div>
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderTraffic() {
      const preview = currentTrafficPreview();
      const rows = preview.rows || [];
      const requestsPerSecond = round((preview.stats || {}).requests_per_second || 0, 2);
      const retryRatio = round((preview.stats || {}).retry_ratio || 0, 2);
      const activeNode = (preview.stats || {}).active_node || "pcscf-1";
      const scenarioName = preview.scenario_name || "none";

      document.getElementById("traffic").innerHTML = `
        <div class="grid gap-4 xl:grid-cols-[1fr_360px]">
          <div class="rounded-3xl border border-slate-800 bg-slate-900 p-5 shadow-soft">
            <div class="flex flex-col gap-3 lg:flex-row lg:items-center lg:justify-between">
              <div>
                <div class="text-xs uppercase tracking-[0.2em] text-slate-500">Real-time feed</div>
                <h2 class="mt-2 text-xl font-semibold">SIP traffic explorer</h2>
              </div>
              <div class="grid grid-cols-2 md:grid-cols-4 gap-2 text-sm">
                <div class="rounded-2xl border border-slate-800 bg-slate-950 px-3 py-2">Node: ${escapeHtml(activeNode)}</div>
                <div class="rounded-2xl border border-slate-800 bg-slate-950 px-3 py-2">Method: mixed</div>
                <div class="rounded-2xl border border-slate-800 bg-slate-950 px-3 py-2">Window: latest</div>
                <div class="rounded-2xl border border-slate-800 bg-slate-950 px-3 py-2">Scenario: ${escapeHtml(titleize(scenarioName))}</div>
              </div>
            </div>
            <div class="mt-5 overflow-hidden rounded-2xl border border-slate-800">
              <div class="grid grid-cols-[120px_120px_1fr_120px_120px] bg-slate-950 px-4 py-3 text-xs uppercase tracking-[0.2em] text-slate-500">
                <div>Time</div><div>Method</div><div>Path</div><div>Status</div><div>Latency</div>
              </div>
              <div class="mini-scroll max-h-[65vh] overflow-y-auto text-sm">
                ${(rows.length ? rows.map((row) => `
                  <div class="traffic-line grid grid-cols-[120px_120px_1fr_120px_120px] px-4 py-3 border-t border-slate-800">
                    <div>${escapeHtml(row.time)}</div>
                    <div>${escapeHtml(row.method)}</div>
                    <div>${escapeHtml(row.path)}</div>
                    <div class="${row.status.includes("Malformed") || row.status.includes("400") || row.status.includes("401") ? "text-rose-300" : row.status.includes("202") ? "text-amber-300" : "text-emerald-300"}">${escapeHtml(row.status)}</div>
                    <div>${escapeHtml(String(row.latency_ms))}ms</div>
                  </div>
                `).join("") : `
                  <div class="px-4 py-6 text-slate-400">No traffic preview is available yet. Run a scenario to populate this view.</div>
                `)}
              </div>
            </div>
          </div>
          <div class="space-y-4">
            <div class="rounded-3xl border border-slate-800 bg-slate-900 p-5 shadow-soft">
              <div class="text-xs uppercase tracking-[0.2em] text-slate-500">Stream stats</div>
              <h2 class="mt-2 text-xl font-semibold">What the operator sees</h2>
              <div class="mt-4 space-y-3 text-sm">
                <div class="rounded-2xl border border-slate-800 bg-slate-950 p-4"><div class="text-slate-400">req/sec</div><div class="mt-2 text-2xl font-semibold">${requestsPerSecond}</div></div>
                <div class="rounded-2xl border border-slate-800 bg-slate-950 p-4"><div class="text-slate-400">retry ratio</div><div class="mt-2 text-2xl font-semibold">${retryRatio}</div></div>
                <div class="rounded-2xl border border-slate-800 bg-slate-950 p-4"><div class="text-slate-400">active node</div><div class="mt-2 text-2xl font-semibold">${escapeHtml(activeNode)}</div></div>
                <div class="rounded-2xl border border-slate-800 bg-slate-950 p-4"><div class="text-slate-400">source</div><div class="mt-2 text-base font-semibold">${escapeHtml(preview.source || "derived")}</div></div>
              </div>
            </div>
            <div class="rounded-3xl border border-slate-800 bg-slate-900 p-5 shadow-soft">
              <div class="text-xs uppercase tracking-[0.2em] text-slate-500">Inspect packet</div>
              <pre class="mt-4 overflow-x-auto text-sm text-slate-300 rounded-2xl border border-slate-800 bg-slate-950 p-4">${escapeHtml(preview.packet_sample || "No packet sample available.")}</pre>
            </div>
          </div>
        </div>
      `;
    }

    function renderRca() {
      const incident = selectedIncident();
      if (!incident) {
        document.getElementById("rca").innerHTML = `
          <div class="rounded-3xl border border-slate-800 bg-slate-900 p-6 shadow-soft text-slate-300">
            RCA analysis will appear here once an incident has been recorded and enriched.
          </div>
        `;
        return;
      }

      const explainability = incident.explainability || [];
      const similar = incident.similar_incidents || [];

      document.getElementById("rca").innerHTML = `
        <div class="grid gap-4 xl:grid-cols-[1.2fr_1fr]">
          <div class="rounded-3xl border border-slate-800 bg-slate-900 p-5 shadow-soft">
            <div class="text-xs uppercase tracking-[0.2em] text-slate-500">Model explainability</div>
            <h2 class="mt-2 text-xl font-semibold">Why this anomaly fired</h2>
            <div class="mt-6 space-y-4">
              ${explainability.map((item) => {
                const tone = item.tone === "amber" ? "bg-amber-400" : item.tone === "rose" ? "bg-rose-400" : item.tone === "emerald" ? "bg-emerald-400" : "bg-sky-400";
                return `
                  <div>
                    <div class="flex justify-between text-sm"><span>${escapeHtml(item.feature)}</span><span>${formatScore(item.weight)}</span></div>
                    <div class="mt-2 h-2 rounded-full bg-slate-800"><div class="h-2 rounded-full ${tone}" style="width:${Math.max(8, item.weight * 100)}%"></div></div>
                  </div>
                `;
              }).join("")}
            </div>
            <div class="mt-6 rounded-2xl border border-slate-800 bg-slate-950 p-4 text-sm text-slate-300">
              ${escapeHtml(incident.narrative)}
            </div>
          </div>
          <div class="rounded-3xl border border-slate-800 bg-slate-900 p-5 shadow-soft">
            <div class="text-xs uppercase tracking-[0.2em] text-slate-500">Similar incidents</div>
            <h2 class="mt-2 text-xl font-semibold">Historical matches</h2>
            <div class="mt-5 space-y-3 text-sm">
              ${(similar.length ? similar.map((item) => `
                <div class="rounded-2xl border border-slate-800 bg-slate-950 p-4">
                  <div class="font-medium">${escapeHtml(item.title)}</div>
                  <div class="mt-1 text-slate-400">${escapeHtml(item.detail)}</div>
                </div>
              `).join("") : `<div class="rounded-2xl border border-slate-800 bg-slate-950 p-4 text-slate-400">No historical matches are available yet.</div>`)}
            </div>
          </div>
        </div>
      `;
    }

    function renderModels() {
      const registry = consoleState().models || { models: [] };
      const models = registry.models || [];
      const deployedVersion = registry.deployed_model_version || "unknown";
      const candidate = models.find((model) => model.version && model.version !== deployedVersion) || null;

      document.getElementById("models").innerHTML = `
        <div class="space-y-4">
          <div class="grid gap-4 md:grid-cols-3">
            <div class="rounded-3xl border border-slate-800 bg-slate-900 p-5 shadow-soft">
              <div class="text-xs uppercase tracking-[0.2em] text-slate-500">Deployed model</div>
              <div class="mt-3 text-2xl font-semibold">${escapeHtml(deployedVersion)}</div>
            </div>
            <div class="rounded-3xl border border-slate-800 bg-slate-900 p-5 shadow-soft">
              <div class="text-xs uppercase tracking-[0.2em] text-slate-500">Dataset version</div>
              <div class="mt-3 text-2xl font-semibold">${escapeHtml(registry.dataset_version || "unknown")}</div>
            </div>
            <div class="rounded-3xl border border-slate-800 bg-slate-900 p-5 shadow-soft">
              <div class="text-xs uppercase tracking-[0.2em] text-slate-500">Feature schema</div>
              <div class="mt-3 text-2xl font-semibold">${escapeHtml(registry.feature_schema_version || "feature_schema_v1")}</div>
            </div>
          </div>

          <div class="rounded-3xl border border-slate-800 bg-slate-900 p-5 shadow-soft overflow-hidden">
            <div class="flex items-center justify-between gap-4 flex-wrap">
              <div>
                <div class="text-xs uppercase tracking-[0.2em] text-slate-500">Registry</div>
                <h2 class="mt-2 text-xl font-semibold">Model inventory</h2>
              </div>
              <button class="rounded-2xl ${candidate ? "bg-sky-500 text-slate-950" : "bg-slate-800 text-slate-400 cursor-not-allowed"} px-4 py-2 text-sm font-medium" ${candidate ? 'onclick="promoteCandidate()"' : "disabled"}>${candidate ? `Promote ${escapeHtml(candidate.version)}` : "No candidate available"}</button>
            </div>
            <div class="mt-5 overflow-hidden rounded-2xl border border-slate-800">
              <table class="w-full text-left text-sm">
                <thead class="bg-slate-950 text-slate-400">
                  <tr>
                    <th class="px-4 py-3 font-medium">Model</th>
                    <th class="px-4 py-3 font-medium">Version</th>
                    <th class="px-4 py-3 font-medium">Precision</th>
                    <th class="px-4 py-3 font-medium">Recall</th>
                    <th class="px-4 py-3 font-medium">Status</th>
                  </tr>
                </thead>
                <tbody>
                  ${(models.length ? models.map((model) => {
                    const metrics = model.metrics || {};
                    const status = model.version === deployedVersion ? "Deployed" : model.version === registry.selected_model_version ? "Selected" : "Ready";
                    const statusClass = status === "Deployed" ? "text-emerald-300" : status === "Selected" ? "text-sky-300" : "text-slate-300";
                    return `
                      <tr class="border-t border-slate-800">
                        <td class="px-4 py-3 font-medium">${escapeHtml(model.name || model.version || "model")}</td>
                        <td class="px-4 py-3">${escapeHtml(model.version || "unknown")}</td>
                        <td class="px-4 py-3">${formatScore(metrics.precision || 0)}</td>
                        <td class="px-4 py-3">${formatScore(metrics.recall || 0)}</td>
                        <td class="px-4 py-3 ${statusClass}">${status}</td>
                      </tr>
                    `;
                  }).join("") : `
                    <tr class="border-t border-slate-800">
                      <td colspan="5" class="px-4 py-6 text-slate-400">Model registry has not been populated yet.</td>
                    </tr>
                  `)}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      `;
    }

    function renderServices() {
      const services = consoleState().services || [];
      document.getElementById("services").innerHTML = `
        <div class="grid gap-4 lg:grid-cols-2 xl:grid-cols-3">
          ${(services.length ? services.map((service) => {
            const tone = service.ok ? "emerald" : "amber";
            const palette = toneClasses(tone);
            return `
              <div class="rounded-3xl border border-slate-800 bg-slate-900 p-5 shadow-soft">
                <div class="flex items-center justify-between gap-4">
                  <h3 class="text-lg font-semibold">${escapeHtml(service.name)}</h3>
                  <span class="rounded-full px-2.5 py-1 text-xs ${palette.badge}">${escapeHtml(titleize(service.status))}</span>
                </div>
                <div class="mt-4 text-sm text-slate-400 whitespace-pre-wrap">${escapeHtml(summarizePayload(service.payload))}</div>
                <div class="mt-4 text-xs text-slate-500">${escapeHtml(service.endpoint || "")}</div>
              </div>
            `;
          }).join("") : `<div class="rounded-3xl border border-slate-800 bg-slate-900 p-6 shadow-soft text-slate-300">No service health data available yet.</div>`)}
        </div>
      `;
    }

    function renderAudit() {
      const events = consoleState().audit || [];
      document.getElementById("audit").innerHTML = `
        <div class="rounded-3xl border border-slate-800 bg-slate-900 p-5 shadow-soft">
          <div class="text-xs uppercase tracking-[0.2em] text-slate-500">Traceability</div>
          <h2 class="mt-2 text-xl font-semibold">Audit activity</h2>
          <div class="mt-5 space-y-3 text-sm">
            ${(events.length ? events.slice(0, 12).map((event) => `
              <div class="rounded-2xl border border-slate-800 bg-slate-950 p-4">
                <div class="font-medium">${escapeHtml(auditTitle(event.event_type))}</div>
                <div class="mt-1 text-slate-400">${escapeHtml(auditDetail(event))}</div>
                <div class="mt-2 text-xs text-slate-500">${escapeHtml(formatTime(event.created_at))}</div>
              </div>
            `).join("") : `<div class="rounded-2xl border border-slate-800 bg-slate-950 p-4 text-slate-400">No audit events recorded yet.</div>`)}
          </div>
        </div>
      `;
    }

    function renderAll() {
      ensureSelectedIncident();
      renderChrome();
      renderOverview();
      renderIncidents();
      renderTraffic();
      renderRca();
      renderModels();
      renderServices();
      renderAudit();
    }

    async function refreshDashboard(force = false) {
      if (state.loading && !force) {
        return;
      }
      state.loading = true;
      state.error = "";
      renderChrome();
      try {
        state.console = await fetchJson(`${controlPlaneService}/console/state?project=${encodeURIComponent(defaultProject)}`, {
          headers: authHeaders()
        });
      } catch (error) {
        state.error = error instanceof Error ? error.message : String(error);
      } finally {
        state.loading = false;
        syncAutoRefresh();
        renderAll();
      }
    }

    async function runScenario(scenario) {
      state.loading = true;
      state.error = "";
      renderChrome();
      try {
        const result = await fetchJson(`${controlPlaneService}/console/run-scenario`, {
          method: "POST",
          headers: authHeaders(),
          body: JSON.stringify({ scenario, project: defaultProject })
        });
        state.lastRun = {
          scenario,
          feature_window: result.feature_window,
          score: result.score,
          rca: result.rca,
          executed_at: new Date().toISOString()
        };
        writeJson(storageKeys.lastRun, state.lastRun);
        state.console = result.state;
        if (result.incident && result.incident.id) {
          state.selectedIncidentId = result.incident.id;
          state.section = "incidents";
        } else {
          state.section = "traffic";
        }
      } catch (error) {
        state.error = error instanceof Error ? `Scenario execution failed: ${error.message}` : `Scenario execution failed: ${String(error)}`;
      } finally {
        state.loading = false;
        renderAll();
      }
    }

    async function approveSelected(action) {
      const incident = selectedIncident();
      if (!incident) {
        state.error = "No incident is selected.";
        renderAll();
        return;
      }
      state.loading = true;
      state.error = "";
      renderChrome();
      try {
        await fetchJson(`${controlPlaneService}/incidents/${encodeURIComponent(incident.id)}/approve`, {
          method: "POST",
          headers: authHeaders(),
          body: JSON.stringify({
            action,
            approved_by: "demo-ui",
            notes: "Triggered from the IMS operations console",
            execute: false
          })
        });
        await refreshDashboard(true);
        state.section = "incidents";
      } catch (error) {
        state.loading = false;
        state.error = error instanceof Error ? error.message : String(error);
        renderAll();
      }
    }

    async function notifySelected(target) {
      const incident = selectedIncident();
      if (!incident) {
        state.error = "No incident is selected.";
        renderAll();
        return;
      }
      state.loading = true;
      state.error = "";
      renderChrome();
      try {
        await fetchJson(`${controlPlaneService}/incidents/${encodeURIComponent(incident.id)}/notify/${target}`, {
          method: "POST",
          headers: authHeaders()
        });
        await refreshDashboard(true);
      } catch (error) {
        state.loading = false;
        state.error = error instanceof Error ? error.message : String(error);
        renderAll();
      }
    }

    async function promoteCandidate() {
      const registry = consoleState().models || { models: [] };
      const deployedVersion = registry.deployed_model_version || "";
      const candidate = (registry.models || []).find((model) => model.version && model.version !== deployedVersion);
      if (!candidate) {
        state.error = "No candidate model is available for promotion.";
        renderAll();
        return;
      }

      state.loading = true;
      state.error = "";
      renderChrome();
      try {
        await fetchJson(`${controlPlaneService}/models/promote`, {
          method: "POST",
          headers: authHeaders(),
          body: JSON.stringify({
            version: candidate.version,
            approved_by: "demo-ui",
            stage: "prod"
          })
        });
        await refreshDashboard(true);
      } catch (error) {
        state.loading = false;
        state.error = error instanceof Error ? error.message : String(error);
        renderAll();
      }
    }

    function activateSection(section) {
      state.section = section;
      renderAll();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function selectIncident(incidentId) {
      state.selectedIncidentId = incidentId;
      state.section = "incidents";
      renderAll();
    }

    function setIncidentTab(tab) {
      state.selectedIncidentTab = tab;
      renderIncidents();
    }

    function toggleAutoRefresh() {
      state.autoRefresh = !state.autoRefresh;
      writeJson(storageKeys.autoRefresh, state.autoRefresh);
      syncAutoRefresh();
      renderChrome();
    }

    function syncAutoRefresh() {
      if (state.refreshTimer) {
        window.clearInterval(state.refreshTimer);
      }
      if (state.autoRefresh) {
        state.refreshTimer = window.setInterval(() => {
          refreshDashboard();
        }, autoRefreshSeconds() * 1000);
      }
    }

    async function copyPayload() {
      const element = document.getElementById("incidentPayloadBox");
      if (!element) {
        return;
      }
      try {
        await navigator.clipboard.writeText(element.textContent || "");
      } catch (error) {
        state.error = "Could not copy the incident payload.";
        renderAll();
      }
    }

    window.activateSection = activateSection;
    window.selectIncident = selectIncident;
    window.setIncidentTab = setIncidentTab;
    window.refreshDashboard = refreshDashboard;
    window.runScenario = runScenario;
    window.approveSelected = approveSelected;
    window.notifySelected = notifySelected;
    window.promoteCandidate = promoteCandidate;
    window.toggleAutoRefresh = toggleAutoRefresh;
    window.copyPayload = copyPayload;

    renderAll();
    syncAutoRefresh();
    refreshDashboard();
  </script>
</body>
</html>
