pipelineInfo:
  name: ani-featurestore-train-and-register
root:
  dag:
    tasks:
      evaluate-candidate:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-evaluate-candidate
        dependentTasks:
        - retrieve-training-dataset
        - train-automl
        inputs:
          parameters:
            candidate_manifest:
              taskOutputParameter:
                outputParameterKey: output_manifest
                producerTask: train-automl
            training_manifest:
              taskOutputParameter:
                outputParameterKey: output_manifest
                producerTask: retrieve-training-dataset
        taskInfo:
          name: evaluate-candidate
      export-serving-artifact:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-export-serving-artifact
        dependentTasks:
        - retrieve-training-dataset
        - select-candidate
        inputs:
          parameters:
            selection_manifest:
              taskOutputParameter:
                outputParameterKey: output_manifest
                producerTask: select-candidate
            serving_alias:
              componentInputParameter: serving_alias
            serving_model_format_name:
              componentInputParameter: serving_model_format_name
            serving_model_format_version:
              componentInputParameter: serving_model_format_version
            serving_model_name:
              componentInputParameter: serving_model_name
            serving_prefix:
              componentInputParameter: serving_prefix
            serving_protocol_version:
              componentInputParameter: serving_protocol_version
            serving_runtime_name:
              componentInputParameter: serving_runtime_name
            training_manifest:
              taskOutputParameter:
                outputParameterKey: output_manifest
                producerTask: retrieve-training-dataset
        taskInfo:
          name: export-serving-artifact
      publish-deployment-manifest:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-publish-deployment-manifest
        dependentTasks:
        - export-serving-artifact
        - register-model-version
        inputs:
          parameters:
            export_manifest:
              taskOutputParameter:
                outputParameterKey: output_manifest
                producerTask: export-serving-artifact
            model_registry_manifest:
              taskOutputParameter:
                outputParameterKey: output_manifest
                producerTask: register-model-version
        taskInfo:
          name: publish-deployment-manifest
      register-model-version:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-register-model-version
        dependentTasks:
        - export-serving-artifact
        inputs:
          parameters:
            export_manifest:
              taskOutputParameter:
                outputParameterKey: output_manifest
                producerTask: export-serving-artifact
            feature_service_name:
              componentInputParameter: feature_service_name
            model_name:
              componentInputParameter: model_name
            model_registry_endpoint:
              componentInputParameter: model_registry_endpoint
            model_version_name:
              componentInputParameter: model_version_name
        taskInfo:
          name: register-model-version
      resolve-bundle:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-resolve-bundle
        inputs:
          parameters:
            bundle_version:
              componentInputParameter: bundle_version
        taskInfo:
          name: resolve-bundle
      retrieve-training-dataset:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-retrieve-training-dataset
        dependentTasks:
        - resolve-bundle
        - sync-feature-store-definitions
        - validate-bundle
        inputs:
          parameters:
            bundle_manifest_path:
              taskOutputParameter:
                outputParameterKey: output_manifest
                producerTask: resolve-bundle
            feature_service_name:
              componentInputParameter: feature_service_name
        taskInfo:
          name: retrieve-training-dataset
      select-candidate:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-select-candidate
        dependentTasks:
        - evaluate-candidate
        inputs:
          parameters:
            evaluation_manifest:
              taskOutputParameter:
                outputParameterKey: output_manifest
                producerTask: evaluate-candidate
        taskInfo:
          name: select-candidate
      sync-feature-store-definitions:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-sync-feature-store-definitions
        dependentTasks:
        - resolve-bundle
        inputs:
          parameters:
            bundle_manifest_path:
              taskOutputParameter:
                outputParameterKey: output_manifest
                producerTask: resolve-bundle
        taskInfo:
          name: sync-feature-store-definitions
      train-automl:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-train-automl
        dependentTasks:
        - retrieve-training-dataset
        inputs:
          parameters:
            automl_engine:
              componentInputParameter: automl_engine
            candidate_version:
              componentInputParameter: candidate_version
            training_manifest:
              taskOutputParameter:
                outputParameterKey: output_manifest
                producerTask: retrieve-training-dataset
        taskInfo:
          name: train-automl
      validate-bundle:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-validate-bundle
        dependentTasks:
        - resolve-bundle
        inputs:
          parameters:
            bundle_manifest_path:
              taskOutputParameter:
                outputParameterKey: output_manifest
                producerTask: resolve-bundle
        taskInfo:
          name: validate-bundle
  inputDefinitions:
    parameters:
      automl_engine:
        defaultValue: autogluon
        isOptional: true
        parameterType: STRING
      bundle_version:
        defaultValue: ani-feature-bundle-v1
        isOptional: true
        parameterType: STRING
      candidate_version:
        defaultValue: candidate-fs-v1
        isOptional: true
        parameterType: STRING
      control_plane_api_key:
        defaultValue: demo-token
        isOptional: true
        parameterType: STRING
      control_plane_url:
        defaultValue: http://control-plane.ani-runtime.svc.cluster.local:8080
        isOptional: true
        parameterType: STRING
      dataset_store_access_key:
        defaultValue: minioadmin
        isOptional: true
        parameterType: STRING
      dataset_store_bucket:
        defaultValue: ani-models
        isOptional: true
        parameterType: STRING
      dataset_store_endpoint:
        defaultValue: http://model-storage-minio.ani-data.svc.cluster.local:9000
        isOptional: true
        parameterType: STRING
      dataset_store_mode:
        defaultValue: s3
        isOptional: true
        parameterType: STRING
      dataset_store_prefix:
        defaultValue: pipelines/ani-datascience/datasets
        isOptional: true
        parameterType: STRING
      dataset_store_secret_key:
        defaultValue: minioadmin
        isOptional: true
        parameterType: STRING
      feature_service_name:
        defaultValue: ani_anomaly_scoring_v1
        isOptional: true
        parameterType: STRING
      featurestore_auth_type:
        defaultValue: no_auth
        isOptional: true
        parameterType: STRING
      featurestore_aws_access_key_id:
        defaultValue: minioadmin
        isOptional: true
        parameterType: STRING
      featurestore_aws_region:
        defaultValue: us-east-1
        isOptional: true
        parameterType: STRING
      featurestore_aws_secret_access_key:
        defaultValue: minioadmin
        isOptional: true
        parameterType: STRING
      featurestore_ca_cert_path:
        defaultValue: /var/run/secrets/kubernetes.io/serviceaccount/service-ca.crt
        isOptional: true
        parameterType: STRING
      featurestore_mode:
        defaultValue: remote
        isOptional: true
        parameterType: STRING
      featurestore_online_store_path:
        defaultValue: https://feast-ani-featurestore-online.ani-datascience.svc.cluster.local:443
        isOptional: true
        parameterType: STRING
      featurestore_project:
        defaultValue: ani_anomaly_featurestore
