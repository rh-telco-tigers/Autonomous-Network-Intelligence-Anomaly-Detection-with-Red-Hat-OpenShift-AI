# PIPELINE DEFINITION
# Name: ani-featurestore-train-and-register
# Inputs:
#    automl_engine: str [Default: 'autogluon']
#    bundle_version: str [Default: 'ani-feature-bundle-v1']
#    candidate_version: str [Default: 'candidate-fs-v1']
#    control_plane_api_key: str [Default: 'demo-token']
#    control_plane_url: str [Default: 'http://control-plane.ani-runtime.svc.cluster.local:8080']
#    dataset_store_access_key: str [Default: 'minioadmin']
#    dataset_store_bucket: str [Default: 'ani-models']
#    dataset_store_endpoint: str [Default: 'http://model-storage-minio.ani-data.svc.cluster.local:9000']
#    dataset_store_mode: str [Default: 's3']
#    dataset_store_prefix: str [Default: 'pipelines/ani-datascience/datasets']
#    dataset_store_secret_key: str [Default: 'minioadmin']
#    feature_service_name: str [Default: 'ani_anomaly_scoring_v1']
#    featurestore_auth_type: str [Default: 'no_auth']
#    featurestore_aws_access_key_id: str [Default: 'minioadmin']
#    featurestore_aws_region: str [Default: 'us-east-1']
#    featurestore_aws_secret_access_key: str [Default: 'minioadmin']
#    featurestore_ca_cert_path: str [Default: '/var/run/secrets/kubernetes.io/serviceaccount/service-ca.crt']
#    featurestore_mode: str [Default: 'remote']
#    featurestore_online_store_path: str [Default: 'https://feast-ani-featurestore-online.ani-datascience.svc.cluster.local:443']
#    featurestore_project: str [Default: 'ani_anomaly_featurestore']
#    featurestore_registry_path: str [Default: 'feast-ani-featurestore-registry.ani-datascience.svc.cluster.local:443']
#    featurestore_s3_endpoint_url: str [Default: 'http://model-storage-minio.ani-data.svc.cluster.local:9000']
#    model_name: str [Default: 'ani-anomaly-featurestore']
#    model_registry_endpoint: str [Default: 'http://default-modelregistry.rhoai-model-registries.svc.cluster.local:8080']
#    model_version_name: str [Default: 'ani-anomaly-featurestore-v1']
#    serving_alias: str [Default: 'current']
#    serving_model_format_name: str [Default: 'autogluon']
#    serving_model_format_version: str [Default: '1']
#    serving_model_name: str [Default: 'ani-predictive-fs']
#    serving_prefix: str [Default: 'predictive-featurestore']
#    serving_protocol_version: str [Default: 'v2']
#    serving_runtime_name: str [Default: 'ani-autogluon-mlserver-runtime']
components:
  comp-evaluate-candidate:
    executorLabel: exec-evaluate-candidate
    inputDefinitions:
      parameters:
        candidate_manifest:
          parameterType: STRING
        training_manifest:
          parameterType: STRING
    outputDefinitions:
      parameters:
        output_manifest:
          parameterType: STRING
  comp-export-serving-artifact:
    executorLabel: exec-export-serving-artifact
    inputDefinitions:
      parameters:
        artifact_dir:
          defaultValue: /tmp/ani-featurestore/models/artifacts
          isOptional: true
          parameterType: STRING
        selection_manifest:
          parameterType: STRING
        serving_alias:
          defaultValue: current
          isOptional: true
          parameterType: STRING
        serving_model_format_name:
          defaultValue: autogluon
          isOptional: true
          parameterType: STRING
        serving_model_format_version:
          defaultValue: '1'
          isOptional: true
          parameterType: STRING
        serving_model_name:
          defaultValue: ani-predictive-fs
          isOptional: true
          parameterType: STRING
        serving_prefix:
          defaultValue: predictive-featurestore
          isOptional: true
          parameterType: STRING
        serving_protocol_version:
          defaultValue: v2
          isOptional: true
          parameterType: STRING
        serving_runtime_name:
          defaultValue: ani-autogluon-mlserver-runtime
          isOptional: true
          parameterType: STRING
        training_manifest:
          parameterType: STRING
    outputDefinitions:
      parameters:
        output_manifest:
          parameterType: STRING
  comp-publish-deployment-manifest:
    executorLabel: exec-publish-deployment-manifest
    inputDefinitions:
      parameters:
        export_manifest:
          parameterType: STRING
        model_registry_manifest:
          parameterType: STRING
        service_account_name:
          defaultValue: model-storage-sa
          isOptional: true
          parameterType: STRING
    outputDefinitions:
      parameters:
        output_manifest:
          parameterType: STRING
  comp-register-model-version:
    executorLabel: exec-register-model-version
    inputDefinitions:
      parameters:
        export_manifest:
          parameterType: STRING
        feature_service_name:
          parameterType: STRING
        model_name:
          parameterType: STRING
        model_registry_endpoint:
          defaultValue: http://default-modelregistry.rhoai-model-registries.svc.cluster.local:8080
          isOptional: true
          parameterType: STRING
        model_version_name:
          parameterType: STRING
        pipeline_name:
          defaultValue: ani-featurestore-train-and-register
          isOptional: true
          parameterType: STRING
    outputDefinitions:
      parameters:
        output_manifest:
          parameterType: STRING
  comp-resolve-bundle:
    executorLabel: exec-resolve-bundle
    inputDefinitions:
      parameters:
        bundle_version:
          parameterType: STRING
        workspace_root:
          defaultValue: /tmp/ani-featurestore
          isOptional: true
          parameterType: STRING
    outputDefinitions:
      parameters:
        output_manifest:
          parameterType: STRING
  comp-retrieve-training-dataset:
    executorLabel: exec-retrieve-training-dataset
    inputDefinitions:
      parameters:
        bundle_manifest_path:
          parameterType: STRING
        feature_repo_path:
          defaultValue: /workspace/ai/featurestore/feature_repo
          isOptional: true
          parameterType: STRING
        feature_service_name:
          parameterType: STRING
        workspace_root:
          defaultValue: /tmp/ani-featurestore
          isOptional: true
          parameterType: STRING
    outputDefinitions:
      parameters:
        output_manifest:
          parameterType: STRING
  comp-select-candidate:
    executorLabel: exec-select-candidate
    inputDefinitions:
      parameters:
        evaluation_manifest:
          parameterType: STRING
    outputDefinitions:
      parameters:
        output_manifest:
          parameterType: STRING
  comp-sync-feature-store-definitions:
    executorLabel: exec-sync-feature-store-definitions
    inputDefinitions:
      parameters:
        bundle_manifest_path:
          parameterType: STRING
        feature_repo_path:
          defaultValue: /workspace/ai/featurestore/feature_repo
          isOptional: true
          parameterType: STRING
        workspace_root:
          defaultValue: /tmp/ani-featurestore
          isOptional: true
          parameterType: STRING
    outputDefinitions:
      parameters:
        output_manifest:
          parameterType: STRING
  comp-train-automl:
    executorLabel: exec-train-automl
    inputDefinitions:
      parameters:
        artifact_dir:
          defaultValue: /tmp/ani-featurestore/models/artifacts
          isOptional: true
          parameterType: STRING
        automl_engine:
          defaultValue: autogluon
          isOptional: true
          parameterType: STRING
        candidate_version:
          parameterType: STRING
        training_manifest:
          parameterType: STRING
        workspace_root:
          defaultValue: /tmp/ani-featurestore
          isOptional: true
          parameterType: STRING
    outputDefinitions:
      parameters:
        output_manifest:
          parameterType: STRING
  comp-validate-bundle:
    executorLabel: exec-validate-bundle
    inputDefinitions:
      parameters:
        bundle_manifest_path:
          parameterType: STRING
        workspace_root:
          defaultValue: /tmp/ani-featurestore
          isOptional: true
          parameterType: STRING
    outputDefinitions:
      parameters:
        output_manifest:
          parameterType: STRING
deploymentSpec:
  executors:
    exec-evaluate-candidate:
      container:
        args:
        - --step
        - evaluate-candidate
        - --training-manifest
        - '{{$.inputs.parameters[''training_manifest'']}}'
        - --candidate-manifest
        - '{{$.inputs.parameters[''candidate_manifest'']}}'
