      featurestore_s3_endpoint_url:
        defaultValue: http://model-storage-minio.ani-data.svc.cluster.local:9000
        isOptional: true
        parameterType: STRING
      model_name:
        defaultValue: ani-anomaly-featurestore
        isOptional: true
