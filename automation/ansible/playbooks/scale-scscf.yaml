---
- name: Scale the S-CSCF deployment after operator approval
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Scale the S-CSCF deployment
      kubernetes.core.k8s_scale:
        api_version: apps/v1
        kind: Deployment
        name: openimss-scscf
        namespace: ims-demo-lab
        replicas: 2

