---
- name: Scale the S-CSCF deployment after operator approval
  hosts: localhost
  gather_facts: false
  vars:
    target_namespace: "{{ target_namespace | default('ani-demo-lab') }}"
    target_deployment: "{{ target_deployment | default('ims-scscf') }}"
    target_replicas: "{{ (target_replicas | default(2)) | int }}"
    kubernetes_api_token: >-
      {{
        lookup('env', 'K8S_AUTH_API_KEY')
        if (lookup('env', 'K8S_AUTH_API_KEY') | default('', true) | length) > 0
        else lookup('file', '/var/run/secrets/kubernetes.io/serviceaccount/token')
      }}
    kubernetes_api_url: >-
      {{
        lookup('env', 'K8S_AUTH_HOST')
        if (lookup('env', 'K8S_AUTH_HOST') | default('', true) | length) > 0
        else 'https://' ~
          (lookup('env', 'KUBERNETES_SERVICE_HOST') | default('kubernetes.default.svc', true)) ~
          ':' ~
          (lookup('env', 'KUBERNETES_SERVICE_PORT_HTTPS') | default('443', true))
      }}
    kubernetes_ca_cert: >-
      {{
        lookup('env', 'K8S_AUTH_SSL_CA_CERT')
        if (lookup('env', 'K8S_AUTH_SSL_CA_CERT') | default('', true) | length) > 0
        else '/var/run/secrets/kubernetes.io/serviceaccount/ca.crt'
      }}
    kubernetes_verify_ssl: "{{ (lookup('env', 'K8S_AUTH_VERIFY_SSL') | default('true', true) | lower) not in ['false', '0', 'no'] }}"
    scale_endpoint: >-
      {{ kubernetes_api_url }}/apis/apps/v1/namespaces/{{ target_namespace }}/deployments/{{ target_deployment }}/scale
  tasks:
    - name: Read the current scale before changing replicas
      ansible.builtin.uri:
        url: "{{ scale_endpoint }}"
        method: GET
        headers:
          Authorization: "Bearer {{ kubernetes_api_token }}"
          Accept: application/json
        ca_path: "{{ kubernetes_ca_cert }}"
        validate_certs: "{{ kubernetes_verify_ssl | bool }}"
        return_content: true
        status_code: 200
      register: current_scale

    - name: Scale the S-CSCF deployment to the approved replica count
      ansible.builtin.uri:
        url: "{{ scale_endpoint }}"
        method: PATCH
        headers:
          Authorization: "Bearer {{ kubernetes_api_token }}"
          Accept: application/json
          Content-Type: application/merge-patch+json
        ca_path: "{{ kubernetes_ca_cert }}"
        validate_certs: "{{ kubernetes_verify_ssl | bool }}"
        body_format: raw
        body: "{{ {'spec': {'replicas': target_replicas | int}} | to_json }}"
        return_content: true
        status_code: 200
      register: updated_scale

    - name: Wait for the deployment scale subresource to reflect the requested replicas
      ansible.builtin.uri:
        url: "{{ scale_endpoint }}"
        method: GET
        headers:
          Authorization: "Bearer {{ kubernetes_api_token }}"
          Accept: application/json
        ca_path: "{{ kubernetes_ca_cert }}"
        validate_certs: "{{ kubernetes_verify_ssl | bool }}"
        return_content: true
        status_code: 200
      register: settled_scale
      retries: 18
      delay: 5
      until:
        - (settled_scale.json.status.replicas | default(0) | int) == (target_replicas | int)

    - name: Emit a concise remediation summary
      ansible.builtin.debug:
        msg: >-
          Scaled {{ target_namespace }}/{{ target_deployment }} from
          {{ current_scale.json.spec.replicas | default('unknown') }} to
          {{ target_replicas }} replicas.

