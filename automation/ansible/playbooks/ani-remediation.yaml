---
- name: Interact with Ansible Lightspeed API and Generate Ansible Playbook
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Set default Lightspeed system prompt
      ansible.builtin.set_fact:
        default_lightspeed_system_prompt: >-
          You generate only YAML for Ansible automation.
          Return exactly one fenced yaml block and no prose outside it.
          The fenced yaml block must contain a YAML mapping with these top-level keys:
          title, summary, preconditions, expected_outcome, playbook_ref, action_ref,
          provider_name, provider_run_id, status, callback_url, correlation_id, playbook_yaml.
          Use playbook_yaml: | and make that value valid YAML for a list of Ansible plays beginning with ---.
          Do not append any extra top-level keys after playbook_yaml.
          Quote any YAML scalar inside playbook_yaml that contains ': ' or a Jinja template expression written with double curly braces.
          For human-readable messages, prefer msg: >- or a double-quoted string.

    - name: Build request payload
      ansible.builtin.set_fact:
        request_payload:
          no_tools: true
          query: "{{ lightspeed_prompt | default('') }}"
          system_prompt: "{{ lightspeed_system_prompt | default(default_lightspeed_system_prompt) }}"

    - name: Include Lightspeed model override when provided
      ansible.builtin.set_fact:
        request_payload: "{{ request_payload | combine({'model': lightspeed_model | trim}) }}"
      when: (lightspeed_model | default('') | trim) != ''

    - name: Include Lightspeed provider override when provided
      ansible.builtin.set_fact:
        request_payload: "{{ request_payload | combine({'provider': lightspeed_provider | trim}) }}"
      when: (lightspeed_provider | default('') | trim) != ''

    - name: Serialize request body
      ansible.builtin.set_fact:
        request_body: "{{ request_payload | to_json }}"

    - name: Debug serialized body (compare this to your curl -d payload)
      ansible.builtin.debug:
        msg: "{{ request_body }}"
      when: lightspeed_debug | default(false) | bool

    - name: Send request to AI API
      ansible.builtin.uri:
        url: "{{ input_lightspeed_url | default('https://aap-lightspeed-chatbot-api.aap.svc.cluster.local:8443/v1/query') }}"
        method: POST
        headers:
          Content-Type: "application/json"
          Authorization: "Bearer {{ lightspeed_token | default(lightspeed_wca_token | default('', true), true) }}"
        body: "{{ request_body }}"
        timeout: 300
        status_code: 200
        validate_certs: "{{ lightspeed_validate_certs | default(false) | bool }}"
      register: response


    - name: Display API response
      ansible.builtin.debug:
        msg: "{{ response.json }}"
      when: lightspeed_debug | default(false) | bool

    - name: Preserve raw YAML playbook (string)
      ansible.builtin.set_fact:
        lightspeed_playbook_raw: "{{ response.json.response }}"

    - name: Display Ansible Playbook in JSON
      ansible.builtin.debug:
        msg: "{{ lightspeed_playbook_raw }}"
      when: lightspeed_debug | default(false) | bool

    - name: Display Ansible Playbook in YAML
      ansible.builtin.debug:
        msg: "{{ lightspeed_playbook_raw | to_nice_yaml(sort_keys=False) }}"
      when: lightspeed_debug | default(false) | bool


    - name: Extract raw response string
      ansible.builtin.set_fact:
        raw_response: "{{ response.json.response }}"

    - name: Parse callback payload from prompt and Lightspeed response
      ansible.builtin.command:
        argv:
          - python3
          - "{{ playbook_dir | dirname }}/parse_lightspeed_response.py"
      environment:
        LIGHTSPEED_PROMPT: "{{ lightspeed_prompt | default('') }}"
        LIGHTSPEED_RESPONSE: "{{ raw_response }}"
        LIGHTSPEED_PROVIDER_NAME: "{{ lightspeed_provider_name | default('Ansible Lightspeed') }}"
        LIGHTSPEED_PROVIDER_RUN_ID: "{{ response.json.conversation_id | default('') }}"
      changed_when: false
      register: parsed_lightspeed_callback

    - name: Load parsed callback payload
      ansible.builtin.set_fact:
        parsed_callback_payload: "{{ parsed_lightspeed_callback.stdout | from_json }}"

    - name: Attempt a single repair pass when Lightspeed output is not parseable
      when: (parsed_callback_payload.error | default('') | trim) != ''
      block:
        - name: Build repair request payload
          ansible.builtin.set_fact:
            repair_request_payload:
              no_tools: true
              query: |
                The previous YAML response was invalid for our callback pipeline.
                Repair it and return exactly one fenced yaml block with no prose outside it.

                Output requirements:
                - top-level YAML mapping keys: title, summary, preconditions, expected_outcome, playbook_ref, action_ref, provider_name, provider_run_id, status, callback_url, correlation_id, playbook_yaml
                - use playbook_yaml: |
                - the playbook_yaml value must be valid YAML for a list of Ansible plays beginning with ---
                - quote any YAML scalar inside playbook_yaml that contains ': ' or a Jinja template expression written with double curly braces
                - keep the original remediation intent, callback_url, and correlation_id
                - remove any invalid trailing metadata or malformed structures

                Validation error:
                {{ parsed_callback_payload.error }}

                Original response:
                {{ raw_response }}
              system_prompt: "{{ lightspeed_repair_system_prompt | default(default_lightspeed_system_prompt) }}"

        - name: Include Lightspeed model override when provided for repair
          ansible.builtin.set_fact:
            repair_request_payload: "{{ repair_request_payload | combine({'model': lightspeed_model | trim}) }}"
          when: (lightspeed_model | default('') | trim) != ''

        - name: Include Lightspeed provider override when provided for repair
          ansible.builtin.set_fact:
            repair_request_payload: "{{ repair_request_payload | combine({'provider': lightspeed_provider | trim}) }}"
          when: (lightspeed_provider | default('') | trim) != ''

        - name: Serialize repair request body
          ansible.builtin.set_fact:
            repair_request_body: "{{ repair_request_payload | to_json }}"

        - name: Send repair request to AI API
          ansible.builtin.uri:
            url: "{{ input_lightspeed_url | default('https://aap-lightspeed-chatbot-api.aap.svc.cluster.local:8443/v1/query') }}"
            method: POST
            headers:
              Content-Type: "application/json"
              Authorization: "Bearer {{ lightspeed_token | default(lightspeed_wca_token | default('', true), true) }}"
            body: "{{ repair_request_body }}"
            timeout: 300
            status_code: 200
            validate_certs: "{{ lightspeed_validate_certs | default(false) | bool }}"
          register: repair_response

        - name: Display repair API response
          ansible.builtin.debug:
            msg: "{{ repair_response.json }}"
          when: lightspeed_debug | default(false) | bool

        - name: Replace raw response with repaired content
          ansible.builtin.set_fact:
            lightspeed_playbook_raw: "{{ repair_response.json.response }}"
            raw_response: "{{ repair_response.json.response }}"

        - name: Parse repaired callback payload from prompt and Lightspeed response
          ansible.builtin.command:
            argv:
              - python3
              - "{{ playbook_dir | dirname }}/parse_lightspeed_response.py"
          environment:
            LIGHTSPEED_PROMPT: "{{ lightspeed_prompt | default('') }}"
            LIGHTSPEED_RESPONSE: "{{ raw_response }}"
            LIGHTSPEED_PROVIDER_NAME: "{{ lightspeed_provider_name | default('Ansible Lightspeed') }}"
            LIGHTSPEED_PROVIDER_RUN_ID: "{{ repair_response.json.conversation_id | default(response.json.conversation_id | default('')) }}"
          changed_when: false
          register: parsed_lightspeed_callback_repair

        - name: Load repaired callback payload
          ansible.builtin.set_fact:
            parsed_callback_payload: "{{ parsed_lightspeed_callback_repair.stdout | from_json }}"

    - name: Set stat on parsed playbook YAML when available
      ansible.builtin.set_stats:
        data:
          lightspeed_playbook: "{{ parsed_callback_payload.playbook_yaml | default('') }}"

    - name: Validate callback correlation data
      ansible.builtin.assert:
        that:
          - (parsed_callback_payload.callback_url | default('') | trim) != ''
          - (parsed_callback_payload.correlation_id | default('') | trim) != ''
        fail_msg: "{{ parsed_callback_payload.error | default('Lightspeed callback metadata was not available.') }}"

    - name: Debug parsed callback payload
      ansible.builtin.debug:
        msg:
          callback_url: "{{ parsed_callback_payload.callback_url }}"
          correlation_id: "{{ parsed_callback_payload.correlation_id }}"
          status: "{{ parsed_callback_payload.status }}"
          title: "{{ parsed_callback_payload.title }}"
          summary: "{{ parsed_callback_payload.summary }}"
          expected_outcome: "{{ parsed_callback_payload.expected_outcome }}"
          error: "{{ parsed_callback_payload.error }}"
          playbook_yaml_preview: "{{ parsed_callback_payload.playbook_yaml | default('') | truncate(300) }}"
      when: lightspeed_debug | default(false) | bool

    - name: Build callback payload
      ansible.builtin.set_fact:
        callback_payload: "{{ {
          'correlation_id': parsed_callback_payload.correlation_id,
          'status': parsed_callback_payload.status | default('generated'),
          'title': parsed_callback_payload.title | default(''),
          'description': parsed_callback_payload.description | default(parsed_callback_payload.summary | default('')),
          'summary': parsed_callback_payload.summary | default(''),
          'expected_outcome': parsed_callback_payload.expected_outcome | default(''),
          'preconditions': parsed_callback_payload.preconditions | default([], true),
          'playbook_yaml': parsed_callback_payload.playbook_yaml | default(''),
          'playbook_ref': parsed_callback_payload.playbook_ref | default(''),
          'action_ref': parsed_callback_payload.action_ref | default(''),
          'provider_name': parsed_callback_payload.provider_name | default('Ansible Lightspeed'),
          'provider_run_id': parsed_callback_payload.provider_run_id | default(''),
          'error': parsed_callback_payload.error | default(''),
          'metadata': (parsed_callback_payload.metadata | default({}, true)) | combine(
            {
              'conversation_id': response.json.conversation_id | default(''),
              'input_tokens': response.json.input_tokens | default(0),
              'output_tokens': response.json.output_tokens | default(0)
            },
            recursive=True
          )
        } }}"
    
    - name: POST playbook generation result to callback URL
      ansible.builtin.uri:
        url: "{{ parsed_callback_payload.callback_url }}"
        method: POST
        headers:
          Content-Type: "application/json"
          x-api-key: "{{ control_plane_api_key | default('demo-token') }}"
        body: "{{ callback_payload }}"
        body_format: json
        timeout: 60
        status_code: [200, 201, 202, 204]
      register: callback_response

    - name: Debug callback response
      ansible.builtin.debug:
        msg:
          status: "{{ callback_response.status }}"
          response: "{{ callback_response.json | default(callback_response.content | default('no body')) }}"
      when: lightspeed_debug | default(false) | bool

    - name: Fail the controller job when Lightspeed output was not parseable
      ansible.builtin.fail:
        msg: "{{ parsed_callback_payload.error }}"
      when: (parsed_callback_payload.error | default('') | trim) != ''
