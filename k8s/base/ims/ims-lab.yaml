apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo
  namespace: ims-demo-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
        - name: mongo
          image: docker.io/mongo:7.0
          args:
            - --bind_ip_all
            - --dbpath
            - /tmp/mongo
          ports:
            - containerPort: 27017
              name: mongodb
          volumeMounts:
            - name: mongo-data
              mountPath: /tmp/mongo
          readinessProbe:
            tcpSocket:
              port: mongodb
          livenessProbe:
            tcpSocket:
              port: mongodb
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
      volumes:
        - name: mongo-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mongo
  namespace: ims-demo-lab
spec:
  selector:
    app: mongo
  ports:
    - name: mongodb
      port: 27017
      targetPort: mongodb
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: ims-demo-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: docker.io/mysql:8.0
          env:
            - name: MYSQL_ALLOW_EMPTY_PASSWORD
              value: "yes"
            - name: MYSQL_ROOT_HOST
              value: "%"
          ports:
            - containerPort: 3306
              name: mysql
          startupProbe:
            tcpSocket:
              port: mysql
            periodSeconds: 5
            failureThreshold: 24
          readinessProbe:
            tcpSocket:
              port: mysql
          livenessProbe:
            tcpSocket:
              port: mysql
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 250m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: ims-demo-lab
spec:
  selector:
    app: mysql
  ports:
    - name: mysql
      port: 3306
      targetPort: mysql
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openimss-webui
  namespace: ims-demo-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openimss-webui
  template:
    metadata:
      labels:
        app: openimss-webui
    spec:
      containers:
        - name: open5gs
          image: image-registry.openshift-image-registry.svc:5000/ims-demo-lab/openimss-open5gs:latest
          env:
            - name: COMPONENT_NAME
              value: webui
            - name: MONGO_IP
              value: mongo.ims-sipp.svc.cluster.local
            - name: WEBUI_WORKDIR
              value: /tmp/openimss-webui
          ports:
            - containerPort: 9999
              name: http
          volumeMounts:
            - name: webui-config
              mountPath: /mnt/webui/webui_init.sh
              subPath: webui_init.sh
          startupProbe:
            tcpSocket:
              port: http
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 250m
              memory: 1Gi
      volumes:
        - name: webui-config
          configMap:
            name: openimss-webui-config
            defaultMode: 493
---
apiVersion: v1
kind: Service
metadata:
  name: openimss-webui
  namespace: ims-demo-lab
spec:
  selector:
    app: openimss-webui
  ports:
    - name: http
      port: 9999
      targetPort: http
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: openimss-webui
  namespace: ims-demo-lab
spec:
  to:
    kind: Service
    name: openimss-webui
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ims-hss
  namespace: ims-demo-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ims-hss
  template:
    metadata:
      labels:
        app: ims-hss
    spec:
      containers:
        - name: open5gs
          image: image-registry.openshift-image-registry.svc:5000/ims-demo-lab/openimss-open5gs:latest
          env:
            - name: COMPONENT_NAME
              value: hss-1
            - name: MONGO_IP
              value: mongo.ims-sipp.svc.cluster.local
            - name: HSS_IP
              value: ims-hss.ims-sipp.svc.cluster.local
            - name: MME_IP
              value: 127.0.0.1
            - name: MCC
              value: "001"
            - name: MNC
              value: "01"
            - name: DIAMETER_REALM
              value: ims-sipp.svc.cluster.local
            - name: HSS_DIAMETER_IDENTITY
              value: ims-hss.ims-sipp.svc.cluster.local
          ports:
            - containerPort: 3868
              name: diameter
              protocol: TCP
            - containerPort: 5868
              name: diameter-alt
              protocol: TCP
          volumeMounts:
            - name: hss-config
              mountPath: /mnt/hss/hss.yaml
              subPath: hss.yaml
            - name: hss-config
              mountPath: /mnt/hss/hss.conf
              subPath: hss.conf
            - name: hss-config
              mountPath: /mnt/hss/make_certs.sh
              subPath: make_certs.sh
            - name: hss-config
              mountPath: /mnt/hss/hss_init.sh
              subPath: hss_init.sh
            - name: hss-open5gs-config
              mountPath: /open5gs/install/etc/open5gs
            - name: hss-freediameter-config
              mountPath: /open5gs/install/etc/freeDiameter
            - name: hss-log-dir
              mountPath: /open5gs/install/var/log/open5gs
          readinessProbe:
            tcpSocket:
              port: diameter
          livenessProbe:
            tcpSocket:
              port: diameter
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: hss-config
          configMap:
            name: openimss-hss-config
            defaultMode: 493
        - name: hss-open5gs-config
          emptyDir: {}
        - name: hss-freediameter-config
          emptyDir: {}
        - name: hss-log-dir
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: ims-hss
  namespace: ims-demo-lab
spec:
  selector:
    app: ims-hss
  ports:
    - name: diameter
      port: 3868
      targetPort: diameter
      protocol: TCP
    - name: diameter-alt
      port: 5868
      targetPort: diameter-alt
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ims-icscf
  namespace: ims-demo-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ims-icscf
  template:
    metadata:
      labels:
        app: ims-icscf
    spec:
      initContainers:
        - name: init-opensips-config
          image: image-registry.openshift-image-registry.svc:5000/ims-demo-lab/openimss-opensips:latest
          command:
            - /bin/sh
            - -c
            - mkdir -p /work/db && cp -Lr /mnt/opensips-config/* /work/
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          volumeMounts:
            - name: icscf-config-src
              mountPath: /mnt/opensips-config
            - name: icscf-config-workdir
              mountPath: /work
      containers:
        - name: opensips
          image: image-registry.openshift-image-registry.svc:5000/ims-demo-lab/openimss-opensips:latest
          env:
            - name: COMPONENT_NAME
              value: icscf-1
            - name: OPENSIPS_TEMPLATE
              value: icscf
          ports:
            - containerPort: 4060
              name: sip-udp
              protocol: UDP
            - containerPort: 4060
              name: sip-tcp
              protocol: TCP
            - containerPort: 3866
              name: diameter
              protocol: TCP
          volumeMounts:
            - name: icscf-config-workdir
              mountPath: /etc/opensips
            - name: icscf-run-dir
              mountPath: /run/opensips
          readinessProbe:
            tcpSocket:
              port: sip-tcp
          livenessProbe:
            tcpSocket:
              port: sip-tcp
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: icscf-config-src
          configMap:
            name: openimss-icscf-config
            defaultMode: 420
        - name: icscf-config-workdir
          emptyDir: {}
        - name: icscf-run-dir
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: ims-icscf
  namespace: ims-demo-lab
spec:
  selector:
    app: ims-icscf
  ports:
    - name: sip-udp
      port: 4060
      targetPort: sip-udp
      protocol: UDP
    - name: sip-tcp
      port: 4060
      targetPort: sip-tcp
      protocol: TCP
    - name: diameter
      port: 3866
      targetPort: diameter
      protocol: TCP
---
