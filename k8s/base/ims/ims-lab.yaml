apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo
  namespace: ims-demo-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
        - name: mongo
          image: docker.io/mongo:7.0
          args:
            - --bind_ip_all
            - --dbpath
            - /tmp/mongo
          ports:
            - containerPort: 27017
              name: mongodb
          volumeMounts:
            - name: mongo-data
              mountPath: /tmp/mongo
          readinessProbe:
            tcpSocket:
              port: mongodb
          livenessProbe:
            tcpSocket:
              port: mongodb
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
      volumes:
        - name: mongo-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mongo
  namespace: ims-demo-lab
spec:
  selector:
    app: mongo
  ports:
    - name: mongodb
      port: 27017
      targetPort: mongodb
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: ims-demo-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: docker.io/mysql:8.0
          env:
            - name: MYSQL_ALLOW_EMPTY_PASSWORD
              value: "yes"
            - name: MYSQL_ROOT_HOST
              value: "%"
          ports:
            - containerPort: 3306
              name: mysql
          readinessProbe:
            tcpSocket:
              port: mysql
          livenessProbe:
            tcpSocket:
              port: mysql
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: ims-demo-lab
spec:
  selector:
    app: mysql
  ports:
    - name: mysql
      port: 3306
      targetPort: mysql
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openimss-webui
  namespace: ims-demo-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openimss-webui
  template:
    metadata:
      labels:
        app: openimss-webui
    spec:
      containers:
        - name: open5gs
          image: image-registry.openshift-image-registry.svc:5000/ims-demo-lab/openimss-open5gs:latest
          env:
            - name: COMPONENT_NAME
              value: webui
            - name: MONGO_IP
              value: mongo.ims-demo-lab.svc.cluster.local
          ports:
            - containerPort: 3000
              name: http
          volumeMounts:
            - name: webui-config
              mountPath: /mnt/webui/webui_init.sh
              subPath: webui_init.sh
          readinessProbe:
            tcpSocket:
              port: http
          livenessProbe:
            tcpSocket:
              port: http
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
      volumes:
        - name: webui-config
          configMap:
            name: openimss-webui-config
            defaultMode: 493
---
apiVersion: v1
kind: Service
metadata:
  name: openimss-webui
  namespace: ims-demo-lab
spec:
  selector:
    app: openimss-webui
  ports:
    - name: http
      port: 3000
      targetPort: http
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: openimss-webui
  namespace: ims-demo-lab
spec:
  to:
    kind: Service
    name: openimss-webui
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ims-hss
  namespace: ims-demo-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ims-hss
  template:
    metadata:
      labels:
        app: ims-hss
    spec:
      containers:
        - name: open5gs
          image: image-registry.openshift-image-registry.svc:5000/ims-demo-lab/openimss-open5gs:latest
          env:
            - name: COMPONENT_NAME
              value: hss-1
            - name: MONGO_IP
              value: mongo.ims-demo-lab.svc.cluster.local
            - name: HSS_IP
              value: ims-hss.ims-demo-lab.svc.cluster.local
            - name: MME_IP
              value: mme-placeholder
            - name: MCC
              value: "001"
            - name: MNC
              value: "01"
          ports:
            - containerPort: 3868
              name: diameter
              protocol: TCP
            - containerPort: 5868
              name: diameter-alt
              protocol: TCP
          volumeMounts:
            - name: hss-config
              mountPath: /mnt/hss/hss.yaml
              subPath: hss.yaml
            - name: hss-config
              mountPath: /mnt/hss/hss.conf
              subPath: hss.conf
            - name: hss-config
              mountPath: /mnt/hss/make_certs.sh
              subPath: make_certs.sh
            - name: hss-config
              mountPath: /mnt/hss/hss_init.sh
              subPath: hss_init.sh
          readinessProbe:
            tcpSocket:
              port: diameter
          livenessProbe:
            tcpSocket:
              port: diameter
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
      volumes:
        - name: hss-config
          configMap:
            name: openimss-hss-config
            defaultMode: 493
---
apiVersion: v1
kind: Service
metadata:
  name: ims-hss
  namespace: ims-demo-lab
spec:
  selector:
    app: ims-hss
  ports:
    - name: diameter
      port: 3868
      targetPort: diameter
      protocol: TCP
    - name: diameter-alt
      port: 5868
      targetPort: diameter-alt
      protocol: TCP
---
