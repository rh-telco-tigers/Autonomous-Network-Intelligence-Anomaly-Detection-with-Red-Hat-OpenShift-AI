apiVersion: apps/v1
kind: Deployment
metadata:
  name: ims-pcscf
  namespace: ims-demo-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ims-pcscf
  template:
    metadata:
      labels:
        app: ims-pcscf
    spec:
      containers:
        - name: opensips
          image: image-registry.openshift-image-registry.svc:5000/ims-demo-lab/openimss-opensips:latest
          env:
            - name: COMPONENT_NAME
              value: pcscf-1
            - name: OPENSIPS_TEMPLATE
              value: pcscf
          ports:
            - containerPort: 5060
              name: sip-udp
              protocol: UDP
            - containerPort: 5060
              name: sip-tcp
              protocol: TCP
            - containerPort: 3866
              name: diameter
              protocol: TCP
          volumeMounts:
            - name: pcscf-config
              mountPath: /etc/opensips
            - name: pcscf-dispatcher
              mountPath: /etc/opensips/db/dispatcher
              subPath: dispatcher
          readinessProbe:
            tcpSocket:
              port: sip-tcp
          livenessProbe:
            tcpSocket:
              port: sip-tcp
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
      volumes:
        - name: pcscf-config
          configMap:
            name: openimss-pcscf-config
            defaultMode: 420
            items:
              - key: opensips.m4.template
                path: opensips.m4.template
              - key: opensips_proxy.m4
                path: opensips_proxy.m4
              - key: freeDiameter.conf
                path: freeDiameter.conf
              - key: pcscf.dictionary
                path: pcscf.dictionary
        - name: pcscf-dispatcher
          configMap:
            name: openimss-pcscf-config
            defaultMode: 420
            items:
              - key: dispatcher
                path: dispatcher
---
