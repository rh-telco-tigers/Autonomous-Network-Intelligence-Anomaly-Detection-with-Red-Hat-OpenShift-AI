apiVersion: apps/v1
kind: Deployment
metadata:
  name: ims-pcscf
  namespace: ims-demo-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ims-pcscf
  template:
    metadata:
      labels:
        app: ims-pcscf
    spec:
      containers:
        - name: ims-node
          image: ims-node:latest
          env:
            - name: IMS_NODE_ID
              value: pcscf-1
            - name: IMS_NODE_ROLE
              value: P-CSCF
            - name: SIP_PORT
              value: "5060"
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 5060
              name: sip-udp
              protocol: UDP
            - containerPort: 5060
              name: sip-tcp
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
          resources:
            requests:
              cpu: 25m
              memory: 128Mi
            limits:
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ims-pcscf
  namespace: ims-demo-lab
spec:
  selector:
    app: ims-pcscf
  ports:
    - name: http
      port: 8080
      targetPort: http
    - name: sip-udp
      port: 5060
      targetPort: sip-udp
      protocol: UDP
    - name: sip-tcp
      port: 5060
      targetPort: sip-tcp
      protocol: TCP
---
