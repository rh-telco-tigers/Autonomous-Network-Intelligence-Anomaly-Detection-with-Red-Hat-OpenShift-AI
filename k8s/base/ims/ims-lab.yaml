spec:
  selector:
    app: ims-pcscf
  ports:
    - name: sip-udp
      port: 5060
      targetPort: sip-udp
      protocol: UDP
    - name: sip-tcp
      port: 5060
      targetPort: sip-tcp
      protocol: TCP
    - name: diameter
      port: 3866
      targetPort: diameter
      protocol: TCP
