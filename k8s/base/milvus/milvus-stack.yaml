apiVersion: v1
kind: Secret
metadata:
  name: milvus-minio-credentials
  namespace: ani-demo-lab
type: Opaque
stringData:
  accesskey: minioadmin
  secretkey: minioadmin
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: milvus-etcd-data
  namespace: ani-demo-lab
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: milvus-minio-data
  namespace: ani-demo-lab
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: milvus-data
  namespace: ani-demo-lab
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: milvus-etcd
  namespace: ani-demo-lab
spec:
  selector:
    app: milvus-etcd
  ports:
    - name: client
      port: 2379
      targetPort: 2379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: milvus-etcd
  namespace: ani-demo-lab
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: milvus-etcd
  template:
    metadata:
      labels:
        app: milvus-etcd
    spec:
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: milvus-etcd-data
      containers:
        - name: etcd
          image: quay.io/coreos/etcd:v3.5.14
          command:
            - /usr/local/bin/etcd
          args:
            - --advertise-client-urls=http://0.0.0.0:2379
            - --listen-client-urls=http://0.0.0.0:2379
            - --data-dir=/etcd
          volumeMounts:
            - name: data
              mountPath: /etcd
          ports:
            - containerPort: 2379
          startupProbe:
            httpGet:
              path: /health
              port: 2379
            periodSeconds: 2
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /health
              port: 2379
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 2379
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: milvus-minio
  namespace: ani-demo-lab
spec:
  selector:
    app: milvus-minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: milvus-minio
  namespace: ani-demo-lab
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: milvus-minio
  template:
    metadata:
      labels:
        app: milvus-minio
    spec:
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: milvus-minio-data
      containers:
        - name: minio
          image: quay.io/minio/minio:RELEASE.2024-08-03T04-33-23Z
          args:
            - server
            - /data
            - --console-address=:9001
          volumeMounts:
            - name: data
              mountPath: /data
          ports:
            - containerPort: 9000
            - containerPort: 9001
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: milvus-minio-credentials
                  key: accesskey
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: milvus-minio-credentials
                  key: secretkey
          startupProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            periodSeconds: 2
            failureThreshold: 90
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: milvus
  namespace: ani-demo-lab
spec:
  selector:
    app: milvus
  ports:
    - name: grpc
      port: 19530
      targetPort: 19530
    - name: http
      port: 9091
      targetPort: 9091
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: milvus
  namespace: ani-demo-lab
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: milvus
  template:
    metadata:
      labels:
        app: milvus
    spec:
      initContainers:
        - name: wait-for-etcd
          image: docker.io/milvusdb/milvus:v2.4.13
          command:
            - /bin/sh
            - -c
          args:
            - |
              until curl -fsS --max-time 2 http://milvus-etcd:2379/health | grep -q '"health":"true"'; do
                echo "waiting for milvus-etcd"
                sleep 2
              done
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
        - name: wait-for-minio
          image: docker.io/milvusdb/milvus:v2.4.13
          command:
            - /bin/sh
            - -c
          args:
            - |
              until curl -fsS --max-time 2 http://milvus-minio:9000/minio/health/ready; do
                echo "waiting for milvus-minio"
                sleep 2
              done
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: milvus-data
      containers:
        - name: milvus
          image: docker.io/milvusdb/milvus:v2.4.13
          command:
            - milvus
          args:
            - run
            - standalone
          ports:
            - containerPort: 19530
            - containerPort: 9091
          env:
            - name: ETCD_ENDPOINTS
              value: milvus-etcd:2379
            - name: MINIO_ADDRESS
              value: milvus-minio:9000
            - name: MINIO_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: milvus-minio-credentials
                  key: accesskey
            - name: MINIO_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: milvus-minio-credentials
                  key: secretkey
          volumeMounts:
            - name: data
              mountPath: /var/lib/milvus
          startupProbe:
            httpGet:
              path: /healthz
              port: 9091
            periodSeconds: 2
            failureThreshold: 120
          readinessProbe:
            httpGet:
              path: /healthz
              port: 9091
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9091
            initialDelaySeconds: 45
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              cpu: 1
              memory: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: milvus-attu
  namespace: ani-demo-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: milvus-attu
  template:
    metadata:
      labels:
        app: milvus-attu
    spec:
      containers:
        - name: attu
          image: docker.io/zilliz/attu:v2.4.12
          env:
            - name: MILVUS_URL
              value: milvus:19530
            - name: SERVER_PORT
              value: "3000"
          ports:
            - containerPort: 3000
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: milvus-attu
  namespace: ani-demo-lab
spec:
  selector:
    app: milvus-attu
  ports:
    - name: http
      port: 3000
      targetPort: http
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: milvus-attu
  namespace: ani-demo-lab
spec:
  to:
    kind: Service
    name: milvus-attu
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: milvus-bootstrap
  namespace: ani-demo-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: milvus-bootstrap
  template:
    metadata:
      labels:
        app: milvus-bootstrap
    spec:
      containers:
        - name: bootstrap
          image: image-registry.openshift-image-registry.svc:5000/ani-demo-lab/rca-service:latest
          command:
            - /bin/sh
            - -c
          args:
            - |
              set -u
              while true; do
                until python -c "from pymilvus import MilvusClient; MilvusClient(uri='http://milvus:19530').list_collections(); print('ready')"; do
                  sleep 5
                done
                export MILVUS_URI=http://milvus:19530
                export RAG_ROOT_DIR=ai/rag
                export PYTHONPATH=/app:${PYTHONPATH:-}
                export MILVUS_BOOTSTRAP_RECREATE_COLLECTIONS=false
              python - <<'PY'
              import json
              import os
              import sys
              from pathlib import Path

              try:
                  from shared.rag import (
                      DEFAULT_MILVUS_COLLECTIONS,
                      LEGACY_MILVUS_COLLECTIONS,
                      LOCAL_COLLECTION_DIRS,
                      build_local_seed_records,
                      ensure_milvus_collection,
                      ensure_milvus_collection_ready,
                      milvus_client,
                  )
              except ModuleNotFoundError:
                  from services.shared.rag import (
                      DEFAULT_MILVUS_COLLECTIONS,
                      LEGACY_MILVUS_COLLECTIONS,
                      LOCAL_COLLECTION_DIRS,
                      build_local_seed_records,
                      ensure_milvus_collection,
                      ensure_milvus_collection_ready,
                      milvus_client,
                  )

              client = milvus_client()
              if client is None:
                  raise SystemExit("Milvus client is unavailable")

              rag_root = Path(os.getenv("RAG_ROOT_DIR", "ai/rag"))
              summary = {}
              for collection_name in LEGACY_MILVUS_COLLECTIONS:
                  try:
                      if client.has_collection(collection_name=collection_name):
                          client.drop_collection(collection_name=collection_name)
                  except Exception:
                      pass

              for collection_name in DEFAULT_MILVUS_COLLECTIONS:
                  docs = []
                  source_dir = rag_root / LOCAL_COLLECTION_DIRS[collection_name]
                  for path in sorted(source_dir.rglob("*")):
                      if path.is_file():
                          docs.extend(build_local_seed_records(path, collection_name))
                  if not ensure_milvus_collection(client, collection_name):
                      raise SystemExit(f"Failed to ensure Milvus collection {collection_name}")
                  if docs:
                      client.upsert(collection_name=collection_name, data=docs)
                  if not ensure_milvus_collection_ready(client, collection_name, load=True, force=True):
                      raise SystemExit(f"Failed to load Milvus collection {collection_name}")
                  summary[collection_name] = len(docs)

              print(json.dumps({"collections": summary, "dropped_legacy": list(LEGACY_MILVUS_COLLECTIONS)}, indent=2))
              PY
                if [ "$?" -eq 0 ]; then
                  echo "Milvus bootstrap completed"
                else
                  echo "Milvus bootstrap failed" >&2
                fi
                sleep "${MILVUS_BOOTSTRAP_INTERVAL_SECONDS:-300}"
              done
          env:
            - name: MILVUS_CONNECT_ATTEMPTS
              value: "20"
            - name: MILVUS_CONNECT_BACKOFF_SECONDS
              value: "2"
            - name: MILVUS_LOAD_TIMEOUT_SECONDS
              value: "60"
          resources:
            requests:
              cpu: 50m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
