apiVersion: v1
kind: Secret
metadata:
  name: milvus-minio-credentials
  namespace: ims-demo-lab
type: Opaque
stringData:
  accesskey: minioadmin
  secretkey: minioadmin
---
apiVersion: v1
kind: Service
metadata:
  name: milvus-etcd
  namespace: ims-demo-lab
spec:
  selector:
    app: milvus-etcd
  ports:
    - name: client
      port: 2379
      targetPort: 2379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: milvus-etcd
  namespace: ims-demo-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: milvus-etcd
  template:
    metadata:
      labels:
        app: milvus-etcd
    spec:
      containers:
        - name: etcd
          image: quay.io/coreos/etcd:v3.5.14
          command:
            - /usr/local/bin/etcd
          args:
            - --advertise-client-urls=http://0.0.0.0:2379
            - --listen-client-urls=http://0.0.0.0:2379
            - --data-dir=/etcd
          ports:
            - containerPort: 2379
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: milvus-minio
  namespace: ims-demo-lab
spec:
  selector:
    app: milvus-minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: milvus-minio
  namespace: ims-demo-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: milvus-minio
  template:
    metadata:
      labels:
        app: milvus-minio
    spec:
      containers:
        - name: minio
          image: quay.io/minio/minio:RELEASE.2024-08-03T04-33-23Z
          args:
            - server
            - /data
            - --console-address=:9001
          ports:
            - containerPort: 9000
            - containerPort: 9001
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: milvus-minio-credentials
                  key: accesskey
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: milvus-minio-credentials
                  key: secretkey
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: milvus
  namespace: ims-demo-lab
spec:
  selector:
    app: milvus
  ports:
    - name: grpc
      port: 19530
      targetPort: 19530
    - name: http
      port: 9091
      targetPort: 9091
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: milvus
  namespace: ims-demo-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: milvus
  template:
    metadata:
      labels:
        app: milvus
    spec:
      containers:
        - name: milvus
          image: docker.io/milvusdb/milvus:v2.4.13
          command:
            - milvus
          args:
            - run
            - standalone
          ports:
            - containerPort: 19530
            - containerPort: 9091
          env:
            - name: ETCD_ENDPOINTS
              value: milvus-etcd:2379
            - name: MINIO_ADDRESS
              value: milvus-minio:9000
            - name: MINIO_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: milvus-minio-credentials
                  key: accesskey
            - name: MINIO_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: milvus-minio-credentials
                  key: secretkey
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              memory: 2Gi

