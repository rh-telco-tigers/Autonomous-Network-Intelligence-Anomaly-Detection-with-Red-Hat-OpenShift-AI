apiVersion: feast.dev/v1
kind: FeatureStore
metadata:
  name: ims-featurestore
  namespace: ims-demo-lab
  labels:
    feature-store-ui: enabled
    opendatahub.io/dashboard: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "40"
    openshift.io/display-name: IMS Feature Store
spec:
  feastProject: ims_anomaly_featurestore
  feastProjectDir:
    init:
      template: local
      minimal: true
  services:
    volumes:
      - name: feature-repo
        configMap:
          name: ims-featurestore-repo
    registry:
      local:
        server:
          restAPI: true
          env:
            - name: IMS_FEATURESTORE_OFFLINE_SOURCE_PATH
              valueFrom:
                configMapKeyRef:
                  name: ims-featurestore-config
                  key: FEATURESTORE_OFFLINE_SOURCE_PATH
            - name: IMS_FEATURESTORE_LABEL_SOURCE_PATH
              valueFrom:
                configMapKeyRef:
                  name: ims-featurestore-config
                  key: FEATURESTORE_LABEL_SOURCE_PATH
            - name: FEAST_S3_ENDPOINT_URL
              valueFrom:
                configMapKeyRef:
                  name: ims-platform-config
                  key: FEAST_S3_ENDPOINT_URL
            - name: AWS_S3_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: ims-platform-config
                  key: FEAST_S3_ENDPOINT_URL
            - name: AWS_REGION
              value: us-east-1
          envFrom:
            - secretRef:
                name: model-storage-credentials
          volumeMounts:
            - name: feature-repo
              mountPath: /feast-data/ims_anomaly_featurestore/feature_repo/entities.py
              subPath: entities.py
            - name: feature-repo
              mountPath: /feast-data/ims_anomaly_featurestore/feature_repo/feature_views.py
              subPath: feature_views.py
            - name: feature-repo
              mountPath: /feast-data/ims_anomaly_featurestore/feature_repo/feature_services.py
              subPath: feature_services.py
    onlineStore:
      server:
        env:
          - name: IMS_FEATURESTORE_OFFLINE_SOURCE_PATH
            valueFrom:
              configMapKeyRef:
                name: ims-featurestore-config
                key: FEATURESTORE_OFFLINE_SOURCE_PATH
          - name: IMS_FEATURESTORE_LABEL_SOURCE_PATH
            valueFrom:
              configMapKeyRef:
                name: ims-featurestore-config
                key: FEATURESTORE_LABEL_SOURCE_PATH
          - name: FEAST_S3_ENDPOINT_URL
            valueFrom:
              configMapKeyRef:
                name: ims-platform-config
                key: FEAST_S3_ENDPOINT_URL
          - name: AWS_S3_ENDPOINT
            valueFrom:
              configMapKeyRef:
                name: ims-platform-config
                key: FEAST_S3_ENDPOINT_URL
          - name: AWS_REGION
            value: us-east-1
        envFrom:
          - secretRef:
              name: model-storage-credentials
        volumeMounts:
          - name: feature-repo
            mountPath: /feast-data/ims_anomaly_featurestore/feature_repo/entities.py
            subPath: entities.py
          - name: feature-repo
            mountPath: /feast-data/ims_anomaly_featurestore/feature_repo/feature_views.py
            subPath: feature_views.py
          - name: feature-repo
            mountPath: /feast-data/ims_anomaly_featurestore/feature_repo/feature_services.py
            subPath: feature_services.py
    ui:
      volumeMounts:
        - name: feature-repo
          mountPath: /feast-data/ims_anomaly_featurestore/feature_repo/entities.py
          subPath: entities.py
        - name: feature-repo
          mountPath: /feast-data/ims_anomaly_featurestore/feature_repo/feature_views.py
          subPath: feature_views.py
        - name: feature-repo
          mountPath: /feast-data/ims_anomaly_featurestore/feature_repo/feature_services.py
          subPath: feature_services.py
