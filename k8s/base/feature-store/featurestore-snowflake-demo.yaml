apiVersion: feast.dev/v1
kind: FeatureStore
metadata:
  name: ani-featurestore-snowflake
  namespace: ani-demo-lab
  labels:
    feature-store-ui: enabled
    opendatahub.io/dashboard: "true"
  annotations:
    openshift.io/display-name: ANI Feature Store (Snowflake Demo)
spec:
  feastProject: ani_anomaly_featurestore
  feastProjectDir:
    init:
      template: local
      minimal: true
  services:
    volumes:
      - name: feature-repo
        configMap:
          # Reuse the same feature definitions as the main feature store
          name: ani-featurestore-repo
    registry:
      local:
        server:
          restAPI: true
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          env:
            - name: IMS_FEATURESTORE_OFFLINE_SOURCE_PATH
              valueFrom:
                configMapKeyRef:
                  name: ani-featurestore-config
                  key: FEATURESTORE_OFFLINE_SOURCE_PATH
            - name: IMS_FEATURESTORE_LABEL_SOURCE_PATH
              valueFrom:
                configMapKeyRef:
                  name: ani-featurestore-config
                  key: FEATURESTORE_LABEL_SOURCE_PATH
            - name: FEAST_S3_ENDPOINT_URL
              valueFrom:
                configMapKeyRef:
                  name: ani-platform-config
                  key: FEAST_S3_ENDPOINT_URL
            - name: AWS_S3_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: ani-platform-config
                  key: FEAST_S3_ENDPOINT_URL
            - name: AWS_REGION
              value: us-east-1
          envFrom:
            - secretRef:
                name: model-storage-credentials
          volumeMounts:
            - name: feature-repo
              mountPath: /feast-data/ani_anomaly_featurestore/feature_repo/entities.py
              subPath: entities.py
            - name: feature-repo
              mountPath: /feast-data/ani_anomaly_featurestore/feature_repo/feature_views.py
              subPath: feature_views.py
            - name: feature-repo
              mountPath: /feast-data/ani_anomaly_featurestore/feature_repo/feature_services.py
              subPath: feature_services.py
    onlineStore:
      # Snowflake as online store — only ani_window_numeric_v1 is materialized here (scoring only)
      snowflake:
        account: HHGIGXU-OSC16681
        database: ANI_FEAST_DEMO
        schema: FEAST_ONLINE
        warehouse: ANI_FEAST_WH
        role: ACCOUNTADMIN
        credentialsSecret:
          name: snowflake-feast-credentials
      server:
        env:
          - name: IMS_FEATURESTORE_OFFLINE_SOURCE_PATH
            valueFrom:
              configMapKeyRef:
                name: ani-featurestore-config
                key: FEATURESTORE_OFFLINE_SOURCE_PATH
          - name: IMS_FEATURESTORE_LABEL_SOURCE_PATH
            valueFrom:
              configMapKeyRef:
                name: ani-featurestore-config
                key: FEATURESTORE_LABEL_SOURCE_PATH
          - name: FEAST_S3_ENDPOINT_URL
            valueFrom:
              configMapKeyRef:
                name: ani-platform-config
                key: FEAST_S3_ENDPOINT_URL
          - name: AWS_S3_ENDPOINT
            valueFrom:
              configMapKeyRef:
                name: ani-platform-config
                key: FEAST_S3_ENDPOINT_URL
          - name: AWS_REGION
            value: us-east-1
        envFrom:
          - secretRef:
              name: model-storage-credentials
          - secretRef:
              name: snowflake-feast-credentials
        volumeMounts:
          - name: feature-repo
            mountPath: /feast-data/ani_anomaly_featurestore/feature_repo/entities.py
            subPath: entities.py
          - name: feature-repo
            mountPath: /feast-data/ani_anomaly_featurestore/feature_repo/feature_views.py
            subPath: feature_views.py
          - name: feature-repo
            mountPath: /feast-data/ani_anomaly_featurestore/feature_repo/feature_services.py
            subPath: feature_services.py
    ui:
      volumeMounts:
        - name: feature-repo
          mountPath: /feast-data/ani_anomaly_featurestore/feature_repo/entities.py
          subPath: entities.py
        - name: feature-repo
          mountPath: /feast-data/ani_anomaly_featurestore/feature_repo/feature_views.py
          subPath: feature_views.py
        - name: feature-repo
          mountPath: /feast-data/ani_anomaly_featurestore/feature_repo/feature_services.py
          subPath: feature_services.py
