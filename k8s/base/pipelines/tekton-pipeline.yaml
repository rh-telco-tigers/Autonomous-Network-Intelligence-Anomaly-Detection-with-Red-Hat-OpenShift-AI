apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: ims-demo-container-build
  namespace: ims-demo-lab
spec:
  params:
    - name: git-url
      type: string
    - name: git-revision
      type: string
      default: main
  workspaces:
    - name: source
  tasks:
    - name: clone
      taskRef:
        name: git-clone-lite
      params:
        - name: URL
          value: $(params.git-url)
        - name: REVISION
          value: $(params.git-revision)
        - name: DELETE_EXISTING
          value: "true"
      workspaces:
        - name: output
          workspace: source
    - name: build-sipp-runner
      runAfter:
        - clone
      taskRef:
        name: buildah-lite
      params:
        - name: IMAGE
          value: image-registry.openshift-image-registry.svc:5000/ims-demo-lab/sipp-runner:latest
        - name: CONTEXT
          value: .
        - name: DOCKERFILE
          value: services/sipp-runner/Containerfile
      workspaces:
        - name: source
          workspace: source
    - name: build-feature-gateway
      runAfter:
        - build-sipp-runner
      taskRef:
        name: buildah-lite
      params:
        - name: IMAGE
          value: image-registry.openshift-image-registry.svc:5000/ims-demo-lab/feature-gateway:latest
        - name: CONTEXT
          value: .
        - name: DOCKERFILE
          value: services/feature-gateway/Containerfile
      workspaces:
        - name: source
          workspace: source
    - name: build-anomaly-service
      runAfter:
        - build-feature-gateway
      taskRef:
        name: buildah-lite
      params:
        - name: IMAGE
          value: image-registry.openshift-image-registry.svc:5000/ims-demo-lab/anomaly-service:latest
        - name: CONTEXT
          value: .
        - name: DOCKERFILE
          value: services/anomaly-service/Containerfile
      workspaces:
        - name: source
          workspace: source
    - name: build-rca-service
      runAfter:
        - build-anomaly-service
      taskRef:
        name: buildah-lite
      params:
        - name: IMAGE
          value: image-registry.openshift-image-registry.svc:5000/ims-demo-lab/rca-service:latest
        - name: CONTEXT
          value: .
        - name: DOCKERFILE
          value: services/rca-service/Containerfile
      workspaces:
        - name: source
          workspace: source
    - name: build-demo-ui
      runAfter:
        - build-rca-service
      taskRef:
        name: buildah-lite
      params:
        - name: IMAGE
          value: image-registry.openshift-image-registry.svc:5000/ims-demo-lab/demo-ui:latest
        - name: CONTEXT
          value: .
        - name: DOCKERFILE
          value: services/demo-ui/Containerfile
      workspaces:
        - name: source
          workspace: source
    - name: build-control-plane
      runAfter:
        - build-demo-ui
      taskRef:
        name: buildah-lite
      params:
        - name: IMAGE
          value: image-registry.openshift-image-registry.svc:5000/ims-demo-lab/control-plane:latest
        - name: CONTEXT
          value: .
        - name: DOCKERFILE
          value: services/control-plane/Containerfile
      workspaces:
        - name: source
          workspace: source
    - name: build-ims-ai-trainer
      runAfter:
        - build-control-plane
      taskRef:
        name: buildah-lite
      params:
        - name: IMAGE
          value: image-registry.openshift-image-registry.svc:5000/ims-demo-lab/ims-ai-trainer:latest
        - name: CONTEXT
          value: .
        - name: DOCKERFILE
          value: ai/training/Containerfile
      workspaces:
        - name: source
          workspace: source
