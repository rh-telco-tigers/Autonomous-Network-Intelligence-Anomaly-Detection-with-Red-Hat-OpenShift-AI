  name: anomaly-service
  namespace: ims-demo-lab
spec:
  lookupPolicy:
    local: false
---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: rca-service
  namespace: ims-demo-lab
spec:
  lookupPolicy:
    local: false
---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: demo-ui
  namespace: ims-demo-lab
spec:
  lookupPolicy:
    local: false
---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: control-plane
  namespace: ims-demo-lab
spec:
  lookupPolicy:
    local: false
---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: ims-ai-trainer
  namespace: ims-demo-lab
