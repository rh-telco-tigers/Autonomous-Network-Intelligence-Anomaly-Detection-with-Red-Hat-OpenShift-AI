apiVersion: batch/v1
kind: CronJob
metadata:
  name: sipp-normal-traffic
  namespace: ani-demo-lab
spec:
  schedule: "*/10 * * * *"
  suspend: false
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 0
      ttlSecondsAfterFinished: 300
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: sipp
              image: image-registry.openshift-image-registry.svc:5000/ani-demo-lab/sipp-runner:latest
              imagePullPolicy: Always
              envFrom:
                - configMapRef:
                    name: ani-platform-config
              args:
                - --target-host
                - $(IMS_PCSCF_HOST)
                - --target-port
                - "5060"
                - --scenario-file
                - /scenarios/register-normal.xml
                - --scenario-name
                - normal_operation
                - --transport
                - udp
                - --call-limit
                - "1"
                - --rate
                - "1"
                - --dataset-version
                - live-sipp-v1
              env:
                - name: DATASET_STORE_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: model-storage-credentials
                      key: AWS_ACCESS_KEY_ID
                - name: DATASET_STORE_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: model-storage-credentials
                      key: AWS_SECRET_ACCESS_KEY
                - name: CONTROL_PLANE_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: demo-api-auth
                      key: API_KEY
                - name: CONTROL_PLANE_INCIDENT_STATUS
                  value: resolved
                - name: CONTROL_PLANE_INCIDENT_MODEL_VERSION
                  value: sipp-scenario-labeler-v1
                - name: SIPP_EMIT_CONTROL_PLANE_INCIDENT
                  value: "true"
                - name: CONTROL_PLANE_INCIDENT_REQUIRED
                  value: "true"
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  memory: 256Mi
              volumeMounts:
                - name: scenarios
                  mountPath: /scenarios
          volumes:
            - name: scenarios
              configMap:
                name: sipp-scenarios
                defaultMode: 420
---
