apiVersion: batch/v1
kind: CronJob
metadata:
  name: sipp-normal-traffic
  namespace: ims-demo-lab
spec:
  schedule: "*/10 * * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: sipp
              image: sipp-runner:latest
              command:
                - /bin/sh
                - -c
              args:
                - >
                  sipp ims-pcscf.ims-demo-lab.svc.cluster.local:5060
                  -sf /scenarios/register-normal.xml
                  -m 50
                  -r 2
                  -trace_err
              volumeMounts:
                - name: scenarios
                  mountPath: /scenarios
          volumes:
            - name: scenarios
              configMap:
                name: sipp-scenarios
---
