apiVersion: batch/v1
kind: CronJob
metadata:
  name: sipp-normal-traffic
  namespace: ims-demo-lab
spec:
  schedule: "*/10 * * * *"
  suspend: false
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 0
      ttlSecondsAfterFinished: 300
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: sipp
              image: image-registry.openshift-image-registry.svc:5000/ims-demo-lab/sipp-runner:latest
              imagePullPolicy: Always
              args:
                - --target-host
                - ims-pcscf.ims-demo-lab.svc.cluster.local
                - --target-port
                - "5060"
                - --scenario-file
                - /scenarios/register-normal.xml
                - --scenario-name
                - normal
                - --transport
                - udp
                - --call-limit
                - "1"
                - --rate
                - "1"
                - --dataset-version
                - live-sipp-v1
              env:
                - name: DATASET_STORE_ENDPOINT
                  value: http://model-storage-minio.ims-demo-lab.svc.cluster.local:9000
                - name: DATASET_STORE_BUCKET
                  value: ims-models
                - name: DATASET_STORE_PREFIX
                  value: pipelines/ims-demo-lab/datasets
                - name: DATASET_STORE_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: model-storage-credentials
                      key: AWS_ACCESS_KEY_ID
                - name: DATASET_STORE_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: model-storage-credentials
                      key: AWS_SECRET_ACCESS_KEY
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  memory: 256Mi
              volumeMounts:
                - name: scenarios
                  mountPath: /scenarios
          volumes:
            - name: scenarios
              configMap:
                name: sipp-scenarios
                defaultMode: 420
---
