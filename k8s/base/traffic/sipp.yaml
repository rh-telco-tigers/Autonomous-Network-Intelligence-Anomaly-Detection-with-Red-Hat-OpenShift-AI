apiVersion: batch/v1
kind: CronJob
metadata:
  name: sipp-normal-traffic
  namespace: ims-demo-lab
spec:
  schedule: "*/10 * * * *"
  suspend: false
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 0
      ttlSecondsAfterFinished: 300
      template:
        spec:
          restartPolicy: Never
          dnsPolicy: ClusterFirst
          schedulerName: default-scheduler
          securityContext: {}
          terminationGracePeriodSeconds: 30
          containers:
            - name: sipp
              image: image-registry.openshift-image-registry.svc:5000/ims-demo-lab/sipp-runner:latest
              imagePullPolicy: Always
              workingDir: /tmp
              resources: {}
              terminationMessagePath: /dev/termination-log
              terminationMessagePolicy: File
              command:
                - /bin/sh
                - -c
              args:
                - >
                  sipp ims-pcscf.ims-demo-lab.svc.cluster.local:5060
                  -sf /scenarios/register-normal.xml
                  -m 1
                  -r 1
              volumeMounts:
                - name: scenarios
                  mountPath: /scenarios
          volumes:
            - name: scenarios
              configMap:
                name: sipp-scenarios
                defaultMode: 420
---
