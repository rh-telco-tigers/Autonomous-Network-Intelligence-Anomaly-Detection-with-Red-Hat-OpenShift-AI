apiVersion: v1
kind: ConfigMap
metadata:
  name: ims-demo-dashboard
  namespace: ims-demo-lab
  labels:
    grafana_dashboard: "1"
data:
  ims-demo-overview.json: |
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "panels": [
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "targets": [
            {
              "expr": "sum(increase(ims_demo_incidents_total[1h]))",
              "legendFormat": "incidents"
            }
          ],
          "title": "Incidents Per Hour",
          "type": "stat"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 8,
            "y": 0
          },
          "id": 2,
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(ims_demo_http_request_duration_seconds_bucket[5m])) by (le, service))",
              "legendFormat": "{{service}}"
            }
          ],
          "title": "Service P95 Latency",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 16,
            "y": 0
          },
          "id": 3,
          "targets": [
            {
              "expr": "histogram_quantile(0.5, sum(rate(ims_demo_rca_confidence_bucket[15m])) by (le, project, generation_mode))",
              "legendFormat": "{{project}} {{generation_mode}}"
            }
          ],
          "title": "Median RCA Confidence",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 8
          },
          "id": 4,
          "targets": [
            {
              "expr": "sum(increase(ims_demo_automation_actions_total[1h])) by (action, status)",
              "legendFormat": "{{action}} {{status}}"
            }
          ],
          "title": "Automation Actions",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 8
          },
          "id": 5,
          "targets": [
            {
              "expr": "sum(increase(ims_demo_model_promotions_total[24h])) by (stage, status)",
              "legendFormat": "{{stage}} {{status}}"
            }
          ],
          "title": "Model Promotions",
          "type": "timeseries"
        }
      ],
      "schemaVersion": 38,
      "style": "dark",
      "tags": [
        "ims-demo",
        "anomaly-detection"
      ],
      "templating": {
        "list": []
      },
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "timezone": "",
      "title": "IMS Demo Overview",
      "version": 1
    }
