apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: ani-predictive-model
  namespace: ani-demo-lab
spec:
  instanceSelector:
    matchLabels:
      dashboards: ani-demo
  json: |
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": {
            "type": "prometheus",
            "uid": "-- Grafana --"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 7,
            "w": 6,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "value_and_name"
          },
          "targets": [
            {
              "expr": "sum(nv_inference_count{job=\"ani-datascience/ani-predictive-fs-metrics\"})",
              "legendFormat": "runtime calls",
              "refId": "A"
            }
          ],
          "title": "Serving Runtime Calls (Total)",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "-- Grafana --"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 7,
            "w": 6,
            "x": 6,
            "y": 0
          },
          "id": 2,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "value_and_name"
          },
          "targets": [
            {
              "expr": "sum(ani_demo_http_requests_total{service=\"anomaly-service\",path=\"/score\"})",
              "legendFormat": "anomaly /score",
              "refId": "A"
            }
          ],
          "title": "Anomaly /score Requests (Total)",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "-- Grafana --"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 7,
            "w": 6,
            "x": 12,
            "y": 0
          },
          "id": 3,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "value_and_name"
          },
          "targets": [
            {
              "expr": "sum(increase(nv_inference_count{job=\"ani-datascience/ani-predictive-fs-metrics\"}[5m]))",
              "legendFormat": "requests",
              "refId": "A"
            }
          ],
          "title": "Serving Runtime Calls (5m)",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "-- Grafana --"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ms"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 7,
            "w": 6,
            "x": 18,
            "y": 0
          },
          "id": 4,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "value_and_name"
          },
          "targets": [
            {
              "expr": "sum(increase(ani_demo_http_requests_total{service=\"anomaly-service\",path=\"/score\"}[5m]))",
              "legendFormat": "anomaly /score",
              "refId": "A"
            }
          ],
          "title": "Anomaly /score Requests (5m)",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "-- Grafana --"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ops"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 7
          },
          "id": 5,
          "targets": [
            {
              "expr": "sum(increase(ani_demo_http_requests_total{service=\"anomaly-service\",path=\"/score\"}[5m]))",
              "legendFormat": "anomaly /score",
              "refId": "A"
            },
            {
              "expr": "sum(increase(nv_inference_count{job=\"ani-datascience/ani-predictive-fs-metrics\"}[5m]))",
              "legendFormat": "serving runtime",
              "refId": "B"
            }
          ],
          "title": "Request Path Trend (5m Increase)",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "-- Grafana --"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ms"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 7
          },
          "id": 6,
          "targets": [
            {
              "expr": "sum(rate(nv_inference_queue_duration_us{job=\"ani-datascience/ani-predictive-fs-metrics\"}[5m])) / clamp_min(sum(rate(nv_inference_count{job=\"ani-datascience/ani-predictive-fs-metrics\"}[5m])), 0.001) / 1000",
              "legendFormat": "queue",
              "refId": "A"
            },
            {
              "expr": "sum(rate(nv_inference_compute_input_duration_us{job=\"ani-datascience/ani-predictive-fs-metrics\"}[5m])) / clamp_min(sum(rate(nv_inference_count{job=\"ani-datascience/ani-predictive-fs-metrics\"}[5m])), 0.001) / 1000",
              "legendFormat": "input",
              "refId": "B"
            },
            {
              "expr": "sum(rate(nv_inference_compute_infer_duration_us{job=\"ani-datascience/ani-predictive-fs-metrics\"}[5m])) / clamp_min(sum(rate(nv_inference_count{job=\"ani-datascience/ani-predictive-fs-metrics\"}[5m])), 0.001) / 1000",
              "legendFormat": "infer",
              "refId": "C"
            },
            {
              "expr": "sum(rate(nv_inference_compute_output_duration_us{job=\"ani-datascience/ani-predictive-fs-metrics\"}[5m])) / clamp_min(sum(rate(nv_inference_count{job=\"ani-datascience/ani-predictive-fs-metrics\"}[5m])), 0.001) / 1000",
              "legendFormat": "output",
              "refId": "D"
            }
          ],
          "title": "Serving Runtime Stage Latency Breakdown (ms)",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "-- Grafana --"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 15
          },
          "id": 7,
          "targets": [
            {
              "expr": "sum(increase(ani_demo_http_requests_total{service=\"anomaly-service\",path=\"/score\"}[5m])) by (status)",
              "legendFormat": "status {{status}}",
              "refId": "A"
            }
          ],
          "title": "Anomaly /score Responses (5m)",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "-- Grafana --"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 15
          },
          "id": 8,
          "targets": [
            {
              "expr": "max(up{job=\"ani-datascience/ani-predictive-fs-metrics\"})",
              "legendFormat": "serving runtime",
              "refId": "A"
            },
            {
              "expr": "max(up{job=\"anomaly-service\",namespace=\"ani-runtime\"})",
              "legendFormat": "anomaly service",
              "refId": "B"
            },
            {
              "expr": "max(up{job=\"control-plane\",namespace=\"ani-runtime\"})",
              "legendFormat": "control plane",
              "refId": "C"
            }
          ],
          "title": "Serving Path Health",
          "type": "timeseries"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "style": "dark",
      "tags": [
        "ani-demo",
        "predictive-model",
        "triton"
      ],
      "templating": {
        "list": []
      },
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "timezone": "browser",
      "title": "IMS Predictive Serving Activity",
      "uid": "ani-predictive-model",
      "version": 2,
      "weekStart": ""
    }
