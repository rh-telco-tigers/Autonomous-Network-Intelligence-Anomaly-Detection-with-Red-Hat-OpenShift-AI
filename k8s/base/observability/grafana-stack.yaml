apiVersion: v1
kind: ServiceAccount
metadata:
  name: grafana-reader
  namespace: ani-demo-lab
---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-reader-token
  namespace: ani-demo-lab
  annotations:
    kubernetes.io/service-account.name: grafana-reader
type: kubernetes.io/service-account-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ani-demo-grafana-cluster-monitoring-view
subjects:
  - kind: ServiceAccount
    name: grafana-reader
    namespace: ani-demo-lab
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-monitoring-view
---
apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: grafana
  namespace: ani-demo-lab
  labels:
    dashboards: ani-demo
spec:
  config:
    log:
      mode: console
    security:
      admin_user: admin
      admin_password: ani-demo-grafana
    "auth.anonymous":
      enabled: "true"
      org_role: Viewer
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: grafana
  namespace: ani-demo-lab
spec:
  to:
    kind: Service
    name: grafana-service
    weight: 100
  port:
    targetPort: grafana
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: ani-demo-prometheus
  namespace: ani-demo-lab
spec:
  instanceSelector:
    matchLabels:
      dashboards: ani-demo
  valuesFrom:
    - targetPath: secureJsonData.httpHeaderValue1
      valueFrom:
        secretKeyRef:
          name: grafana-reader-token
          key: token
  datasource:
    name: ani-demo-prometheus
    type: prometheus
    access: proxy
    url: https://thanos-querier.openshift-monitoring.svc.cluster.local:9091
    isDefault: true
    jsonData:
      tlsSkipVerify: true
      timeInterval: 30s
      httpHeaderName1: Authorization
    secureJsonData:
      httpHeaderValue1: Bearer ${token}
