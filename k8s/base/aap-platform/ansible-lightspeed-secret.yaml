# S3-compatible backend for automation hub (MinIO). Create the bucket before or rely on
# k8s/base/minio bootstrap (bucket name aap-hub) if you use model-storage-minio.
# Adjust s3-endpoint and credentials if your MinIO differs (e.g. HTTPS Route URL).
apiVersion: v1
kind: Secret
metadata:
  name: lightspeed-secret
type: Opaque
stringData:
  chatbot_model: granite-3-2-8b-instruct
  chatbot_url: <url>
  chatbot_token: <token>
  