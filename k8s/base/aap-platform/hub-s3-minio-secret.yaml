# S3-compatible backend for automation hub (MinIO). Create the bucket before or rely on
# k8s/base/minio bootstrap (bucket name aap-hub) if you use model-storage-minio.
# Adjust s3-endpoint and credentials if your MinIO differs (e.g. HTTPS Route URL).
apiVersion: v1
kind: Secret
metadata:
  name: hub-s3-minio-secret
type: Opaque
stringData:
  s3-access-key-id: minioadmin
  s3-secret-access-key: minioadmin
  s3-bucket-name: aap-hub
  s3-region: us-east-1
  s3-endpoint: http://model-storage-minio.ani-data.svc.cluster.local:9000
