apiVersion: v1
kind: Secret
metadata:
  name: model-storage-credentials
  namespace: ims-demo-lab
  annotations:
    serving.kserve.io/s3-endpoint: model-storage-minio.ims-demo-lab.svc.cluster.local:9000
    serving.kserve.io/s3-region: us-east-1
    serving.kserve.io/s3-usehttps: "0"
    serving.kserve.io/s3-usevirtualbucket: "0"
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: minioadmin
  AWS_SECRET_ACCESS_KEY: minioadmin
  MINIO_ROOT_USER: minioadmin
  MINIO_ROOT_PASSWORD: minioadmin
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-storage-minio-data
  namespace: ims-demo-lab
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: model-storage-minio
  namespace: ims-demo-lab
spec:
  selector:
    app: model-storage-minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: model-storage-minio-console
  namespace: ims-demo-lab
spec:
  to:
    kind: Service
    name: model-storage-minio
    weight: 100
  port:
    targetPort: console
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-storage-minio
  namespace: ims-demo-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: model-storage-minio
  template:
    metadata:
      labels:
        app: model-storage-minio
    spec:
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: model-storage-minio-data
      containers:
        - name: minio
          image: quay.io/minio/minio:RELEASE.2024-08-03T04-33-23Z
          args:
            - server
            - /data
            - --console-address=:9001
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: model-storage-credentials
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: model-storage-credentials
                  key: MINIO_ROOT_PASSWORD
          ports:
            - containerPort: 9000
            - containerPort: 9001
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: model-storage-minio-bootstrap
  namespace: ims-demo-lab
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: quay.io/minio/mc:RELEASE.2024-08-13T21-33-58Z
          command:
            - /bin/sh
            - -c
          args:
            - |
              until /usr/bin/mc alias set demo http://model-storage-minio:9000 minioadmin minioadmin; do
                sleep 5
              done
              /usr/bin/mc mb --ignore-existing demo/ims-models
