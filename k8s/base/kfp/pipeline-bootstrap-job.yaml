apiVersion: v1
kind: ServiceAccount
metadata:
  name: ims-kfp-bootstrap
  namespace: ims-demo-lab
  annotations:
    argocd.argoproj.io/sync-wave: "30"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ims-kfp-bootstrap-admin
  namespace: ims-demo-lab
  annotations:
    argocd.argoproj.io/sync-wave: "30"
subjects:
  - kind: ServiceAccount
    name: ims-kfp-bootstrap
    namespace: ims-demo-lab
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: admin
---
apiVersion: batch/v1
kind: Job
metadata:
  name: ims-kfp-bootstrap
  namespace: ims-demo-lab
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "40"
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app: ims-kfp-bootstrap
    spec:
      serviceAccountName: ims-kfp-bootstrap
      restartPolicy: OnFailure
      containers:
        - name: publish-pipeline
          image: registry.access.redhat.com/ubi9/python-311:latest
          env:
            - name: HOME
              value: /tmp
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: DSPA_NAME
              value: dspa
            - name: PIPELINE_PACKAGE_PATH
              value: /opt/kfp/ims_anomaly_pipeline.yaml
            - name: PIPELINE_NAME
              value: ims-anomaly-platform-train-and-register
            - name: EXPERIMENT_NAME
              value: ims-demo
            - name: RUN_NAME
              value: ims-anomaly-platform-demo
            - name: PIPELINE_PARAMETERS_JSON
              value: |
                {"dataset_version":"synthetic-v1","baseline_version":"baseline-v1","automl_version":"candidate-v1","automl_engine":"autogluon"}
          command:
            - /bin/bash
            - -lc
          args:
            - |
              python -m pip install --no-cache-dir --target /tmp/kfp-site kfp==2.8.0
              export PYTHONPATH="/tmp/kfp-site:${PYTHONPATH}"
              python /opt/kfp/publish_pipeline.py
          volumeMounts:
            - name: kfp-assets
              mountPath: /opt/kfp
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
      volumes:
        - name: kfp-assets
          configMap:
            name: ims-kfp-assets
