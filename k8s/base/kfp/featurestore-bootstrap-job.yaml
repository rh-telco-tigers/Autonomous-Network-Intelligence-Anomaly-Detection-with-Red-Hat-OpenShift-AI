apiVersion: batch/v1
kind: Job
metadata:
  name: ims-featurestore-kfp-bootstrap
  namespace: ims-demo-lab
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "43"
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app: ims-featurestore-kfp-bootstrap
    spec:
      serviceAccountName: ims-kfp-bootstrap
      restartPolicy: OnFailure
      containers:
        - name: publish-pipeline
          image: registry.access.redhat.com/ubi9/python-311:latest
          envFrom:
            - configMapRef:
                name: ims-platform-config
            - configMapRef:
                name: ims-featurestore-config
          env:
            - name: HOME
              value: /tmp
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: REQUIRED_IMAGESTREAM_TAGS
              value: ims-ai-featurestore-trainer:latest
            - name: IMAGESTREAM_WAIT_TIMEOUT_SECONDS
              value: "3600"
            - name: DSPA_NAME
              value: dspa
            - name: PIPELINE_PACKAGE_PATH
              value: /opt/kfp/ims_featurestore_pipeline.yaml
            - name: PIPELINE_NAME
              value: ims-featurestore-train-and-register
            - name: EXPERIMENT_NAME
              value: ims-featurestore
            - name: RUN_NAME
              value: ims-featurestore-demo
            - name: FEATURESTORE_BUNDLE_WAIT_TIMEOUT_SECONDS
              value: "900"
            - name: DATASET_STORE_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: model-storage-credentials
                  key: AWS_ACCESS_KEY_ID
            - name: DATASET_STORE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: model-storage-credentials
                  key: AWS_SECRET_ACCESS_KEY
            - name: CONTROL_PLANE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: demo-api-auth
                  key: API_KEY
          command:
            - /bin/bash
            - -lc
          args:
            - |
              python - <<'PY'
              import os
              import ssl
              import time
              from pathlib import Path
              from urllib.error import HTTPError, URLError
              from urllib.parse import quote
              from urllib.request import Request, urlopen

              namespace = os.environ["POD_NAMESPACE"]
              tags = [item.strip() for item in os.getenv("REQUIRED_IMAGESTREAM_TAGS", "").split(",") if item.strip()]
              timeout_seconds = int(os.getenv("IMAGESTREAM_WAIT_TIMEOUT_SECONDS", "3600"))
              if not tags:
                  raise SystemExit(0)

              api_host = os.getenv("KUBERNETES_SERVICE_HOST", "kubernetes.default.svc")
              api_port = os.getenv("KUBERNETES_SERVICE_PORT_HTTPS", os.getenv("KUBERNETES_SERVICE_PORT", "443"))
              token = Path("/var/run/secrets/kubernetes.io/serviceaccount/token").read_text().strip()
              ca_path = Path("/var/run/secrets/kubernetes.io/serviceaccount/ca.crt")
              context = ssl.create_default_context(cafile=str(ca_path)) if ca_path.exists() else ssl.create_default_context()
              deadline = time.time() + timeout_seconds

              for tag in tags:
                  encoded = quote(tag, safe="")
                  url = f"https://{api_host}:{api_port}/apis/image.openshift.io/v1/namespaces/{namespace}/imagestreamtags/{encoded}"
                  while time.time() < deadline:
                      request = Request(url, headers={"Authorization": f"Bearer {token}"})
                      try:
                          with urlopen(request, timeout=5, context=context) as response:
                              if 200 <= response.status < 300:
                                  print(f"ImageStreamTag ready: {tag}", flush=True)
                                  break
                      except HTTPError as exc:
                          if exc.code not in {404, 503}:
                              print(f"waiting for {tag}: {exc}", flush=True)
                      except URLError as exc:
                          print(f"waiting for {tag}: {exc}", flush=True)
                      time.sleep(10)
                  else:
                      raise SystemExit(f"required ImageStreamTag did not become ready: {tag}")
              PY
              python -m pip install --no-cache-dir --target /tmp/kfp-site kfp==2.8.0 boto3
              export PYTHONPATH="/tmp/kfp-site:${PYTHONPATH}"
              python - <<'PY'
              import os
              import sys
              import time

              import boto3
              from botocore.exceptions import BotoCoreError, ClientError

              bucket = os.environ["DATASET_STORE_BUCKET"]
              endpoint = os.environ["DATASET_STORE_ENDPOINT"]
              prefix = os.getenv("DATASET_STORE_PREFIX", "").strip().strip("/")
              bundle_version = os.getenv("FEATURESTORE_BUNDLE_VERSION", "ims-feature-bundle-v1").strip() or "ims-feature-bundle-v1"
              timeout_seconds = int(os.getenv("FEATURESTORE_BUNDLE_WAIT_TIMEOUT_SECONDS", "900"))
              key = "/".join(part for part in (prefix, "feature-bundles", bundle_version, "manifest.json") if part)
              uri = f"s3://{bucket}/{key}"
              client = boto3.client(
                  "s3",
                  endpoint_url=endpoint,
                  aws_access_key_id=os.environ["DATASET_STORE_ACCESS_KEY"],
                  aws_secret_access_key=os.environ["DATASET_STORE_SECRET_KEY"],
                  region_name=os.getenv("AWS_REGION", "us-east-1"),
              )
              deadline = time.time() + timeout_seconds
              last_error = None

              while time.time() < deadline:
                  try:
                      client.head_object(Bucket=bucket, Key=key)
                      print(f"feature bundle ready at {uri}", flush=True)
                      sys.exit(0)
                  except ClientError as exc:
                      last_error = exc
                      code = str(exc.response.get("Error", {}).get("Code", ""))
                      if code not in {"404", "NoSuchKey", "NotFound"}:
                          print(f"waiting for feature bundle at {uri}: {exc}", flush=True)
                      else:
                          print(f"waiting for feature bundle at {uri}: object not found", flush=True)
                  except BotoCoreError as exc:
                      last_error = exc
                      print(f"waiting for feature bundle at {uri}: {exc}", flush=True)
                  time.sleep(10)

              raise SystemExit(f"feature bundle did not appear at {uri}: {last_error}")
              PY
              export PIPELINE_PARAMETERS_JSON="$(python - <<'PY'
              import json
              import os

              print(
                  json.dumps(
                      {
                          "bundle_version": os.getenv("FEATURESTORE_BUNDLE_VERSION", "ims-feature-bundle-v1"),
                          "feature_service_name": os.getenv("FEATURE_SERVICE_NAME", "ims_anomaly_scoring_v1"),
                          "baseline_version": os.getenv("FEATURESTORE_BASELINE_VERSION", "baseline-fs-v1"),
                          "candidate_version": os.getenv("FEATURESTORE_CANDIDATE_VERSION", "candidate-fs-v1"),
                          "automl_engine": os.getenv("FEATURESTORE_AUTOML_ENGINE", "autogluon"),
                          "model_name": os.getenv("FEATURESTORE_MODEL_NAME", "ims-anomaly-featurestore"),
                          "model_version_name": os.getenv("FEATURESTORE_MODEL_VERSION_NAME", "ims-anomaly-featurestore-v1"),
                          "serving_model_name": os.getenv("PREDICTIVE_MODEL_NAME", "ims-predictive-fs"),
                          "serving_runtime_name": os.getenv("FEATURESTORE_SERVING_RUNTIME_NAME", "nvidia-triton-runtime"),
                          "serving_model_format_name": os.getenv("FEATURESTORE_SERVING_MODEL_FORMAT_NAME", "triton"),
                          "serving_model_format_version": os.getenv("FEATURESTORE_SERVING_MODEL_FORMAT_VERSION", "2"),
                          "serving_protocol_version": os.getenv("FEATURESTORE_SERVING_PROTOCOL_VERSION", "v2"),
                          "serving_prefix": os.getenv("FEATURESTORE_SERVING_PREFIX", "predictive-featurestore"),
                          "serving_alias": os.getenv("FEATURESTORE_SERVING_ALIAS", "current"),
                          "mlserver_serving_model_name": os.getenv("MLSERVER_SERVING_MODEL_NAME", "ims-predictive-fs-mlserver"),
                          "mlserver_serving_runtime_name": os.getenv("MLSERVER_SERVING_RUNTIME_NAME", "mlserver-sklearn-runtime"),
                          "mlserver_serving_model_format_name": os.getenv("MLSERVER_SERVING_MODEL_FORMAT_NAME", "sklearn"),
                          "mlserver_serving_model_format_version": os.getenv("MLSERVER_SERVING_MODEL_FORMAT_VERSION", "1"),
                          "mlserver_serving_protocol_version": os.getenv("MLSERVER_SERVING_PROTOCOL_VERSION", "v2"),
                          "mlserver_serving_prefix": os.getenv("MLSERVER_SERVING_PREFIX", "predictive-featurestore-mlserver"),
                          "mlserver_serving_alias": os.getenv("MLSERVER_SERVING_ALIAS", "current"),
                          "control_plane_url": os.environ["CONTROL_PLANE_URL"],
                          "control_plane_api_key": os.environ["CONTROL_PLANE_API_KEY"],
                          "dataset_store_mode": os.getenv("DATASET_STORE_MODE", "s3"),
                          "dataset_store_endpoint": os.environ["DATASET_STORE_ENDPOINT"],
                          "dataset_store_bucket": os.environ["DATASET_STORE_BUCKET"],
                          "dataset_store_prefix": os.environ["DATASET_STORE_PREFIX"],
                          "dataset_store_access_key": os.environ["DATASET_STORE_ACCESS_KEY"],
                          "dataset_store_secret_key": os.environ["DATASET_STORE_SECRET_KEY"],
                          "featurestore_mode": os.getenv("FEATURESTORE_MODE", "remote"),
                          "featurestore_project": os.getenv("FEATURE_STORE_PROJECT", "ims_anomaly_featurestore"),
                          "featurestore_registry_path": os.environ["FEATURESTORE_REGISTRY_PATH"],
                          "featurestore_online_store_path": os.environ["FEATURESTORE_ONLINE_STORE_PATH"],
                          "featurestore_ca_cert_path": os.getenv("FEATURESTORE_CA_CERT_PATH", "/var/run/secrets/kubernetes.io/serviceaccount/service-ca.crt"),
                          "featurestore_auth_type": os.getenv("FEATURESTORE_AUTH_TYPE", "no_auth"),
                          "featurestore_s3_endpoint_url": os.environ["FEAST_S3_ENDPOINT_URL"],
                          "featurestore_aws_region": os.getenv("AWS_REGION", "us-east-1"),
                          "featurestore_aws_access_key_id": os.environ["DATASET_STORE_ACCESS_KEY"],
                          "featurestore_aws_secret_access_key": os.environ["DATASET_STORE_SECRET_KEY"],
                          "model_registry_endpoint": os.environ["MODEL_REGISTRY_ENDPOINT"],
                      }
                  )
              )
              PY
              )"
              python /opt/kfp/publish_featurestore_pipeline.py
          volumeMounts:
            - name: kfp-assets
              mountPath: /opt/kfp
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
      volumes:
        - name: kfp-assets
          configMap:
            name: ims-featurestore-kfp-assets
