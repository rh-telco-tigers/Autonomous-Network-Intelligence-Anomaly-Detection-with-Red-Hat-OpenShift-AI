apiVersion: batch/v1
kind: Job
metadata:
  name: ims-featurestore-kfp-bootstrap
  namespace: ims-demo-lab
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "43"
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app: ims-featurestore-kfp-bootstrap
    spec:
      serviceAccountName: ims-kfp-bootstrap
      restartPolicy: OnFailure
      containers:
        - name: publish-pipeline
          image: registry.access.redhat.com/ubi9/python-311:latest
          env:
            - name: HOME
              value: /tmp
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: DSPA_NAME
              value: dspa
            - name: PIPELINE_PACKAGE_PATH
              value: /opt/kfp/ims_featurestore_pipeline.yaml
            - name: PIPELINE_NAME
              value: ims-featurestore-train-and-register
            - name: EXPERIMENT_NAME
              value: ims-featurestore
            - name: RUN_NAME
              value: ims-featurestore-demo
            - name: PIPELINE_PARAMETERS_JSON
              value: |
                {"bundle_version":"ims-feature-bundle-v1","feature_service_name":"ims_anomaly_scoring_v1","baseline_version":"baseline-fs-v1","candidate_version":"candidate-fs-v1","automl_engine":"autogluon","model_name":"ims-anomaly-featurestore","model_version_name":"ims-anomaly-featurestore-v1","serving_model_name":"ims-predictive-fs","serving_runtime_name":"nvidia-triton-runtime","serving_prefix":"predictive-featurestore","serving_alias":"current"}
            - name: PIPELINE_SKIP_DEMO_RUN
              value: "true"
          command:
            - /bin/bash
            - -lc
          args:
            - |
              python -m pip install --no-cache-dir --target /tmp/kfp-site kfp==2.8.0
              export PYTHONPATH="/tmp/kfp-site:${PYTHONPATH}"
              python /opt/kfp/publish_featurestore_pipeline.py
          volumeMounts:
            - name: kfp-assets
              mountPath: /opt/kfp
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
      volumes:
        - name: kfp-assets
          configMap:
            name: ims-featurestore-kfp-assets
