apiVersion: v1
kind: ServiceAccount
metadata:
  name: ani-kfp-bootstrap
  namespace: ani-demo-lab
  annotations:
    argocd.argoproj.io/sync-wave: "30"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ani-kfp-bootstrap-dspa-api
  namespace: ani-demo-lab
  annotations:
    argocd.argoproj.io/sync-wave: "30"
rules:
  - apiGroups:
      - datasciencepipelinesapplications.opendatahub.io
    resources:
      - datasciencepipelinesapplications/api
    verbs:
      - get
      - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ani-kfp-bootstrap-admin
  namespace: ani-demo-lab
  annotations:
    argocd.argoproj.io/sync-wave: "30"
subjects:
  - kind: ServiceAccount
    name: ani-kfp-bootstrap
    namespace: ani-demo-lab
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: admin
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ani-kfp-bootstrap-dspa-api
  namespace: ani-demo-lab
  annotations:
    argocd.argoproj.io/sync-wave: "30"
subjects:
  - kind: ServiceAccount
    name: ani-kfp-bootstrap
    namespace: ani-demo-lab
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ani-kfp-bootstrap-dspa-api
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ani-kfp-bootstrap-model-registry-read
  annotations:
    argocd.argoproj.io/sync-wave: "30"
rules:
  - apiGroups:
      - ""
    resources:
      - services
    verbs:
      - get
  - apiGroups:
      - route.openshift.io
    resources:
      - routes
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ani-kfp-bootstrap-model-registry-read
  annotations:
    argocd.argoproj.io/sync-wave: "30"
subjects:
  - kind: ServiceAccount
    name: ani-kfp-bootstrap
    namespace: ani-demo-lab
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ani-kfp-bootstrap-model-registry-read
