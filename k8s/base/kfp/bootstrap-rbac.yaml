apiVersion: v1
kind: ServiceAccount
metadata:
  name: ims-kfp-bootstrap
  namespace: ims-demo-lab
  annotations:
    argocd.argoproj.io/sync-wave: "30"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ims-kfp-bootstrap-dspa-api
  namespace: ims-demo-lab
  annotations:
    argocd.argoproj.io/sync-wave: "30"
rules:
  - apiGroups:
      - datasciencepipelinesapplications.opendatahub.io
    resources:
      - datasciencepipelinesapplications/api
    verbs:
      - get
      - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ims-kfp-bootstrap-admin
  namespace: ims-demo-lab
  annotations:
    argocd.argoproj.io/sync-wave: "30"
subjects:
  - kind: ServiceAccount
    name: ims-kfp-bootstrap
    namespace: ims-demo-lab
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: admin
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ims-kfp-bootstrap-dspa-api
  namespace: ims-demo-lab
  annotations:
    argocd.argoproj.io/sync-wave: "30"
subjects:
  - kind: ServiceAccount
    name: ims-kfp-bootstrap
    namespace: ims-demo-lab
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ims-kfp-bootstrap-dspa-api
