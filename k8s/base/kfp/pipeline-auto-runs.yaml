                    fieldRef:
                      fieldPath: metadata.namespace
                - name: DSPA_NAME
                  value: dspa
                - name: PIPELINE_PACKAGE_PATH
                  value: /opt/kfp/ani_featurestore_pipeline.yaml
                - name: PIPELINE_NAME
                  value: ani-featurestore-train-and-register
                - name: EXPERIMENT_NAME
                  value: ani-featurestore
                - name: RUN_NAME
                  value: ani-featurestore-demo
                - name: FEATURESTORE_BUNDLE_WAIT_TIMEOUT_SECONDS
                  value: "900"
                - name: DATASET_STORE_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: model-storage-credentials
                      key: AWS_ACCESS_KEY_ID
                - name: DATASET_STORE_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: model-storage-credentials
                      key: AWS_SECRET_ACCESS_KEY
                - name: CONTROL_PLANE_API_KEY
                  valueFrom:
                    secretKeyRef:
