apiVersion: batch/v1
kind: CronJob
metadata:
  name: ani-kfp-auto-run
  namespace: ani-demo-lab
  annotations:
    argocd.argoproj.io/sync-wave: "50"
    argocd.argoproj.io/ignore-healthcheck: "true"
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  startingDeadlineSeconds: 300
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 600
      backoffLimit: 1
      template:
        metadata:
          labels:
            app: ani-kfp-auto-run
        spec:
          serviceAccountName: ani-kfp-bootstrap
          restartPolicy: Never
          containers:
            - name: run-pipeline
              image: registry.access.redhat.com/ubi9/python-311:latest
              env:
                - name: HOME
                  value: /tmp
                - name: POD_NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
                - name: DSPA_NAME
                  value: dspa
                - name: PIPELINE_PACKAGE_PATH
                  value: /opt/kfp/ani_anomaly_pipeline.yaml
                - name: PIPELINE_NAME
                  value: ani-anomaly-platform-train-and-register
                - name: EXPERIMENT_NAME
                  value: ani-demo
                - name: RUN_NAME
                  value: ani-anomaly-platform-demo
                - name: PIPELINE_USE_EXISTING_VERSION
                  value: "true"
                - name: PIPELINE_PARAMETERS_JSON
                  value: |
                    {"dataset_version":"live-sipp-v1","baseline_version":"baseline-v1","automl_version":"candidate-v1","automl_engine":"autogluon"}
              command:
                - /bin/bash
                - -lc
              args:
                - |
                  python -m pip install --no-cache-dir --target /tmp/kfp-site kfp==2.8.0
                  export PYTHONPATH="/tmp/kfp-site:${PYTHONPATH}"
                  python /opt/kfp/publish_pipeline.py
              volumeMounts:
                - name: kfp-assets
                  mountPath: /opt/kfp
                  readOnly: true
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  memory: 512Mi
          volumes:
            - name: kfp-assets
              configMap:
                name: ani-kfp-assets
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ani-incident-release-kfp-auto-run
  namespace: ani-demo-lab
  annotations:
    argocd.argoproj.io/sync-wave: "51"
    argocd.argoproj.io/ignore-healthcheck: "true"
spec:
  schedule: "5-59/15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  startingDeadlineSeconds: 300
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 600
      backoffLimit: 1
      template:
        metadata:
          labels:
            app: ani-incident-release-kfp-auto-run
        spec:
          serviceAccountName: ani-kfp-bootstrap
          restartPolicy: Never
          containers:
            - name: run-pipeline
              image: registry.access.redhat.com/ubi9/python-311:latest
              envFrom:
                - configMapRef:
                    name: ani-platform-config
              env:
                - name: HOME
                  value: /tmp
                - name: POD_NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
                - name: DSPA_NAME
                  value: dspa
                - name: PIPELINE_PACKAGE_PATH
                  value: /opt/kfp/ani_incident_release_pipeline.yaml
                - name: PIPELINE_NAME
                  value: ani-incident-release
                - name: EXPERIMENT_NAME
                  value: ani-release
                - name: RUN_NAME
                  value: ani-incident-release-demo
                - name: PIPELINE_USE_EXISTING_VERSION
                  value: "true"
              command:
                - /bin/bash
                - -lc
              args:
                - |
                  export PIPELINE_PARAMETERS_JSON="$(python - <<'PY'
                  import json
                  import os

                  print(
                      json.dumps(
                          {
                              "release_version": os.getenv("INCIDENT_RELEASE_VERSION", "live-sipp-v1-draft"),
                              "source_dataset_version": os.getenv("INCIDENT_RELEASE_SOURCE_DATASET_VERSION", "live-sipp-v1"),
                              "project": os.getenv("IMS_PROJECT", os.getenv("DEMO_PROJECT", "ani-demo")),
                              "public_record_target": int(os.getenv("INCIDENT_RELEASE_PUBLIC_RECORD_TARGET", "10000")),
                              "release_mode": os.getenv("INCIDENT_RELEASE_MODE", "draft-replacement"),
                              "previous_release_version": os.getenv("INCIDENT_RELEASE_PREVIOUS_VERSION", ""),
                          }
                      )
                  )
                  PY
                  )"
                  python -m pip install --no-cache-dir --target /tmp/kfp-site kfp==2.8.0
                  export PYTHONPATH="/tmp/kfp-site:${PYTHONPATH}"
                  python /opt/kfp/publish_incident_release_pipeline.py
              volumeMounts:
                - name: kfp-assets
                  mountPath: /opt/kfp
                  readOnly: true
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
          volumes:
            - name: kfp-assets
              configMap:
                name: ani-incident-release-kfp-assets
