  schedule: "10-59/15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  startingDeadlineSeconds: 300
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 600
      backoffLimit: 1
      template:
        metadata:
          labels:
            app: ani-featurestore-kfp-auto-run
        spec:
          serviceAccountName: ani-kfp-bootstrap
          restartPolicy: Never
          containers:
            - name: run-pipeline
              image: registry.access.redhat.com/ubi9/python-311:latest
              envFrom:
                - configMapRef:
