apiVersion: batch/v1
kind: Job
metadata:
  name: ims-incident-release-kfp-bootstrap
  namespace: ims-demo-lab
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "41"
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app: ims-incident-release-kfp-bootstrap
    spec:
      serviceAccountName: ims-kfp-bootstrap
      restartPolicy: OnFailure
      containers:
        - name: publish-pipeline
          image: registry.access.redhat.com/ubi9/python-311:latest
          env:
            - name: HOME
              value: /tmp
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: CONTROL_PLANE_URL
              value: http://control-plane.ims-demo-lab.svc.cluster.local:8080
            - name: CONTROL_PLANE_WAIT_TIMEOUT_SECONDS
              value: "900"
            - name: DSPA_NAME
              value: dspa
            - name: PIPELINE_PACKAGE_PATH
              value: /opt/kfp/ims_incident_release_pipeline.yaml
            - name: PIPELINE_NAME
              value: ims-incident-release
            - name: EXPERIMENT_NAME
              value: ims-release
            - name: RUN_NAME
              value: ims-incident-release-demo
            - name: PIPELINE_SKIP_DEMO_RUN
              value: "true"
            - name: PIPELINE_PARAMETERS_JSON
              value: |
                {"release_version":"live-sipp-v1-draft","source_dataset_version":"live-sipp-v1","project":"ims-demo","public_record_target":10000,"release_mode":"draft-replacement","previous_release_version":""}
          command:
            - /bin/bash
            - -lc
          args:
            - |
              python - <<'PY'
              import os
              import sys
              import time
              from urllib.error import HTTPError, URLError
              from urllib.request import urlopen

              base = os.getenv("CONTROL_PLANE_URL", "http://control-plane.ims-demo-lab.svc.cluster.local:8080").rstrip("/")
              url = f"{base}/healthz"
              deadline = time.time() + int(os.getenv("CONTROL_PLANE_WAIT_TIMEOUT_SECONDS", "900"))
              last_error = None

              while time.time() < deadline:
                  try:
                      with urlopen(url, timeout=5) as response:
                          if 200 <= response.status < 300:
                              print(f"control-plane ready at {url}")
                              sys.exit(0)
                  except (HTTPError, URLError) as exc:
                      last_error = exc
                      print(f"waiting for control-plane at {url}: {exc}", flush=True)
                  time.sleep(10)

              raise SystemExit(f"control-plane did not become ready at {url}: {last_error}")
              PY
              python -m pip install --no-cache-dir --target /tmp/kfp-site kfp==2.8.0
              export PYTHONPATH="/tmp/kfp-site:${PYTHONPATH}"
              python /opt/kfp/publish_incident_release_pipeline.py
          volumeMounts:
            - name: kfp-assets
              mountPath: /opt/kfp
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: kfp-assets
          configMap:
            name: ims-incident-release-kfp-assets
