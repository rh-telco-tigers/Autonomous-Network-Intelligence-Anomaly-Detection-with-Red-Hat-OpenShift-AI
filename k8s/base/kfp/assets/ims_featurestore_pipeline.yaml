pipelineInfo:
  name: ims-featurestore-train-and-register
root:
  dag:
    tasks:
      evaluate-models:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-evaluate-models
        dependentTasks:
        - retrieve-training-dataset
        - train-automl
        - train-baseline
        inputs:
          parameters:
            baseline_manifest:
              taskOutputParameter:
                outputParameterKey: output_manifest
                producerTask: train-baseline
            candidate_manifest:
              taskOutputParameter:
                outputParameterKey: output_manifest
                producerTask: train-automl
            training_manifest:
              taskOutputParameter:
                outputParameterKey: output_manifest
                producerTask: retrieve-training-dataset
        taskInfo:
          name: evaluate-models
      export-serving-artifact:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-export-serving-artifact
        dependentTasks:
        - retrieve-training-dataset
        - select-best
        inputs:
          parameters:
            selection_manifest:
              taskOutputParameter:
                outputParameterKey: output_manifest
                producerTask: select-best
            serving_alias:
              componentInputParameter: serving_alias
            serving_model_format_name:
              componentInputParameter: serving_model_format_name
            serving_model_format_version:
              componentInputParameter: serving_model_format_version
            serving_model_name:
              componentInputParameter: serving_model_name
            serving_prefix:
              componentInputParameter: serving_prefix
            serving_protocol_version:
              componentInputParameter: serving_protocol_version
            serving_runtime_name:
              componentInputParameter: serving_runtime_name
            training_manifest:
              taskOutputParameter:
                outputParameterKey: output_manifest
                producerTask: retrieve-training-dataset
        taskInfo:
          name: export-serving-artifact
      publish-deployment-manifest:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-publish-deployment-manifest
        dependentTasks:
        - export-serving-artifact
        - register-model-version
        inputs:
          parameters:
            export_manifest:
              taskOutputParameter:
                outputParameterKey: output_manifest
                producerTask: export-serving-artifact
            model_registry_manifest:
              taskOutputParameter:
                outputParameterKey: output_manifest
                producerTask: register-model-version
        taskInfo:
          name: publish-deployment-manifest
      register-model-version:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-register-model-version
        dependentTasks:
        - export-serving-artifact
        inputs:
          parameters:
            export_manifest:
              taskOutputParameter:
                outputParameterKey: output_manifest
                producerTask: export-serving-artifact
            feature_service_name:
              componentInputParameter: feature_service_name
            model_name:
              componentInputParameter: model_name
            model_version_name:
              componentInputParameter: model_version_name
        taskInfo:
          name: register-model-version
      resolve-bundle:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-resolve-bundle
        inputs:
          parameters:
            bundle_version:
              componentInputParameter: bundle_version
        taskInfo:
          name: resolve-bundle
      retrieve-training-dataset:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-retrieve-training-dataset
        dependentTasks:
        - resolve-bundle
        - sync-feature-store-definitions
        - validate-bundle
        inputs:
          parameters:
            bundle_manifest_path:
              taskOutputParameter:
                outputParameterKey: output_manifest
                producerTask: resolve-bundle
            feature_service_name:
              componentInputParameter: feature_service_name
        taskInfo:
          name: retrieve-training-dataset
      select-best:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-select-best
        dependentTasks:
        - evaluate-models
        inputs:
          parameters:
            evaluation_manifest:
              taskOutputParameter:
                outputParameterKey: output_manifest
                producerTask: evaluate-models
        taskInfo:
          name: select-best
      sync-feature-store-definitions:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-sync-feature-store-definitions
        dependentTasks:
        - resolve-bundle
        inputs:
          parameters:
            bundle_manifest_path:
              taskOutputParameter:
                outputParameterKey: output_manifest
                producerTask: resolve-bundle
        taskInfo:
          name: sync-feature-store-definitions
      train-automl:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-train-automl
        dependentTasks:
        - retrieve-training-dataset
        inputs:
          parameters:
            automl_engine:
              componentInputParameter: automl_engine
            candidate_version:
              componentInputParameter: candidate_version
            training_manifest:
              taskOutputParameter:
                outputParameterKey: output_manifest
                producerTask: retrieve-training-dataset
        taskInfo:
          name: train-automl
      train-baseline:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-train-baseline
        dependentTasks:
        - retrieve-training-dataset
        inputs:
          parameters:
            baseline_version:
              componentInputParameter: baseline_version
            training_manifest:
              taskOutputParameter:
                outputParameterKey: output_manifest
                producerTask: retrieve-training-dataset
        taskInfo:
          name: train-baseline
      validate-bundle:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-validate-bundle
        dependentTasks:
        - resolve-bundle
        inputs:
          parameters:
            bundle_manifest_path:
              taskOutputParameter:
                outputParameterKey: output_manifest
                producerTask: resolve-bundle
        taskInfo:
          name: validate-bundle
  inputDefinitions:
    parameters:
      automl_engine:
        defaultValue: autogluon
        isOptional: true
        parameterType: STRING
      baseline_version:
        defaultValue: baseline-fs-v1
        isOptional: true
        parameterType: STRING
      bundle_version:
        defaultValue: ims-feature-bundle-v1
        isOptional: true
        parameterType: STRING
      candidate_version:
        defaultValue: candidate-fs-v1
        isOptional: true
        parameterType: STRING
      feature_service_name:
        defaultValue: ims_anomaly_scoring_v1
        isOptional: true
        parameterType: STRING
      model_name:
        defaultValue: ims-anomaly-featurestore
        isOptional: true
        parameterType: STRING
      model_version_name:
        defaultValue: ims-anomaly-featurestore-v1
        isOptional: true
        parameterType: STRING
      serving_alias:
        defaultValue: current
        isOptional: true
        parameterType: STRING
      serving_model_format_name:
        defaultValue: triton
        isOptional: true
        parameterType: STRING
      serving_model_format_version:
        defaultValue: '2'
        isOptional: true
        parameterType: STRING
      serving_model_name:
        defaultValue: ims-predictive-fs
        isOptional: true
        parameterType: STRING
      serving_prefix:
        defaultValue: predictive-featurestore
        isOptional: true
        parameterType: STRING
      serving_protocol_version:
        defaultValue: v2
        isOptional: true
        parameterType: STRING
      serving_runtime_name:
        defaultValue: nvidia-triton-runtime
        isOptional: true
        parameterType: STRING
schemaVersion: 2.1.0
sdkVersion: kfp-2.8.0
