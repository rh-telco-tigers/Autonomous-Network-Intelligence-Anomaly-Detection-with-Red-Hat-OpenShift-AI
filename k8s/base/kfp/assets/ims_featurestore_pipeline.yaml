# PIPELINE DEFINITION
# Name: ims-featurestore-train-and-register
# Inputs:
#    automl_engine: str [Default: 'autogluon']
#    baseline_version: str [Default: 'baseline-fs-v1']
#    bundle_version: str [Default: 'ims-feature-bundle-v1']
#    candidate_version: str [Default: 'candidate-fs-v1']
#    feature_service_name: str [Default: 'ims_anomaly_scoring_v1']
#    model_name: str [Default: 'ims-anomaly-featurestore']
#    model_version_name: str [Default: 'ims-anomaly-featurestore-v1']
#    serving_alias: str [Default: 'current']
#    serving_model_format_name: str [Default: 'triton']
#    serving_model_format_version: str [Default: '2']
#    serving_model_name: str [Default: 'ims-predictive-fs']
#    serving_prefix: str [Default: 'predictive-featurestore']
#    serving_protocol_version: str [Default: 'v2']
#    serving_runtime_name: str [Default: 'nvidia-triton-runtime']
components:
  comp-evaluate-models:
    executorLabel: exec-evaluate-models
    inputDefinitions:
      parameters:
        baseline_manifest:
          parameterType: STRING
        candidate_manifest:
          parameterType: STRING
        training_manifest:
          parameterType: STRING
    outputDefinitions:
      parameters:
        output_manifest:
          parameterType: STRING
  comp-export-serving-artifact:
    executorLabel: exec-export-serving-artifact
    inputDefinitions:
      parameters:
        artifact_dir:
          defaultValue: /tmp/ims-featurestore/models/artifacts
          isOptional: true
          parameterType: STRING
        selection_manifest:
          parameterType: STRING
        serving_alias:
          defaultValue: current
          isOptional: true
          parameterType: STRING
        serving_model_format_name:
          defaultValue: triton
          isOptional: true
          parameterType: STRING
        serving_model_format_version:
          defaultValue: '2'
          isOptional: true
          parameterType: STRING
        serving_model_name:
          defaultValue: ims-predictive-fs
          isOptional: true
          parameterType: STRING
        serving_prefix:
          defaultValue: predictive-featurestore
          isOptional: true
          parameterType: STRING
        serving_protocol_version:
          defaultValue: v2
          isOptional: true
          parameterType: STRING
        serving_runtime_name:
          defaultValue: nvidia-triton-runtime
          isOptional: true
          parameterType: STRING
        training_manifest:
          parameterType: STRING
    outputDefinitions:
      parameters:
        output_manifest:
          parameterType: STRING
  comp-publish-deployment-manifest:
    executorLabel: exec-publish-deployment-manifest
    inputDefinitions:
      parameters:
        export_manifest:
          parameterType: STRING
        model_registry_manifest:
          parameterType: STRING
        service_account_name:
          defaultValue: model-storage-sa
          isOptional: true
          parameterType: STRING
    outputDefinitions:
      parameters:
        output_manifest:
          parameterType: STRING
  comp-register-model-version:
    executorLabel: exec-register-model-version
    inputDefinitions:
      parameters:
        export_manifest:
          parameterType: STRING
        feature_service_name:
          parameterType: STRING
        model_name:
          parameterType: STRING
        model_version_name:
          parameterType: STRING
        pipeline_name:
          defaultValue: ims-featurestore-train-and-register
          isOptional: true
          parameterType: STRING
    outputDefinitions:
      parameters:
        output_manifest:
          parameterType: STRING
  comp-resolve-bundle:
    executorLabel: exec-resolve-bundle
    inputDefinitions:
      parameters:
        bundle_version:
          parameterType: STRING
        workspace_root:
          defaultValue: /tmp/ims-featurestore
          isOptional: true
          parameterType: STRING
    outputDefinitions:
      parameters:
        output_manifest:
          parameterType: STRING
  comp-retrieve-training-dataset:
    executorLabel: exec-retrieve-training-dataset
    inputDefinitions:
      parameters:
        bundle_manifest_path:
          parameterType: STRING
        feature_repo_path:
          defaultValue: /workspace/ai/featurestore/feature_repo
          isOptional: true
          parameterType: STRING
        feature_service_name:
          parameterType: STRING
        workspace_root:
          defaultValue: /tmp/ims-featurestore
          isOptional: true
          parameterType: STRING
    outputDefinitions:
      parameters:
        output_manifest:
          parameterType: STRING
  comp-select-best:
    executorLabel: exec-select-best
    inputDefinitions:
      parameters:
        evaluation_manifest:
          parameterType: STRING
    outputDefinitions:
      parameters:
        output_manifest:
          parameterType: STRING
  comp-sync-feature-store-definitions:
    executorLabel: exec-sync-feature-store-definitions
    inputDefinitions:
      parameters:
        bundle_manifest_path:
          parameterType: STRING
        feature_repo_path:
          defaultValue: /workspace/ai/featurestore/feature_repo
          isOptional: true
          parameterType: STRING
        workspace_root:
          defaultValue: /tmp/ims-featurestore
          isOptional: true
          parameterType: STRING
    outputDefinitions:
      parameters:
        output_manifest:
          parameterType: STRING
  comp-train-automl:
    executorLabel: exec-train-automl
    inputDefinitions:
      parameters:
        artifact_dir:
          defaultValue: /tmp/ims-featurestore/models/artifacts
          isOptional: true
          parameterType: STRING
        automl_engine:
          defaultValue: autogluon
          isOptional: true
          parameterType: STRING
        candidate_version:
          parameterType: STRING
        training_manifest:
          parameterType: STRING
        workspace_root:
          defaultValue: /tmp/ims-featurestore
          isOptional: true
          parameterType: STRING
    outputDefinitions:
      parameters:
        output_manifest:
          parameterType: STRING
  comp-train-baseline:
    executorLabel: exec-train-baseline
    inputDefinitions:
      parameters:
        artifact_dir:
          defaultValue: /tmp/ims-featurestore/models/artifacts
          isOptional: true
          parameterType: STRING
        baseline_version:
          parameterType: STRING
        training_manifest:
          parameterType: STRING
    outputDefinitions:
      parameters:
        output_manifest:
          parameterType: STRING
  comp-validate-bundle:
    executorLabel: exec-validate-bundle
    inputDefinitions:
      parameters:
        bundle_manifest_path:
          parameterType: STRING
        workspace_root:
          defaultValue: /tmp/ims-featurestore
          isOptional: true
          parameterType: STRING
    outputDefinitions:
      parameters:
        output_manifest:
          parameterType: STRING
deploymentSpec:
  executors:
    exec-evaluate-models:
      container:
        args:
        - --step
        - evaluate
        - --training-manifest
        - '{{$.inputs.parameters[''training_manifest'']}}'
