apiVersion: tower.ansible.com/v1alpha1
kind: JobTemplate
metadata:
  name: ani-remediation
  namespace: aap
  annotations:
    argocd.argoproj.io/sync-wave: "85"
spec:
  connection_secret: aap-controller-connection
  name: "IMS Remediation - Lightspeed Playbook Generator"
  description: >-
    Calls the Ansible Lightspeed API with lightspeed_prompt and returns
    a generated playbook. Triggered by Kafka EDA events.
  job_type: run
  organization: Default
  project: IMS Remediation
  inventory: IMS Remediation Inventory
  playbook: automation/ansible/playbooks/ani-remediation.yaml
  ask_variables_on_launch: true
  extra_vars: '{"input_lightspeed_url": "https://aap-lightspeed-chatbot-api.aap.svc.cluster.local:8443/v1/query", "lightspeed_model": "", "lightspeed_provider": "", "lightspeed_token": "", "lightspeed_prompt": "", "lightspeed_validate_certs": false}'
