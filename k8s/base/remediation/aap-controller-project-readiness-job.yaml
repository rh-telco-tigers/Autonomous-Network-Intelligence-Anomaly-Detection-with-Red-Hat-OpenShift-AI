apiVersion: batch/v1
kind: Job
metadata:
  name: aap-controller-project-readiness
  namespace: aap
  annotations:
    argocd.argoproj.io/sync-wave: "84"
    argocd.argoproj.io/sync-options: Force=true,Replace=true
spec:
  backoffLimit: 4
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: ani-remediation-bootstrap
      containers:
        - name: wait-for-controller-project
          image: registry.access.redhat.com/ubi9/python-311:latest
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              python3 - <<'PYEOF'
              import base64
              import json
              import os
              import time
              import urllib.error
              import urllib.parse
              import urllib.request

              host = os.environ["AAP_CONTROLLER_HOST"].strip().rstrip("/")
              password = os.environ["AAP_CONTROLLER_PASSWORD"].strip()
              username = os.getenv("AAP_CONTROLLER_USERNAME", "admin").strip() or "admin"
              timeout_seconds = float(os.getenv("AAP_CONTROLLER_READINESS_TIMEOUT_SECONDS", "300"))
              poll_seconds = float(os.getenv("AAP_CONTROLLER_READINESS_POLL_SECONDS", "5"))
              resource_names = {
                  "project": os.getenv("AAP_PROJECT_NAME", "IMS Remediation").strip() or "IMS Remediation",
                  "inventory": os.getenv("AAP_INVENTORY_NAME", "IMS Remediation Inventory").strip() or "IMS Remediation Inventory",
              }

              basic_auth = base64.b64encode(f"{username}:{password}".encode("utf-8")).decode("ascii")

              def count_named(path: str, name: str) -> int:
                  url = f"{host}{path}?page_size=200&name={urllib.parse.quote(name)}"
                  request = urllib.request.Request(
                      url,
                      headers={
                          "Authorization": f"Basic {basic_auth}",
                          "Accept": "application/json",
                          "Content-Type": "application/json",
                      },
                  )
                  with urllib.request.urlopen(request, timeout=30) as response:
                      payload = json.loads(response.read().decode("utf-8") or "{}")
                  return sum(1 for item in payload.get("results", []) if isinstance(item, dict) and str(item.get("name") or "") == name)

              deadline = time.time() + timeout_seconds
              while time.time() < deadline:
                  try:
                      project_count = count_named("/api/v2/projects/", resource_names["project"])
                      inventory_count = count_named("/api/v2/inventories/", resource_names["inventory"])
                  except urllib.error.HTTPError as exc:
                      body = exc.read().decode("utf-8", errors="replace")
                      print(f"AAP controller returned {exc.code}: {body[:400]}")
                      time.sleep(poll_seconds)
                      continue
                  except Exception as exc:
                      print(f"Waiting for controller project readiness: {exc}")
                      time.sleep(poll_seconds)
                      continue

                  if project_count > 0 and inventory_count > 0:
                      print(
                          json.dumps(
                              {
                                  "project": resource_names["project"],
                                  "inventory": resource_names["inventory"],
                                  "project_count": project_count,
                                  "inventory_count": inventory_count,
                              }
                          )
                      )
                      raise SystemExit(0)

                  print(
                      f"Controller objects not ready yet: "
                      f"project={project_count}, inventory={inventory_count}. Waiting {poll_seconds:.0f}s..."
                  )
                  time.sleep(poll_seconds)

              raise SystemExit(
                  "Timed out waiting for Controller project and inventory "
                  f"('{resource_names['project']}', '{resource_names['inventory']}')."
              )
              PYEOF
          env:
            - name: AAP_CONTROLLER_HOST
              valueFrom:
                secretKeyRef:
                  name: aap-controller-connection
                  key: host
            - name: AAP_CONTROLLER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aap-controller-admin-password
                  key: password
            - name: AAP_CONTROLLER_USERNAME
              value: "admin"
            - name: AAP_PROJECT_NAME
              value: "IMS Remediation"
            - name: AAP_INVENTORY_NAME
              value: "IMS Remediation Inventory"
            - name: AAP_CONTROLLER_READINESS_TIMEOUT_SECONDS
              value: "300"
            - name: AAP_CONTROLLER_READINESS_POLL_SECONDS
              value: "5"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
