apiVersion: batch/v1
kind: Job
metadata:
  name: aap-controller-job-template-readiness
  namespace: aap
  annotations:
    argocd.argoproj.io/sync-wave: "86"
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 4
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: ani-remediation-bootstrap
      containers:
        - name: wait-for-controller-job-template
          image: registry.access.redhat.com/ubi9/python-311:latest
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              python3 - <<'PYEOF'
              import base64
              import json
              import os
              import time
              import urllib.error
              import urllib.parse
              import urllib.request

              host = os.environ["AAP_CONTROLLER_HOST"].strip().rstrip("/")
              password = os.environ["AAP_CONTROLLER_PASSWORD"].strip()
              username = os.getenv("AAP_CONTROLLER_USERNAME", "admin").strip() or "admin"
              timeout_seconds = float(os.getenv("AAP_CONTROLLER_JOB_TEMPLATE_TIMEOUT_SECONDS", "300"))
              poll_seconds = float(os.getenv("AAP_CONTROLLER_JOB_TEMPLATE_POLL_SECONDS", "5"))
              template_name = (
                  os.getenv("AAP_CONTROLLER_JOB_TEMPLATE_NAME", "IMS Remediation - Lightspeed Playbook Generator").strip()
                  or "IMS Remediation - Lightspeed Playbook Generator"
              )

              basic_auth = base64.b64encode(f"{username}:{password}".encode("utf-8")).decode("ascii")

              def count_named(path: str, name: str) -> int:
                  url = f"{host}{path}?page_size=200&name={urllib.parse.quote(name)}"
                  request = urllib.request.Request(
                      url,
                      headers={
                          "Authorization": f"Basic {basic_auth}",
                          "Accept": "application/json",
                          "Content-Type": "application/json",
                      },
                  )
                  with urllib.request.urlopen(request, timeout=30) as response:
                      payload = json.loads(response.read().decode("utf-8") or "{}")
                  return sum(1 for item in payload.get("results", []) if isinstance(item, dict) and str(item.get("name") or "") == name)

              deadline = time.time() + timeout_seconds
              while time.time() < deadline:
                  try:
                      template_count = count_named("/api/v2/job_templates/", template_name)
                  except urllib.error.HTTPError as exc:
                      body = exc.read().decode("utf-8", errors="replace")
                      print(f"AAP controller returned {exc.code}: {body[:400]}")
                      time.sleep(poll_seconds)
                      continue
                  except Exception as exc:
                      print(f"Waiting for controller job template readiness: {exc}")
                      time.sleep(poll_seconds)
                      continue

                  if template_count > 0:
                      print(json.dumps({"job_template": template_name, "count": template_count}))
                      raise SystemExit(0)

                  print(
                      f"Controller job template '{template_name}' is not ready yet. "
                      f"Waiting {poll_seconds:.0f}s..."
                  )
                  time.sleep(poll_seconds)

              raise SystemExit(
                  "Timed out waiting for Controller job template "
                  f"'{template_name}'."
              )
              PYEOF
          env:
            - name: AAP_CONTROLLER_HOST
              valueFrom:
                secretKeyRef:
                  name: aap-controller-connection
                  key: host
            - name: AAP_CONTROLLER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aap-controller-admin-password
                  key: password
            - name: AAP_CONTROLLER_USERNAME
              value: "admin"
            - name: AAP_CONTROLLER_JOB_TEMPLATE_NAME
              value: "IMS Remediation - Lightspeed Playbook Generator"
            - name: AAP_CONTROLLER_JOB_TEMPLATE_TIMEOUT_SECONDS
              value: "300"
            - name: AAP_CONTROLLER_JOB_TEMPLATE_POLL_SECONDS
              value: "5"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
