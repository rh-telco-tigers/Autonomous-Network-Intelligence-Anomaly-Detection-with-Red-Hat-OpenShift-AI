apiVersion: batch/v1
kind: Job
metadata:
  name: ani-remediation-connection-secret
  namespace: aap
  annotations:
    argocd.argoproj.io/sync-wave: "82"
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 900
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: ani-remediation-bootstrap
      containers:
        - name: create-connection-secret
          image: registry.redhat.io/ansible-automation-platform-26/ee-supported-rhel9:latest
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail

              TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              CA=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
              API="https://${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT_HTTPS}"

              k8s_get() {
                curl -sf --cacert "$CA" \
                  -H "Authorization: Bearer $TOKEN" \
                  -H "Accept: application/json" \
                  "${API}${1}"
              }

              echo "[1/3] Reading controller admin password from operator secret..."

              CONTROLLER_PASSWORD=$(k8s_get "/api/v1/namespaces/aap/secrets/aap-controller-admin-password" \
                | python3 -c "import sys,json,base64; \
                    print(base64.b64decode(json.load(sys.stdin)['data']['password']).decode().strip())")

              echo "[2/3] Setting controller service URL..."

              export CONTROLLER_HOST="http://aap-controller-service.aap.svc.cluster.local"
              export CONTROLLER_PASSWORD

              echo "  Controller : ${CONTROLLER_HOST}"

              echo "[3/3] Waiting for controller API and creating connection secret..."

              python3 - <<'PYEOF'
              import json, os, ssl, base64, time, urllib.request, urllib.error

              CONTROLLER_HOST = os.environ["CONTROLLER_HOST"]
              CONTROLLER_PASSWORD = os.environ["CONTROLLER_PASSWORD"]
              TIMEOUT_SECONDS = float(os.getenv("AAP_CONTROLLER_BOOTSTRAP_TIMEOUT_SECONDS", "600"))
              POLL_SECONDS = float(os.getenv("AAP_CONTROLLER_BOOTSTRAP_POLL_SECONDS", "5"))

              # Wait for the controller API instead of failing the Job during early cluster startup.
              def controller_request(method, path, body=None):
                  creds = base64.b64encode(f"{username}:{password}".encode()).decode()
                  url = f"{CONTROLLER_HOST}{path}"
                  payload = json.dumps(body).encode() if body is not None else None
                  req = urllib.request.Request(url, data=payload, method=method)
                  req.add_header("Authorization", f"Basic {creds}")
                  req.add_header("Content-Type", "application/json")
                  req.add_header("Accept", "application/json")
                  with urllib.request.urlopen(req, timeout=30) as resp:
                      return json.loads(resp.read() or b"{}")

              username = os.getenv("AAP_CONTROLLER_USERNAME", "admin").strip() or "admin"
              password = CONTROLLER_PASSWORD
              deadline = time.time() + TIMEOUT_SECONDS
              last_error = "controller API not ready"
              while time.time() < deadline:
                  try:
                      controller_request("GET", "/api/v2/ping/")
                      print("  Controller API is ready.")
                      break
                  except urllib.error.HTTPError as exc:
                      body = exc.read().decode("utf-8", errors="replace")
                      last_error = f"HTTP {exc.code}: {body[:200]}"
                  except Exception as exc:
                      last_error = str(exc)
                  print(f"  Waiting for Controller API: {last_error}")
                  time.sleep(POLL_SECONDS)
              else:
                  raise SystemExit(f"Timed out waiting for Controller API: {last_error}")

              print("  Requesting OAuth token from Controller...")
              controller_token_resp = controller_request(
                  "POST",
                  "/api/v2/tokens/",
                  {"description": "IMS Remediation ArgoCD", "application": None, "scope": "write"},
              )
              CONTROLLER_TOKEN = controller_token_resp["token"]
              print("  Controller OAuth token obtained.")

              # ── Write K8s secrets ──────────────────────────────────────────────────────────
              k8s_token = open("/var/run/secrets/kubernetes.io/serviceaccount/token").read().strip()
              k8s_api   = f"https://{os.environ['KUBERNETES_SERVICE_HOST']}:{os.environ['KUBERNETES_SERVICE_PORT_HTTPS']}"
              k8s_ca    = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
              k8s_ctx   = ssl.create_default_context(cafile=k8s_ca)

              def k8s_apply_secret(secret):
                  name = secret["metadata"]["name"]
                  url  = f"{k8s_api}/api/v1/namespaces/aap/secrets/{name}?fieldManager=ani-bootstrap&force=true"
                  req  = urllib.request.Request(url, data=json.dumps(secret).encode(), method="PATCH")
                  req.add_header("Authorization", f"Bearer {k8s_token}")
                  req.add_header("Content-Type", "application/apply-patch+yaml")
                  try:
                      urllib.request.urlopen(req, context=k8s_ctx)
                      print(f"  Secret '{name}' applied.")
                  except urllib.error.HTTPError as e:
                      print(f"  Error applying '{name}': {e.code} {e.read().decode()}")
                      raise

              k8s_apply_secret({
                  "apiVersion": "v1", "kind": "Secret",
                  "metadata": {"name": "aap-controller-connection", "namespace": "aap"},
                  "stringData": {
                      "host":  CONTROLLER_HOST,
                      "token": CONTROLLER_TOKEN
                  }
              })
              PYEOF
          env:
            - name: CONTROLLER_HOST
              value: ""
            - name: CONTROLLER_PASSWORD
              value: ""
            - name: AAP_CONTROLLER_USERNAME
              value: "admin"
            - name: AAP_CONTROLLER_BOOTSTRAP_TIMEOUT_SECONDS
              value: "600"
            - name: AAP_CONTROLLER_BOOTSTRAP_POLL_SECONDS
              value: "5"
