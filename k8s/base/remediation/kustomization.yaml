apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - aap-bootstrap-rbac.yaml           # wave 81 — SA + Role + RoleBinding
  - aap-connection-secret-job.yaml    # wave 82 — Job: creates aap-controller-connection secret
  - aap-project.yaml                  # wave 83 — AnsibleProject CRD
  - aap-inventory.yaml                # wave 83 — AnsibleInventory CRD
  - aap-controller-project-readiness-job.yaml  # wave 84 — Job: wait for project + inventory in Controller
  - aap-job-template.yaml             # wave 85 — JobTemplate CRD
  - aap-controller-job-template-readiness-job.yaml  # wave 86 — Job: wait for JobTemplate in Controller
  - aap-controller-lightspeed-template-config-job.yaml  # wave 87 — Job: inject live Lightspeed endpoint + token into Controller template
  - eda-kafka-bootstrap-configmap.yaml  # wave 88 — ConfigMap: eda_kafka.py script
  - eda-kafka-bootstrap-job.yaml        # wave 89 — Job: bootstraps EDA Kafka project + activations
