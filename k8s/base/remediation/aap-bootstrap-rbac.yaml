apiVersion: v1
kind: ServiceAccount
metadata:
  name: ani-remediation-bootstrap
  namespace: aap
  annotations:
    argocd.argoproj.io/sync-wave: "80"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ani-remediation-bootstrap
  namespace: aap
  annotations:
    argocd.argoproj.io/sync-wave: "81"
rules:
  # Read the operator-created admin password secrets
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - aap-controller-admin-password
      - aap-eda-admin-password
    verbs: ["get"]
  # Create/update the connection secret used by tower.ansible.com CRDs
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "patch", "update"]
  # Discover AAP services by label
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ani-remediation-bootstrap
  namespace: aap
  annotations:
    argocd.argoproj.io/sync-wave: "81"
subjects:
  - kind: ServiceAccount
    name: ani-remediation-bootstrap
    namespace: aap
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ani-remediation-bootstrap
