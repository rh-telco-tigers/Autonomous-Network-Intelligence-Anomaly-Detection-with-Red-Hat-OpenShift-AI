apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: openimss-open5gs
  namespace: ani-demo-lab
spec:
  lookupPolicy:
    local: false
---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: openimss-opensips
  namespace: ani-demo-lab
spec:
  lookupPolicy:
    local: false
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: openimss-open5gs
  namespace: ani-demo-lab
spec:
  output:
    to:
      kind: ImageStreamTag
      name: openimss-open5gs:latest
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 6Gi
  source:
    git:
      uri: https://github.com/VoicenterTeam/openimss.git
    contextDir: base
    type: Git
  strategy:
    dockerStrategy:
      dockerfilePath: Dockerfile
    type: Docker
  triggers:
    - type: ConfigChange
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: openimss-opensips
  namespace: ani-demo-lab
spec:
  output:
    to:
      kind: ImageStreamTag
      name: openimss-opensips:latest
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 6Gi
  source:
    git:
      uri: https://github.com/VoicenterTeam/openimss.git
    contextDir: ims_base
    type: Git
  strategy:
    dockerStrategy:
      dockerfilePath: Dockerfile
    type: Docker
  triggers:
    - type: ConfigChange
