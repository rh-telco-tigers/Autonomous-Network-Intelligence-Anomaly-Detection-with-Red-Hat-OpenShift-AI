# Source: plane-ce/templates/workloads/minio.stateful.yaml
apiVersion: batch/v1
kind: Job
metadata:
  namespace: ims-demo-lab
  name: plane-minio-bucket-1
spec:
  backoffLimit: 6
  completionMode: NonIndexed
  template:
    metadata:
      namespace: ims-demo-lab
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: init
          image: busybox
          command: ['sh', '-c', "until nslookup  plane-minio.ims-demo-lab.svc.cluster.local; do echo waiting for  plane-minio; sleep 2; done"]
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      containers:
        - command:
            - /bin/sh
          args:
            - '-c'
            - >-
              /usr/bin/mc config host add plane-app-minio
              http://plane-minio.ims-demo-lab.svc.cluster.local:9000 "$AWS_ACCESS_KEY_ID" "$AWS_SECRET_ACCESS_KEY"; 
              /usr/bin/mc mb plane-app-minio/$AWS_S3_BUCKET_NAME; 
              /usr/bin/mc anonymous set download plane-app-minio/$AWS_S3_BUCKET_NAME; exit 0;
          envFrom:
            - secretRef:
                name: plane-doc-store-secrets
                optional: false
          image: minio/mc:latest
          imagePullPolicy: IfNotPresent
          name: plane-minio-bucket
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
