apiVersion: batch/v1
kind: CronJob
metadata:
  name: demo-incident-pulse
  namespace: ims-demo-lab
spec:
  schedule: "*/3 * * * *"
  suspend: false
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 60
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 0
      ttlSecondsAfterFinished: 180
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: demo-incident-pulse
              image: image-registry.openshift-image-registry.svc:5000/ims-demo-lab/control-plane:latest
              imagePullPolicy: Always
              envFrom:
                - configMapRef:
                    name: ims-platform-config
              command:
                - python
                - -c
              args:
                - |
                  import json
                  import os
                  import time

                  import requests

                  url = os.environ["CONTROL_PLANE_URL"].rstrip("/") + "/console/run-scenario"
                  project = os.getenv("DEMO_PROJECT", "ims-demo")
                  scenarios = [
                      item.strip()
                      for item in os.getenv(
                          "DEMO_SCENARIOS",
                          "registration_storm,registration_failure,authentication_failure,malformed_invite,routing_error,busy_destination,call_setup_timeout,call_drop_mid_session,server_internal_error,network_degradation,retransmission_spike",
                      ).split(",")
                      if item.strip()
                  ]
                  slot = int(time.time() // 180) % len(scenarios)
                  scenario = scenarios[slot]
                  response = requests.post(
                      url,
                      headers={
                          "Content-Type": "application/json",
                          "x-api-key": os.environ["API_KEY"],
                      },
                      json={"project": project, "scenario": scenario},
                      timeout=90,
                  )
                  response.raise_for_status()
                  payload = response.json()
                  print(
                      json.dumps(
                          {
                              "scenario": scenario,
                              "incident_id": (payload.get("incident") or {}).get("id"),
                              "generated_at": (payload.get("state") or {}).get("generated_at"),
                          }
                      )
                  )
              env:
                - name: API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: demo-api-auth
                      key: API_KEY
              resources:
                requests:
                  cpu: 25m
                  memory: 128Mi
                limits:
                  memory: 256Mi
