apiVersion: v1
kind: ServiceAccount
metadata:
  name: plane-integration-bootstrap
  namespace: ims-demo-lab
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: plane-integration-bootstrap
  namespace: ims-demo-lab
rules:
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - create
  - apiGroups:
      - ""
    resources:
      - secrets
    resourceNames:
      - plane-integration-auth
    verbs:
      - get
      - update
      - patch
  - apiGroups:
      - apps
    resources:
      - deployments
    resourceNames:
      - control-plane
    verbs:
      - get
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: plane-integration-bootstrap
  namespace: ims-demo-lab
subjects:
  - kind: ServiceAccount
    name: plane-integration-bootstrap
    namespace: ims-demo-lab
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: plane-integration-bootstrap
---
apiVersion: batch/v1
kind: Job
metadata:
  name: plane-integration-secret-bootstrap-v6
  namespace: ims-demo-lab
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: plane-integration-bootstrap
    spec:
      serviceAccountName: plane-integration-bootstrap
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          image: artifacts.plane.so/makeplane/plane-backend:v1.2.3
          imagePullPolicy: IfNotPresent
          workingDir: /code
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: PLANE_NAMESPACE
              value: plane
            - name: CONTROL_PLANE_API_KEY
              value: demo-token
            - name: PLANE_BOOTSTRAP_WAIT_SECONDS
              value: "900"
            - name: PLANE_BOOTSTRAP_STATUS_WAIT_SECONDS
              value: "300"
            - name: PLANE_ADMIN_EMAIL
              value: plane-admin@ims-demo.local
            - name: PLANE_ADMIN_USERNAME
              value: plane-admin
            - name: PLANE_ADMIN_PASSWORD
              value: plane
            - name: PLANE_ADMIN_FIRST_NAME
              value: Plane
            - name: PLANE_ADMIN_LAST_NAME
              value: Admin
            - name: PLANE_ADMIN_DISPLAY_NAME
              value: Plane Admin
            - name: PLANE_WORKSPACE_SLUG
              value: ims-demo
            - name: PLANE_WORKSPACE_NAME
              value: IMS Demo
            - name: PLANE_PROJECT_NAME
              value: IMS Demo
            - name: PLANE_PROJECT_IDENTIFIER
              value: IMS
            - name: PLANE_CONTROL_PLANE_TOKEN_LABEL
              value: ims-demo-control-plane
            - name: PLANE_CONTROL_PLANE_TOKEN_DESCRIPTION
              value: PAT for IMS control-plane ticket sync
          envFrom:
            - configMapRef:
                name: plane-app-vars
            - secretRef:
                name: plane-app-secrets
            - secretRef:
                name: plane-doc-store-secrets
          command:
            - /bin/sh
            - -ec
          args:
            - |
              python - <<'PY'
              import base64
              import json
              import os
              import ssl
              import time
              import urllib.error
              import urllib.request
              import uuid
              from urllib.parse import urlparse

              os.environ.setdefault("DJANGO_SETTINGS_MODULE", "plane.settings.production")

              import django
              from django.apps import apps
              from django.contrib.auth import get_user_model
              from django.core.cache import cache
              from django.db.utils import OperationalError

              django.setup()

              from plane.license.models import Instance, InstanceAdmin

              control_plane_namespace = (os.getenv("POD_NAMESPACE") or "ims-runtime").strip() or "ims-runtime"
              plane_namespace = (os.getenv("PLANE_NAMESPACE") or "plane").strip() or "plane"
              wait_seconds = int(os.getenv("PLANE_BOOTSTRAP_WAIT_SECONDS", "900"))
              status_wait_seconds = int(os.getenv("PLANE_BOOTSTRAP_STATUS_WAIT_SECONDS", "300"))
              control_plane_api_key = os.getenv("CONTROL_PLANE_API_KEY", "demo-token").strip() or "demo-token"
              control_plane_status_url = (
                  os.getenv("CONTROL_PLANE_STATUS_URL")
                  or f"http://control-plane.{control_plane_namespace}.svc.cluster.local:8080/integrations/status"
              ).rstrip("/")
              token_label = os.getenv("PLANE_CONTROL_PLANE_TOKEN_LABEL", "ims-demo-control-plane").strip() or "ims-demo-control-plane"
              token_description = (
                  os.getenv("PLANE_CONTROL_PLANE_TOKEN_DESCRIPTION", "PAT for IMS control-plane ticket sync").strip()
                  or "PAT for IMS control-plane ticket sync"
              )
              preferred_admin_email = os.getenv("PLANE_ADMIN_EMAIL", "plane-admin@ims-demo.local").strip()
              preferred_admin_username = os.getenv("PLANE_ADMIN_USERNAME", "plane-admin").strip() or "plane-admin"
              preferred_admin_password = os.getenv("PLANE_ADMIN_PASSWORD", "plane").strip() or "plane"
              preferred_admin_first_name = os.getenv("PLANE_ADMIN_FIRST_NAME", "Plane").strip() or "Plane"
              preferred_admin_last_name = os.getenv("PLANE_ADMIN_LAST_NAME", "Admin").strip() or "Admin"
              preferred_admin_display_name = (
                  os.getenv("PLANE_ADMIN_DISPLAY_NAME", "Plane Admin").strip() or "Plane Admin"
              )
              preferred_workspace_slug = os.getenv("PLANE_WORKSPACE_SLUG", "ims-demo").strip() or "ims-demo"
              preferred_workspace_name = os.getenv("PLANE_WORKSPACE_NAME", "IMS Demo").strip() or "IMS Demo"
              preferred_project_name = os.getenv("PLANE_PROJECT_NAME", "IMS Demo").strip() or "IMS Demo"
              preferred_project_identifier = (
                  os.getenv("PLANE_PROJECT_IDENTIFIER", "IMS").strip().upper() or "IMS"
              )
              plane_base_url = f"http://plane-api.{plane_namespace}.svc.cluster.local:8000"
              plane_app_url = (
                  os.getenv("PLANE_APP_URL") or os.getenv("APP_BASE_URL") or os.getenv("WEB_URL") or ""
              ).strip().rstrip("/")

              service_account_token_path = "/var/run/secrets/kubernetes.io/serviceaccount/token"
              service_account_ca_path = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"

              def request_json(
                  url: str,
                  *,
                  method: str = "GET",
                  payload: dict | None = None,
                  headers: dict | None = None,
                  expected_statuses: tuple[int, ...] = (200,),
                  ignore_statuses: tuple[int, ...] = (),
                  timeout: int = 30,
                  cafile: str | None = None,
              ):
                  data = None
                  request_headers = dict(headers or {})
                  if payload is not None:
                      data = json.dumps(payload).encode("utf-8")
                  request = urllib.request.Request(url, data=data, headers=request_headers, method=method)
                  context = ssl.create_default_context(cafile=cafile) if cafile else None
                  try:
                      with urllib.request.urlopen(request, timeout=timeout, context=context) as response:
                          body = response.read().decode("utf-8")
                          if not body.strip():
                              return {}
                          return json.loads(body)
                  except urllib.error.HTTPError as exc:
                      body = exc.read().decode("utf-8")
                      if exc.code in ignore_statuses:
                          if not body.strip():
                              return None
                          return json.loads(body)
                      if exc.code not in expected_statuses:
                          raise
                      if not body.strip():
                          return {}
                      return json.loads(body)

              def k8s_request(
                  path: str,
                  *,
                  method: str = "GET",
                  payload: dict | None = None,
                  expected_statuses: tuple[int, ...] = (200,),
                  ignore_statuses: tuple[int, ...] = (),
                  content_type: str = "application/json",
              ):
                  with open(service_account_token_path, "r", encoding="utf-8") as handle:
                      token = handle.read().strip()
                  headers = {"Authorization": f"Bearer {token}"}
                  if payload is not None:
                      headers["Content-Type"] = content_type
                  return request_json(
                      f"https://kubernetes.default.svc{path}",
                      method=method,
                      payload=payload,
                      headers=headers,
                      expected_statuses=expected_statuses,
                      ignore_statuses=ignore_statuses,
                      cafile=service_account_ca_path,
                  )

              if not plane_app_url:
                  route_payload = k8s_request(
                      f"/apis/route.openshift.io/v1/namespaces/{plane_namespace}/routes/plane-web",
                      ignore_statuses=(404,),
                  ) or {}
                  route_spec = route_payload.get("spec") if isinstance(route_payload, dict) else {}
                  route_status = route_payload.get("status") if isinstance(route_payload, dict) else {}
                  route_host = str((route_spec or {}).get("host") or "").strip()
                  if not route_host:
                      ingress_entries = (route_status or {}).get("ingress") or []
                      if ingress_entries:
                          route_host = str((ingress_entries[0] or {}).get("host") or "").strip()
                  if route_host:
                      plane_app_url = f"https://{route_host}"
              if plane_app_url.startswith("http://"):
                  plane_app_url = "https://" + plane_app_url.removeprefix("http://")

              def decode_secret_data(payload: dict | None) -> dict[str, str]:
                  if not isinstance(payload, dict):
                      return {}
                  decoded: dict[str, str] = {}
                  for key, value in (payload.get("data") or {}).items():
                      try:
                          decoded[key] = base64.b64decode(str(value)).decode("utf-8")
                      except Exception:
                          decoded[key] = ""
                  return decoded

              def current_plane_status() -> dict:
                  try:
                      return request_json(
                          control_plane_status_url,
                          headers={"x-api-key": control_plane_api_key},
                          expected_statuses=(200,),
                      ) or {}
                  except Exception as exc:
                      print(f"waiting for control-plane status endpoint: {exc}", flush=True)
                      return {}

              def plane_live_configured() -> bool:
                  status_payload = current_plane_status()
                  plane_status = status_payload.get("plane") if isinstance(status_payload, dict) else {}
                  return bool((plane_status or {}).get("live_configured"))

              def rollout_control_plane() -> bool:
                  deployment_path = f"/apis/apps/v1/namespaces/{control_plane_namespace}/deployments/control-plane"
                  existing = k8s_request(deployment_path, ignore_statuses=(404,))
                  if existing is None:
                      print("control-plane deployment not present yet; skipping rollout", flush=True)
                      return False
                  k8s_request(
                      deployment_path,
                      method="PATCH",
                      payload={
                          "spec": {
                              "template": {
                                  "metadata": {
                                      "annotations": {
                                          "ims.redhat.com/plane-bootstrap-ts": str(int(time.time()))
                                      }
                                  }
                              }
                          }
                      },
                      expected_statuses=(200,),
                      content_type="application/strategic-merge-patch+json",
                  )
                  print("triggered control-plane rollout for refreshed Plane env", flush=True)
                  return True

              User = get_user_model()
              Workspace = apps.get_model("db", "Workspace")
              WorkspaceMember = apps.get_model("db", "WorkspaceMember")
              Project = apps.get_model("db", "Project")
              ProjectMember = apps.get_model("db", "ProjectMember")
              State = apps.get_model("db", "State")
              APIToken = apps.get_model("db", "APIToken")

              def ensure_admin_user():
                  user = User.objects.filter(email=preferred_admin_email).first()
                  if user is None:
                      user = User.objects.filter(username=preferred_admin_username).first()
                      if user is not None:
                          print(f"reusing Plane admin user {preferred_admin_username}", flush=True)
                  if user is None:
                      user = User.objects.create_superuser(
                          preferred_admin_username,
                          preferred_admin_email,
                          preferred_admin_password,
                      )
                      print(f"created Plane admin user {preferred_admin_email}", flush=True)

                  updates = []
                  desired_user_fields = {
                      "email": preferred_admin_email,
                      "username": preferred_admin_username,
                      "display_name": preferred_admin_display_name,
                      "first_name": preferred_admin_first_name,
                      "last_name": preferred_admin_last_name,
                      "is_active": True,
                      "is_email_verified": True,
                      "is_staff": True,
                      "is_superuser": True,
                  }
                  for field_name, value in desired_user_fields.items():
                      if getattr(user, field_name) != value:
                          setattr(user, field_name, value)
                          updates.append(field_name)
                  if not user.check_password(preferred_admin_password):
                      user.set_password(preferred_admin_password)
                      updates.append("password")
                  if updates:
                      user.save(update_fields=updates)
                      print(f"updated Plane admin user fields: {', '.join(updates)}", flush=True)

                  instance = Instance.objects.order_by("-created_at").first()
                  if instance is not None:
                      instance_updates = []
                      desired_domain = ""
                      if plane_app_url:
                          try:
                              desired_domain = str(urlparse(plane_app_url).hostname or "").strip()
                          except Exception:
                              desired_domain = ""
                      desired_instance_fields = {
                          "instance_name": preferred_workspace_name,
                          "is_setup_done": True,
                      }
                      if desired_domain:
                          desired_instance_fields["domain"] = desired_domain
                      for field_name, value in desired_instance_fields.items():
                          if getattr(instance, field_name) != value:
                              setattr(instance, field_name, value)
                              instance_updates.append(field_name)
                      if instance_updates:
                          instance.save(update_fields=instance_updates)
                          print(f"updated Plane instance fields: {', '.join(instance_updates)}", flush=True)
                      cache.clear()
                      print("cleared Plane cache after instance reconciliation", flush=True)
                      instance_admin, created = InstanceAdmin.objects.get_or_create(
                          user=user,
                          instance=instance,
                          defaults={"role": 20},
                      )
                      if created:
                          print(f"created Plane instance admin for {preferred_admin_email}", flush=True)
                      elif instance_admin.role != 20:
                          instance_admin.role = 20
                          instance_admin.save(update_fields=["role"])
                          print(f"updated Plane instance admin role for {preferred_admin_email}", flush=True)
                  else:
                      print("waiting for Plane instance record", flush=True)

                  return user

              def ensure_workspace(user):
                  workspace = Workspace.objects.filter(slug=preferred_workspace_slug).first()
                  if workspace is None:
                      workspace = Workspace.objects.create(
                          name=preferred_workspace_name,
                          slug=preferred_workspace_slug,
                          owner=user,
                      )
                      print(f"created Plane workspace {preferred_workspace_slug}", flush=True)

                  member, created = WorkspaceMember.objects.get_or_create(
                      workspace=workspace,
                      member=user,
                      defaults={"role": 20},
                  )
                  if created:
                      print(f"created Plane workspace membership for {preferred_admin_email}", flush=True)
                  elif member.role != 20:
                      member.role = 20
                      member.save(update_fields=["role"])
                      print(f"updated Plane workspace membership for {preferred_admin_email}", flush=True)

                  return workspace

              def ensure_project(user, workspace):
                  project = (
                      Project.objects.filter(workspace=workspace, identifier=preferred_project_identifier).order_by("id").first()
                  )
                  if project is None:
                      project = Project.objects.create(
                          name=preferred_project_name,
                          description="IMS demo incidents",
                          workspace=workspace,
                          identifier=preferred_project_identifier,
                          project_lead=user,
                          default_assignee=user,
                      )
                      print(f"created Plane project {preferred_project_identifier}", flush=True)

                  updates = []
                  if project.project_lead_id != user.id:
                      project.project_lead = user
                      updates.append("project_lead")
                  if project.default_assignee_id != user.id:
                      project.default_assignee = user
                      updates.append("default_assignee")
                  if project.name != preferred_project_name:
                      project.name = preferred_project_name
                      updates.append("name")
                  if updates:
                      project.save(update_fields=updates)
                      print(f"updated Plane project fields: {', '.join(updates)}", flush=True)

                  member, created = ProjectMember.objects.get_or_create(
                      project=project,
                      workspace=workspace,
                      member=user,
                      defaults={"role": 20},
                  )
                  if created:
                      print(f"created Plane project membership for {preferred_admin_email}", flush=True)
                  elif member.role != 20:
                      member.role = 20
                      member.save(update_fields=["role"])
                      print(f"updated Plane project membership for {preferred_admin_email}", flush=True)

                  desired_states = [
                      {
                          "name": "Todo",
                          "slug": "todo",
                          "group": "unstarted",
                          "color": "#4F46E5",
                          "default": True,
                      },
                      {
                          "name": "In Progress",
                          "slug": "in-progress",
                          "group": "started",
                          "color": "#F59E0B",
                          "default": False,
                      },
                      {
                          "name": "Done",
                          "slug": "done",
                          "group": "completed",
                          "color": "#10B981",
                          "default": False,
                      },
                      {
                          "name": "Cancelled",
                          "slug": "cancelled",
                          "group": "cancelled",
                          "color": "#6B7280",
                          "default": False,
                      },
                  ]
                  default_state = None
                  for sequence, state_spec in enumerate(desired_states, start=1):
                      state, created = State.objects.get_or_create(
                          project=project,
                          workspace=workspace,
                          slug=state_spec["slug"],
                          defaults={
                              "name": state_spec["name"],
                              "description": state_spec["name"],
                              "color": state_spec["color"],
                              "group": state_spec["group"],
                              "default": state_spec["default"],
                              "sequence": float(sequence * 1000),
                          },
                      )
                      if created:
                          print(f"created Plane project state {state_spec['name']}", flush=True)
                      else:
                          state_updates = []
                          desired_state_fields = {
                              "name": state_spec["name"],
                              "description": state_spec["name"],
                              "color": state_spec["color"],
                              "group": state_spec["group"],
                              "default": state_spec["default"],
                          }
                          for field_name, value in desired_state_fields.items():
                              if getattr(state, field_name) != value:
                                  setattr(state, field_name, value)
                                  state_updates.append(field_name)
                          if state_updates:
                              state.save(update_fields=state_updates)
                              print(f"updated Plane project state {state_spec['name']}", flush=True)
                      if state_spec["default"]:
                          default_state = state

                  if default_state is not None and project.default_state_id != default_state.id:
                      project.default_state = default_state
                      project.save(update_fields=["default_state"])
                      print(f"updated Plane default state for {preferred_project_identifier}", flush=True)

                  return project

              deadline = time.time() + wait_seconds
              user = None
              workspace = None
              project = None
              last_error = None
              while time.time() < deadline:
                  try:
                      user = ensure_admin_user()
                      workspace = ensure_workspace(user)
                      project = ensure_project(user, workspace)
                  except OperationalError as exc:
                      last_error = exc
                      print(f"waiting for Plane database: {exc}", flush=True)
                      time.sleep(10)
                      continue
                  except Exception as exc:
                      last_error = exc
                      print(f"waiting for Plane seed objects: {exc}", flush=True)
                      time.sleep(10)
                      continue

                  if user and workspace and project:
                      break

                  print("waiting for Plane user/workspace/project seed objects", flush=True)
                  time.sleep(10)

              if not user or not workspace or not project:
                  raise SystemExit(f"Plane seed data was not ready before bootstrap timeout: {last_error}")

              token = APIToken.objects.filter(label=token_label, user=user, is_active=True).order_by("-updated_at").first()
              if token is None:
                  token = APIToken.objects.create(
                      label=token_label,
                      description=token_description,
                      is_active=True,
                      token=f"plane_api_{uuid.uuid4().hex}",
                      user=user,
                      user_type=0,
                      workspace=None,
                      is_service=False,
                  )
                  print(f"created Plane PAT {token_label}", flush=True)
              else:
                  print(f"reusing Plane PAT {token_label}", flush=True)

              desired_secret_data = {
                  "PLANE_BASE_URL": plane_base_url,
                  "PLANE_APP_URL": plane_app_url,
                  "PLANE_WORKSPACE_SLUG": str(workspace.slug or preferred_workspace_slug),
                  "PLANE_PROJECT_ID": str(project.id),
                  "PLANE_API_KEY": str(token.token),
              }

              secret_path = f"/api/v1/namespaces/{control_plane_namespace}/secrets/plane-integration-auth"
              current_secret = k8s_request(secret_path, ignore_statuses=(404,))
              current_values = decode_secret_data(current_secret)

              if current_secret is None:
                  k8s_request(
                      f"/api/v1/namespaces/{control_plane_namespace}/secrets",
                      method="POST",
                      payload={
                          "apiVersion": "v1",
                          "kind": "Secret",
                          "metadata": {"name": "plane-integration-auth", "namespace": control_plane_namespace},
                          "type": "Opaque",
                          "stringData": desired_secret_data,
                      },
                      expected_statuses=(201,),
                  )
                  print("created plane-integration-auth", flush=True)
              elif any(current_values.get(key, "") != value for key, value in desired_secret_data.items()):
                  try:
                      k8s_request(
                          secret_path,
                          method="PATCH",
                          payload={"stringData": desired_secret_data},
                          expected_statuses=(200,),
                          content_type="application/merge-patch+json",
                      )
                      print("patched plane-integration-auth", flush=True)
                  except urllib.error.HTTPError as exc:
                      if exc.code != 404:
                          raise
                      k8s_request(
                          f"/api/v1/namespaces/{control_plane_namespace}/secrets",
                          method="POST",
                          payload={
                              "apiVersion": "v1",
                              "kind": "Secret",
                              "metadata": {"name": "plane-integration-auth", "namespace": control_plane_namespace},
                              "type": "Opaque",
                              "stringData": desired_secret_data,
                          },
                          expected_statuses=(201,),
                      )
                      print("recreated plane-integration-auth after concurrent prune", flush=True)
              else:
                  print("plane-integration-auth already matches desired Plane settings", flush=True)

              rolled_out = rollout_control_plane()
              if plane_live_configured():
                  print("control-plane reports Plane integration live", flush=True)
              else:
                  status_deadline = time.time() + status_wait_seconds
                  while time.time() < status_deadline:
                      if plane_live_configured():
                          print("control-plane reports Plane integration live", flush=True)
                          break
                      time.sleep(10)
                  else:
                      if rolled_out:
                          print(
                              "Plane credentials were seeded and control-plane rollout was requested; "
                              "skipping failure while control-plane catches up",
                              flush=True,
                          )
                      else:
                          print(
                              "Plane credentials were seeded before control-plane became available; "
                              "the next control-plane start will pick them up automatically",
                              flush=True,
                          )
              PY
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
