            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
        - name: oauth-proxy
          image: registry.redhat.io/openshift4/ose-oauth-proxy-rhel9:v4.20.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: oauth-proxy
              containerPort: 8443
          args:
            - --https-address=:8443
            - --provider=openshift
            - --openshift-service-account=demo-ui
            - --upstream=http://localhost:8080
            - --tls-cert=/etc/tls/private/tls.crt
            - --tls-key=/etc/tls/private/tls.key
            - --cookie-secret-file=/etc/proxy/secrets/session_secret
          volumeMounts:
            - name: demo-ui-oauth-tls
              mountPath: /etc/tls/private
              readOnly: true
            - name: demo-ui-oauth-config
              mountPath: /etc/proxy/secrets
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: demo-ui
  namespace: ims-demo-lab
  labels:
    app: demo-ui
  annotations:
    service.alpha.openshift.io/serving-cert-secret-name: demo-ui-oauth-tls
spec:
  selector:
    app: demo-ui
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: oauth
      port: 8443
      targetPort: oauth-proxy
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: demo-ui
  namespace: ims-demo-lab
spec:
  to:
    kind: Service
    name: demo-ui
    weight: 100
  port:
    targetPort: oauth
  tls:
    termination: reencrypt
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
