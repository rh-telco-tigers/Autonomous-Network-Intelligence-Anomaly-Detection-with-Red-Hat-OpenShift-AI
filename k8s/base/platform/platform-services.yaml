apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: control-plane-data
  namespace: ims-demo-lab
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane
  namespace: ims-demo-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: control-plane
  template:
    metadata:
      labels:
        app: control-plane
    spec:
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: control-plane-data
      containers:
        - name: control-plane
          image: control-plane:latest
          ports:
            - containerPort: 8080
          env:
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: demo-api-auth
                  key: API_KEY
            - name: API_KEYS_JSON
              valueFrom:
                secretKeyRef:
                  name: demo-api-auth
                  key: API_KEYS_JSON
            - name: CONTROL_PLANE_DB_PATH
              value: /data/control-plane.db
            - name: ENABLE_AUTOMATION
              value: "false"
            - name: AUTOMATION_MODE
              value: simulate
            - name: DEMO_INTEGRATIONS_ENABLED
              value: "true"
            - name: CONSOLE_CLUSTER_NAME
              value: ims-demo-lab
            - name: CONSOLE_AUTO_REFRESH_SECONDS
              value: "5"
            - name: FEATURE_GATEWAY_URL
              value: http://feature-gateway.ims-demo-lab.svc.cluster.local:8080
            - name: ANOMALY_SERVICE_URL
              value: http://anomaly-service.ims-demo-lab.svc.cluster.local:8080
            - name: RCA_SERVICE_URL
              value: http://rca-service.ims-demo-lab.svc.cluster.local:8080
            - name: MILVUS_URI
              value: http://milvus.ims-demo-lab.svc.cluster.local:19530
            - name: MILVUS_COLLECTIONS
              value: ims_runbooks,incident_evidence,incident_reasoning,incident_resolution,ims_topology,ims_signal_patterns
            - name: RAG_ROOT_DIR
              value: /app/ai/rag
            - name: PREDICTIVE_SERVICE_URL
              value: http://ims-predictive-fs-predictor.ims-demo-lab.svc.cluster.local:8080
            - name: PLANE_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: plane-integration-auth
                  key: PLANE_BASE_URL
            - name: PLANE_APP_URL
              valueFrom:
                secretKeyRef:
                  name: plane-integration-auth
                  key: PLANE_APP_URL
            - name: PLANE_WORKSPACE_SLUG
              valueFrom:
                secretKeyRef:
                  name: plane-integration-auth
                  key: PLANE_WORKSPACE_SLUG
            - name: PLANE_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: plane-integration-auth
                  key: PLANE_PROJECT_ID
            - name: PLANE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: plane-integration-auth
                  key: PLANE_API_KEY
            - name: PLANE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: plane-integration-auth
                  key: PLANE_WEBHOOK_SECRET
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
          resources:
            requests:
              cpu: 100m
              memory: 192Mi
            limits:
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: control-plane
  namespace: ims-demo-lab
  labels:
    app: control-plane
spec:
  selector:
    app: control-plane
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: control-plane
  namespace: ims-demo-lab
spec:
  to:
    kind: Service
    name: control-plane
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
---
