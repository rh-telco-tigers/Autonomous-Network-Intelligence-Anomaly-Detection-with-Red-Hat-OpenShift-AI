apiVersion: v1
kind: Secret
metadata:
  name: demo-api-auth
  namespace: ims-demo-lab
type: Opaque
stringData:
  API_KEY: demo-token
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: control-plane-data
  namespace: ims-demo-lab
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane
  namespace: ims-demo-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: control-plane
  template:
    metadata:
      labels:
        app: control-plane
    spec:
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: control-plane-data
      containers:
        - name: control-plane
          image: control-plane:latest
          ports:
            - containerPort: 8080
          env:
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: demo-api-auth
                  key: API_KEY
            - name: CONTROL_PLANE_DB_PATH
              value: /data/control-plane.db
            - name: ENABLE_AUTOMATION
              value: "false"
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
          resources:
            requests:
              cpu: 100m
              memory: 192Mi
            limits:
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: control-plane
  namespace: ims-demo-lab
  labels:
    app: control-plane
spec:
  selector:
    app: control-plane
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: control-plane
  namespace: ims-demo-lab
spec:
  to:
    kind: Service
    name: control-plane
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: feature-gateway
  namespace: ims-demo-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: feature-gateway
  template:
    metadata:
      labels:
        app: feature-gateway
    spec:
      containers:
        - name: feature-gateway
          image: feature-gateway:latest
          ports:
            - containerPort: 8080
          env:
            - name: IMS_PCSCF_HOST
              value: ims-pcscf.ims-demo-lab.svc.cluster.local
            - name: IMS_PCSCF_PORT
              value: "5060"
            - name: IMS_PCSCF_TELEMETRY_URL
              value: http://ims-pcscf.ims-demo-lab.svc.cluster.local:8080
            - name: IMS_SCSCF_TELEMETRY_URL
              value: http://ims-scscf.ims-demo-lab.svc.cluster.local:8080
            - name: IMS_HSS_TELEMETRY_URL
              value: http://ims-hss.ims-demo-lab.svc.cluster.local:8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: feature-gateway
  namespace: ims-demo-lab
  labels:
    app: feature-gateway
spec:
  selector:
    app: feature-gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: feature-gateway
  namespace: ims-demo-lab
spec:
  to:
    kind: Service
    name: feature-gateway
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
