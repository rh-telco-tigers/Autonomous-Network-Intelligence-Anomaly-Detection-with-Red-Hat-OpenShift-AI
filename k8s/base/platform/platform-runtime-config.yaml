apiVersion: v1
kind: ConfigMap
metadata:
  name: ani-platform-config
  namespace: ani-demo-lab
data:
  IMS_NAMESPACE: ani-demo-lab
  IMS_PROJECT: ani-demo
  DEMO_PROJECT: ani-demo
  CONTROL_PLANE_PROJECT: ani-demo
  CONSOLE_CLUSTER_NAME: ani-demo-lab
  CONTROL_PLANE_URL: http://control-plane.ani-demo-lab.svc.cluster.local:8080
  CONTROL_PLANE_PROXY_URL: http://control-plane.ani-demo-lab.svc.cluster.local:8080
  CONTROL_PLANE_PUBLIC_URL: http://control-plane.ani-demo-lab.svc.cluster.local:8080
  FEATURE_GATEWAY_URL: http://feature-gateway.ani-demo-lab.svc.cluster.local:8080
  ANOMALY_SERVICE_URL: http://anomaly-service.ani-demo-lab.svc.cluster.local:8080
  RCA_SERVICE_URL: http://rca-service.ani-demo-lab.svc.cluster.local:8080
  PREDICTIVE_SERVICE_URL: http://ani-predictive-fs-predictor.ani-demo-lab.svc.cluster.local:8080
  PREDICTIVE_ENDPOINT: http://ani-predictive-fs-predictor.ani-demo-lab.svc.cluster.local:8080
  PREDICTIVE_MODEL_NAME: ani-predictive-fs
  PREDICTIVE_MODEL_VERSION_LABEL: ani-predictive-fs
  PREDICTIVE_ACTIVE_PROFILE: live
  PREDICTIVE_ENDPOINT_LIVE: http://ani-predictive-fs-predictor.ani-demo-lab.svc.cluster.local:8080
  PREDICTIVE_MODEL_NAME_LIVE: ani-predictive-fs
  PREDICTIVE_MODEL_VERSION_LABEL_LIVE: ani-predictive-fs
  PREDICTIVE_BACKFILL_SERVICE_URL: ""
  PREDICTIVE_ENDPOINT_BACKFILL: ""
  PREDICTIVE_MODEL_NAME_BACKFILL: ani-predictive-backfill
  PREDICTIVE_MODEL_VERSION_LABEL_BACKFILL: ani-predictive-backfill
  PREDICTIVE_MODELCAR_SERVICE_URL: http://ani-predictive-backfill-modelcar-predictor.ani-demo-lab.svc.cluster.local:8080
  PREDICTIVE_ENDPOINT_MODELCAR: http://ani-predictive-backfill-modelcar-predictor.ani-demo-lab.svc.cluster.local:8080
  PREDICTIVE_MODEL_NAME_MODELCAR: ani-predictive-backfill-modelcar
  PREDICTIVE_MODEL_VERSION_LABEL_MODELCAR: ani-predictive-backfill-modelcar
  INCIDENT_AUTO_RCA_SAMPLE_RATE: "0.5"
  AI_PLAYBOOK_GENERATION_ENABLED: "true"
  AI_PLAYBOOK_GENERATION_KAFKA_BOOTSTRAP_SERVERS: ani-release-kafka-kafka-bootstrap.ani-demo-lab.svc.cluster.local:9092
  AI_PLAYBOOK_GENERATION_KAFKA_TOPIC: aiops-ansible-playbook-generate-instruction
  PLAYBOOK_GENERATION_CALLBACK_BASE_URL: http://control-plane.ani-demo-lab.svc.cluster.local:8080
  IMS_PCSCF_HOST: ims-pcscf.ani-demo-lab.svc.cluster.local
  IMS_PCSCF_PORT: "5060"
  DATASET_STORE_ENDPOINT: http://model-storage-minio.ani-demo-lab.svc.cluster.local:9000
  DATASET_STORE_BUCKET: ani-models
  DATASET_STORE_PREFIX: pipelines/ani-demo-lab/datasets
  FEAST_S3_ENDPOINT_URL: http://model-storage-minio.ani-demo-lab.svc.cluster.local:9000
  FEATURESTORE_REGISTRY_PATH: feast-ani-featurestore-registry.ani-demo-lab.svc.cluster.local:443
  FEATURESTORE_ONLINE_STORE_PATH: https://feast-ani-featurestore-online.ani-demo-lab.svc.cluster.local:443
  MODEL_REGISTRY_ENDPOINT: http://default-modelregistry.rhoai-model-registries.svc.cluster.local:8080
  MODEL_REGISTRY_NAMESPACE: rhoai-model-registries
  MODEL_REGISTRY_SERVICE: default-modelregistry
  MILVUS_URI: http://milvus.ani-demo-lab.svc.cluster.local:19530
  MILVUS_COLLECTIONS: ani_runbooks,incident_evidence,incident_reasoning,incident_resolution,ani_topology,ani_signal_patterns
  DEMO_SCENARIOS: registration_storm,registration_failure,authentication_failure,malformed_invite,routing_error,busy_destination,call_setup_timeout,call_drop_mid_session,server_internal_error,network_degradation,retransmission_spike
