# Opt-in MLServer endpoint kept separate from the base kustomization so it can
# be validated against the active Triton endpoint before any cutover.
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: ani-predictive-fs-mlserver
  namespace: ani-demo-lab
  labels:
    opendatahub.io/dashboard: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "60"
    opendatahub.io/model-type: predictive-featurestore-mlserver
    openshift.io/display-name: ani-predictive-fs-mlserver
    serving.kserve.io/deploymentMode: RawDeployment
    serving.kserve.io/enable-prometheus-scraping: "true"
    ani.redhat.com/serving-alias: current
    ani.redhat.com/implementation-note: Side-by-side MLServer endpoint; validate against Triton before any cutover.
spec:
  predictor:
    serviceAccountName: model-storage-sa
    minReplicas: 1
    maxReplicas: 1
    model:
      runtime: mlserver-sklearn-runtime
      modelFormat:
        name: sklearn
      protocolVersion: v2
      storageUri: s3://ani-models/predictive-featurestore-mlserver/ani-predictive-fs-mlserver/current/
      resources:
        requests:
          cpu: 100m
          memory: 1Gi
        limits:
          cpu: 500m
          memory: 2Gi
---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: ani-predictive-fs-mlserver-metrics
  namespace: ani-demo-lab
  annotations:
    argocd.argoproj.io/sync-wave: "60"
  labels:
    monitoring.opendatahub.io/scrape: "true"
spec:
  namespaceSelector:
    matchNames:
      - ani-datascience
  selector:
    matchLabels:
      serving.kserve.io/inferenceservice: ani-predictive-fs-mlserver
  podMetricsEndpoints:
    - path: /metrics
      targetPort: 8082
      interval: 30s
