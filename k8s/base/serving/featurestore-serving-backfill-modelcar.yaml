apiVersion: v1
kind: Secret
metadata:
  name: ani-predictive-backfill-modelcar
  namespace: ani-demo-lab
  annotations:
    opendatahub.io/connection-type-protocol: uri
    opendatahub.io/connection-type-ref: uri-v1
    openshift.io/display-name: ani-predictive-backfill-modelcar
  labels:
    opendatahub.io/dashboard: "true"
type: Opaque
stringData:
  URI: oci://quay.io/autonomousnetworkintelligence/ani-predictive-backfill-modelcar:latest
---
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: ani-predictive-backfill-modelcar
  namespace: ani-demo-lab
  labels:
    opendatahub.io/dashboard: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "60"
    opendatahub.io/connections: ani-predictive-backfill-modelcar
    opendatahub.io/model-type: predictive-featurestore-backfill-modelcar
    openshift.io/display-name: ani-predictive-backfill-modelcar
    serving.kserve.io/deploymentMode: RawDeployment
    serving.kserve.io/enable-prometheus-scraping: "true"
    ani.redhat.com/serving-alias: current
    ani-demo/runtime-fix-ts: trustyai-explainability-23b61a8
spec:
  predictor:
    serviceAccountName: model-storage-sa
    minReplicas: 1
    maxReplicas: 1
    model:
      runtime: ani-autogluon-mlserver-runtime
      modelFormat:
        name: autogluon
      protocolVersion: v2
      storageUri: oci://quay.io/autonomousnetworkintelligence/ani-predictive-backfill-modelcar:latest
      resources:
        requests:
          cpu: 100m
          memory: 1Gi
        limits:
          cpu: 500m
          memory: 2Gi
  explainer:
    containers:
      - name: explainer
        image: quay.io/trustyai/trustyai-kserve-explainer:latest
        imagePullPolicy: IfNotPresent
        args:
          - --model_name
          - ani-predictive-backfill-modelcar
          - --predictor_host
          - ani-predictive-backfill-modelcar-predictor.$(POD_NAMESPACE).svc.cluster.local:8081
        env:
          - name: POD_NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: ani-predictive-backfill-modelcar-metrics
  namespace: ani-demo-lab
  annotations:
    argocd.argoproj.io/sync-wave: "60"
  labels:
    monitoring.opendatahub.io/scrape: "true"
spec:
  namespaceSelector:
    matchNames:
      - ani-datascience
  selector:
    matchLabels:
      serving.kserve.io/inferenceservice: ani-predictive-backfill-modelcar
  podMetricsEndpoints:
    - path: /metrics
      targetPort: 8082
      interval: 30s
