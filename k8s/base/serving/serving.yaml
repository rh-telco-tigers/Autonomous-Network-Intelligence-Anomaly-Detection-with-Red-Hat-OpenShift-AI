apiVersion: v1
kind: ServiceAccount
metadata:
  name: model-storage-sa
  namespace: ims-demo-lab
secrets:
  - name: model-storage-credentials
---
apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: nvidia-triton-runtime
  namespace: ims-demo-lab
  annotations:
    openshift.io/display-name: NVIDIA Triton Runtime
  labels:
    opendatahub.io/dashboard: "true"
spec:
  supportedModelFormats:
    - name: triton
      version: "2"
      autoSelect: true
  protocolVersions:
    - v2
  containers:
    - name: kserve-container
      image: nvcr.io/nvidia/tritonserver:24.08-py3
      command:
        - tritonserver
      args:
        - --model-repository=/mnt/models
        - --allow-http=true
        - --http_port=8080
        - --grpc-port=9000
        - --metrics-port=8002
      ports:
        - containerPort: 8080
          protocol: TCP
---
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: ims-predictive
  namespace: ims-demo-lab
  annotations:
    serving.kserve.io/deploymentMode: RawDeployment
spec:
  predictor:
    serviceAccountName: model-storage-sa
    minReplicas: 1
    maxReplicas: 1
    model:
      runtime: nvidia-triton-runtime
      modelFormat:
        name: triton
      protocolVersion: v2
      storageUri: s3://ims-models/predictive/
      resources:
        requests:
          cpu: 100m
          memory: 1Gi
        limits:
          memory: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: ims-generative-proxy
  namespace: ims-demo-lab
spec:
  type: ExternalName
  externalName: llama-32-3b-instruct-predictor.my-first-model.svc.cluster.local
  ports:
    - name: http
      port: 8080
      targetPort: 8080
