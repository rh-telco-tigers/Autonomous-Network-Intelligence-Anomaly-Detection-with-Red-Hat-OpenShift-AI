apiVersion: v1
kind: ServiceAccount
metadata:
  name: model-storage-sa
  namespace: ims-demo-lab
secrets:
  - name: aws-connection-minio
---
apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: nvidia-triton-runtime
  namespace: ims-demo-lab
  annotations:
    opendatahub.io/apiProtocol: REST
    opendatahub.io/recommended-accelerators: '[]'
    opendatahub.io/runtime-version: 24.08-py3
    opendatahub.io/serving-runtime-scope: global
    opendatahub.io/template-display-name: NVIDIA Triton Runtime
    opendatahub.io/template-name: nvidia-triton-runtime-template
    openshift.io/display-name: NVIDIA Triton Runtime
  labels:
    opendatahub.io/dashboard: "true"
spec:
  annotations:
    monitoring.opendatahub.io/scrape: "true"
    opendatahub.io/kserve-runtime: triton
    prometheus.io/path: /metrics
    prometheus.io/port: "8002"
  supportedModelFormats:
    - name: triton
      version: "2"
      autoSelect: true
  protocolVersions:
    - v2
  multiModel: false
  containers:
    - name: kserve-container
      image: nvcr.io/nvidia/tritonserver:24.08-py3
      command:
        - tritonserver
      args:
        - --model-repository=/mnt/models
        - --allow-http=true
        - --http-port=8080
        - --grpc-port=9000
        - --metrics-port=8002
      ports:
        - containerPort: 8080
          protocol: TCP
        - name: metrics
          containerPort: 8002
          protocol: TCP
      resources:
        requests:
          cpu: 100m
          memory: 1Gi
        limits:
          cpu: 500m
          memory: 2Gi
---
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: ims-predictive
  namespace: ims-demo-lab
  labels:
    opendatahub.io/dashboard: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "60"
    opendatahub.io/model-type: predictive
    openshift.io/display-name: ims-predictive
    serving.kserve.io/deploymentMode: RawDeployment
    serving.kserve.io/enable-prometheus-scraping: "true"
spec:
  predictor:
    serviceAccountName: model-storage-sa
    minReplicas: 1
    maxReplicas: 1
    model:
      runtime: nvidia-triton-runtime
      modelFormat:
        name: triton
      protocolVersion: v2
      storageUri: s3://ims-models/predictive/
      resources:
        requests:
          cpu: 100m
          memory: 1Gi
        limits:
          cpu: 500m
          memory: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: ims-generative-proxy
  namespace: ims-demo-lab
spec:
  type: ExternalName
  externalName: llama-32-3b-instruct-predictor.my-first-model.svc.cluster.local
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: ims-predictive-metrics
  namespace: ims-demo-lab
  annotations:
    argocd.argoproj.io/sync-wave: "65"
  labels:
    monitoring.opendatahub.io/scrape: "true"
spec:
  namespaceSelector:
    matchNames:
      - ims-datascience
  selector:
    matchLabels:
      serving.kserve.io/inferenceservice: ims-predictive
  podMetricsEndpoints:
    - path: /metrics
      targetPort: 8002
      interval: 30s
