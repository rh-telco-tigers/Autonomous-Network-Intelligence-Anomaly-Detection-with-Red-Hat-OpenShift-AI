apiVersion: v1
kind: ServiceAccount
metadata:
  name: model-storage-sa
  namespace: ims-demo-lab
secrets:
  - name: model-storage-credentials
---
apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: predictive-sklearn-runtime
  namespace: ims-demo-lab
spec:
  annotations:
    openshift.io/display-name: Predictive Sklearn Runtime
  supportedModelFormats:
    - name: sklearn
      version: "1"
      autoSelect: true
  protocolVersions:
    - v2
  containers:
    - name: kserve-container
      image: docker.io/kserve/sklearnserver:v0.14.1
      args:
        - --model_name={{.Name}}
        - --model_dir=/mnt/models
        - --http_port=8080
      ports:
        - containerPort: 8080
      env:
        - name: STORAGE_URI
          value: "{{.StorageURI}}"
---
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: ims-predictive
  namespace: ims-demo-lab
  annotations:
    serving.kserve.io/deploymentMode: RawDeployment
spec:
  predictor:
    serviceAccountName: model-storage-sa
    minReplicas: 1
    maxReplicas: 1
    model:
      runtime: predictive-sklearn-runtime
      modelFormat:
        name: sklearn
      storageUri: s3://ims-models/predictive/
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: ims-generative-proxy
  namespace: ims-demo-lab
spec:
  type: ExternalName
  externalName: llama-32-3b-instruct-predictor.my-first-model.svc.cluster.local
  ports:
    - name: http
      port: 8080
      targetPort: 8080
