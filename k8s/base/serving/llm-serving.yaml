apiVersion: v1
kind: Secret
metadata:
  name: llama-32-3b-instruct
  namespace: ani-demo-lab
  annotations:
    opendatahub.io/connection-type-protocol: uri
    opendatahub.io/connection-type-ref: uri-v1
    openshift.io/display-name: llama-3.2-3b-instruct
  labels:
    opendatahub.io/dashboard: "true"
type: Opaque
stringData:
  URI: oci://quay.io/redhat-ai-services/modelcar-catalog:llama-3.2-3b-instruct
---
apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: llama-32-3b-instruct
  namespace: ani-demo-lab
  annotations:
    argocd.argoproj.io/sync-wave: "55"
    opendatahub.io/apiProtocol: REST
    opendatahub.io/recommended-accelerators: '["nvidia.com/gpu"]'
    opendatahub.io/runtime-version: v0.9.1.0
    opendatahub.io/serving-runtime-scope: global
    opendatahub.io/template-display-name: vLLM NVIDIA GPU ServingRuntime for KServe
    opendatahub.io/template-name: vllm-cuda-runtime-template
    openshift.io/display-name: vLLM NVIDIA GPU ServingRuntime for KServe
  labels:
    opendatahub.io/dashboard: "true"
spec:
  annotations:
    prometheus.io/path: /metrics
    prometheus.io/port: "8080"
  supportedModelFormats:
    - name: vLLM
      autoSelect: true
  multiModel: false
  containers:
    - name: kserve-container
      image: registry.redhat.io/rhaiis/vllm-cuda-rhel9:3.2.4
      command:
        - python
        - -m
        - vllm.entrypoints.openai.api_server
      args:
        - --port=8080
        - --model=/mnt/models
        - --served-model-name={{.Name}}
      env:
        - name: HF_HOME
          value: /tmp/hf_home
      ports:
        - containerPort: 8080
          protocol: TCP
---
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: llama-32-3b-instruct
  namespace: ani-demo-lab
  annotations:
    argocd.argoproj.io/sync-wave: "60"
    opendatahub.io/connections: llama-32-3b-instruct
    opendatahub.io/model-type: generative
    openshift.io/display-name: llama-32-3b-instruct
    security.opendatahub.io/enable-auth: "false"
    serving.kserve.io/deploymentMode: RawDeployment
    serving.kserve.io/stop: "false"
  labels:
    opendatahub.io/dashboard: "true"
    opendatahub.io/genai-asset: "true"
spec:
  predictor:
    automountServiceAccountToken: false
    minReplicas: 1
    maxReplicas: 1
    model:
      runtime: llama-32-3b-instruct
      modelFormat:
        name: vLLM
      storageUri: oci://quay.io/redhat-ai-services/modelcar-catalog:llama-3.2-3b-instruct
      args:
        - --dtype=half
        - --max-model-len=20000
        - --gpu-memory-utilization=0.95
        - --enable-auto-tool-choice
        - --tool-call-parser=llama3_json
        - --chat-template=/opt/app-root/template/tool_chat_template_llama3.2_json.jinja
      resources:
        requests:
          cpu: "1"
          memory: 6Gi
          nvidia.com/gpu: "1"
        limits:
          cpu: "4"
          memory: 16Gi
          nvidia.com/gpu: "1"
