apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: ani-predictive-fs
  namespace: ani-demo-lab
  labels:
    opendatahub.io/dashboard: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "60"
    opendatahub.io/model-type: predictive-featurestore
    openshift.io/display-name: ani-predictive-fs
    serving.kserve.io/deploymentMode: RawDeployment
    serving.kserve.io/enable-prometheus-scraping: "true"
    ani.redhat.com/serving-alias: current
    ani-demo/runtime-fix-ts: trustyai-explainability-v1-d8d45e1
spec:
  predictor:
    serviceAccountName: model-storage-sa
    minReplicas: 1
    maxReplicas: 1
    model:
      runtime: ani-autogluon-mlserver-runtime
      modelFormat:
        name: autogluon
      protocolVersion: v2
      storageUri: s3://ani-models/predictive-featurestore/ani-predictive-fs/current/
      resources:
        requests:
          cpu: 100m
          memory: 1Gi
        limits:
          cpu: 500m
          memory: 2Gi
  explainer:
    containers:
      - name: explainer
        image: quay.io/trustyai/trustyai-kserve-explainer:latest
        imagePullPolicy: IfNotPresent
        args:
          - --model_name
          - ani-predictive-fs
          - --predictor_host
          - ani-predictive-fs-predictor.$(POD_NAMESPACE).svc.cluster.local:8081
        env:
          - name: POD_NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: ani-predictive-fs-metrics
  namespace: ani-demo-lab
  annotations:
    argocd.argoproj.io/sync-wave: "60"
  labels:
    monitoring.opendatahub.io/scrape: "true"
spec:
  namespaceSelector:
    matchNames:
      - ani-datascience
  selector:
    matchLabels:
      serving.kserve.io/inferenceservice: ani-predictive-fs
  podMetricsEndpoints:
    - path: /metrics
      targetPort: 8082
      interval: 30s
