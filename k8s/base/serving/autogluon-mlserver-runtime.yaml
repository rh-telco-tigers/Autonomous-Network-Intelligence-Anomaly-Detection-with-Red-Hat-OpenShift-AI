apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: ani-autogluon-mlserver-runtime
  namespace: ani-demo-lab
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
    opendatahub.io/apiProtocol: REST
    opendatahub.io/recommended-accelerators: '[]'
    opendatahub.io/runtime-version: autogluon-v1
    opendatahub.io/serving-runtime-scope: global
    opendatahub.io/template-display-name: ANI AutoGluon MLServer Runtime
    opendatahub.io/template-name: ani-autogluon-mlserver-runtime-template
    openshift.io/display-name: ANI AutoGluon MLServer Runtime
  labels:
    opendatahub.io/dashboard: "true"
spec:
  annotations:
    monitoring.opendatahub.io/scrape: "true"
    opendatahub.io/kserve-runtime: mlserver
    prometheus.io/path: /metrics
    prometheus.io/port: "8082"
  supportedModelFormats:
    - name: autogluon
      version: "1"
      autoSelect: true
  protocolVersions:
    - v2
  multiModel: false
  containers:
    - name: kserve-container
      image: quay.io/autonomousnetworkintelligence/ani-ai-featurestore-trainer:trustyai-explainability-bcefa0f
      imagePullPolicy: Always
      workingDir: /tmp
      command:
        - /bin/sh
        - -lc
        - mkdir -p /tmp/mlserver-metrics /tmp/mlserver-envs && uvicorn ai.featurestore.trustyai_v1_adapter:app --host 0.0.0.0 --port 8081 --http h11 --workers 4 --timeout-keep-alive 30 & exec mlserver start /mnt/models
      args: []
      env:
        - name: HOME
          value: /tmp
        - name: PYTHONPATH
          value: /workspace:/workspace/services
        - name: MLSERVER_HTTP_PORT
          value: "8080"
        - name: MLSERVER_GRPC_PORT
          value: "9000"
        - name: MLSERVER_METRICS_PORT
          value: "8082"
        - name: MLSERVER_PARALLEL_WORKERS
          value: "0"
        - name: MLSERVER_ENVIRONMENTS_DIR
          value: /tmp/mlserver-envs
        - name: MLSERVER_METRICS_DIR
          value: /tmp/mlserver-metrics
        - name: PROMETHEUS_MULTIPROC_DIR
          value: /tmp/mlserver-metrics
        - name: MODELS_DIR
          value: /mnt/models
        - name: TRUSTYAI_ADAPTER_UPSTREAM_URL
          value: http://127.0.0.1:8080
        - name: TRUSTYAI_ADAPTER_TIMEOUT_SECONDS
          value: "30"
      ports:
        - containerPort: 8080
          protocol: TCP
        - name: trustyai-v1
          containerPort: 8081
          protocol: TCP
        - name: grpc
          containerPort: 9000
          protocol: TCP
        - name: metrics
          containerPort: 8082
          protocol: TCP
      resources:
        requests:
          cpu: 100m
          memory: 1Gi
        limits:
          cpu: 500m
          memory: 2Gi
