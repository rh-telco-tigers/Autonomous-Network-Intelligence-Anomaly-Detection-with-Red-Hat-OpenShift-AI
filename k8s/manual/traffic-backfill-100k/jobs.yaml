apiVersion: batch/v1
kind: Job
metadata:
  name: sipp-backfill-normal-operation
  annotations:
    ani.redhat.com/target-windows: "45000"
    ani.redhat.com/windows-per-completion: "100"
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 1800
  parallelism: 1
  completions: 450
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sipp-backfill-normal-operation
        app.kubernetes.io/component: sipp-backfill
    spec:
      restartPolicy: Never
      containers:
        - name: sipp
          image: image-registry.openshift-image-registry.svc:5000/ani-sipp/sipp-runner:latest
          imagePullPolicy: Always
          args:
            - --target-host
            - ims-pcscf.ani-sipp.svc.cluster.local
            - --target-port
            - "5060"
            - --scenario-file
            - /scenarios/register-normal.xml
            - --scenario-name
            - normal_operation
            - --transport
            - udp
            - --call-limit
            - "1"
            - --rate
            - "1"
            - --dataset-version
            - backfill-sipp-100k-v1
            - --repeat-count
            - "100"
            - --repeat-sleep-seconds
            - "0.2"
            - --progress-every
            - "25"
          env:
            - name: DATASET_STORE_ENDPOINT
              value: http://model-storage-minio.ani-data.svc.cluster.local:9000
            - name: DATASET_STORE_BUCKET
              value: ani-models
            - name: DATASET_STORE_PREFIX
              value: pipelines/ani-datascience/datasets
            - name: DATASET_STORE_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: model-storage-credentials
                  key: AWS_ACCESS_KEY_ID
            - name: DATASET_STORE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: model-storage-credentials
                  key: AWS_SECRET_ACCESS_KEY
            - name: SIPP_EMIT_CONTROL_PLANE_INCIDENT
              value: "false"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
          volumeMounts:
            - name: scenarios
              mountPath: /scenarios
      volumes:
        - name: scenarios
          configMap:
            name: sipp-scenarios
            defaultMode: 420
---
