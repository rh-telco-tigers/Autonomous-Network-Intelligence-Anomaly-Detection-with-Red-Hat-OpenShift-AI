apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: ani-platform-build-
  namespace: ani-tekton
spec:
  pipelineRef:
    name: ani-platform-container-build
  params:
    - name: git-url
      value: http://gitea-http.gitea.svc.cluster.local:3000/gitadmin/IMS-Anomaly-Detection-with-Red-Hat-OpenShift-AI.git
    - name: git-revision
      value: __GIT_REVISION__
  taskRunTemplate:
    serviceAccountName: pipeline
  timeouts:
    pipeline: 4h0m0s
  workspaces:
    - name: source
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 5Gi
