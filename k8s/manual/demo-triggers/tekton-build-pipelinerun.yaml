apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: ani-platform-build-
  namespace: ani-tekton
spec:
  pipelineRef:
    name: ani-platform-container-build
  params:
    # Optional Quay publish flow:
    # 1. Create the authfile locally without storing the credential in git:
    #      podman login quay.io --authfile ./quay-auth.json
    # 2. Create the optional secret in ani-tekton:
    #      oc create secret generic tekton-quay-push -n ani-tekton \
    #        --from-file=.dockerconfigjson=./quay-auth.json \
    #        --type=kubernetes.io/dockerconfigjson
    # 3. Set publish-to-quay=true and choose a quay-image-tag such as a branch slug or commit alias.
    # 4. Set quay-promote-latest=true only when you intentionally want this run to refresh the Quay :latest tags used by deploy manifests.
    # If the secret is absent, the publish stage skips and the pipeline still succeeds.
    - name: git-url
      value: http://gitea-http.gitea.svc.cluster.local:3000/gitadmin/IMS-Anomaly-Detection-with-Red-Hat-OpenShift-AI.git
    - name: git-revision
      value: __GIT_REVISION__
    - name: publish-to-quay
      value: "false"
    - name: quay-image-tag
      value: ""
    - name: quay-promote-latest
      value: "false"
    - name: quay-organization
      value: autonomousnetworkintelligence
  taskRunTemplate:
    serviceAccountName: pipeline
  timeouts:
    pipeline: 4h0m0s
  workspaces:
    - name: source
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 5Gi
