apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: ani-platform-build-
  namespace: ani-tekton
spec:
  # `make trigger-build-pipeline` replaces the __...__ placeholders below.
  # If you apply this file manually, replace those values first.
  pipelineRef:
    name: ani-platform-container-build
  params:
    # Optional Quay publish flow:
    # Secret name expected by Tekton:
    #   autonomousnetworkintelligence-ocpani-pull-secret
    # Quay can download a Kubernetes dockerconfigjson secret in that shape.
    # Apply it with:
    #   oc apply -n ani-tekton -f ./autonomousnetworkintelligence-ocpani-pull-secret.yaml
    # Or create the same secret name from an authfile:
    #   podman login quay.io --authfile ./quay-auth.json
    #   oc create secret generic autonomousnetworkintelligence-ocpani-pull-secret -n ani-tekton \
    #     --from-file=.dockerconfigjson=./quay-auth.json \
    #     --type=kubernetes.io/dockerconfigjson
    - name: git-url
      value: http://gitea-http.gitea.svc.cluster.local:3000/gitadmin/IMS-Anomaly-Detection-with-Red-Hat-OpenShift-AI.git
    - name: git-revision
      value: __GIT_REVISION__
    - name: publish-to-quay
      value: "__PUBLISH_TO_QUAY__"
    - name: quay-image-tag
      value: "__QUAY_IMAGE_TAG__"
    - name: quay-promote-latest
      value: "__QUAY_PROMOTE_LATEST__"
    - name: quay-organization
      value: "__QUAY_ORGANIZATION__"
  taskRunTemplate:
    serviceAccountName: pipeline
  timeouts:
    pipeline: 4h0m0s
  workspaces:
    - name: source
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 5Gi
