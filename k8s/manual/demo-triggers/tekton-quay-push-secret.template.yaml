# Template only. Do not commit real credentials into this file.
# Generate the authfile locally, then either:
# - create the secret imperatively with `oc create secret generic ... --from-file=.dockerconfigjson=...`
# - or fill this template locally and apply it outside git.
apiVersion: v1
kind: Secret
metadata:
  name: tekton-quay-push
  namespace: ani-tekton
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: |
    {
      "auths": {
        "quay.io": {
          "auth": "REPLACE_WITH_BASE64_OF_USERNAME_COLON_PASSWORD"
        }
      }
    }
