apiVersion: batch/v1
kind: Job
metadata:
  generateName: ani-featurestore-serving-smoke-
  namespace: ani-datascience
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 1800
  template:
    metadata:
      labels:
        app: ani-featurestore-serving-smoke
    spec:
      restartPolicy: Never
      containers:
        - name: smoke-check
          image: image-registry.openshift-image-registry.svc:5000/ani-datascience/ani-ai-featurestore-trainer:latest
          command:
            - python
            - ai/training/featurestore_runtime_smoke_check.py
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
