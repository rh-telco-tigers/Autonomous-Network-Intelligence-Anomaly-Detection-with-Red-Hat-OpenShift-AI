# Manual-only reference template for adding an AWS GPU worker MachineSet.
# Do not add this path to any Argo CD kustomization. Apply it manually only.
#
# Prefer `make render-gpu-node-pool` or `make add-gpu-node-pool` so the current
# cluster's worker MachineSet supplies the AMI, IAM profile, subnet, security
# groups, user-data secret, and cluster-specific tags automatically.
apiVersion: machine.openshift.io/v1beta1
kind: MachineSet
metadata:
  name: __MACHINESET_NAME__
  namespace: openshift-machine-api
  annotations:
    capacity.cluster-autoscaler.kubernetes.io/labels: kubernetes.io/arch=amd64,node-role.kubernetes.io/gpu=
    machine.openshift.io/GPU: "1"
    machine.openshift.io/memoryMb: "131072"
    machine.openshift.io/vCPU: "32"
  labels:
    machine.openshift.io/cluster-api-cluster: __INFRASTRUCTURE_NAME__
spec:
  replicas: 1
  selector:
    matchLabels:
      machine.openshift.io/cluster-api-cluster: __INFRASTRUCTURE_NAME__
      machine.openshift.io/cluster-api-machineset: __MACHINESET_NAME__
  template:
    metadata:
      labels:
        machine.openshift.io/cluster-api-cluster: __INFRASTRUCTURE_NAME__
        machine.openshift.io/cluster-api-machine-role: worker
        machine.openshift.io/cluster-api-machine-type: worker
        machine.openshift.io/cluster-api-machineset: __MACHINESET_NAME__
    spec:
      lifecycleHooks: {}
      metadata:
        labels:
          node-role.kubernetes.io/gpu: ""
      providerSpec:
        value:
          ami:
            id: __WORKER_AMI_ID__
          apiVersion: machine.openshift.io/v1beta1
          blockDevices:
            - ebs:
                encrypted: true
                iops: 0
                kmsKey:
                  arn: ""
                volumeSize: 100
                volumeType: gp3
          capacityReservationId: ""
          credentialsSecret:
            name: aws-cloud-credentials
          deviceIndex: 0
          iamInstanceProfile:
            id: __WORKER_INSTANCE_PROFILE_ID__
          instanceType: g6.8xlarge
          kind: AWSMachineProviderConfig
          metadata:
            creationTimestamp: null
          metadataServiceOptions: {}
          placement:
            availabilityZone: __AVAILABILITY_ZONE__
            region: __REGION__
          securityGroups:
            - filters:
                - name: tag:Name
                  values:
                    - __NODE_SECURITY_GROUP_NAME__
            - filters:
                - name: tag:Name
                  values:
                    - __LB_SECURITY_GROUP_NAME__
          subnet:
            filters:
              - name: tag:Name
                values:
                  - __PRIVATE_SUBNET_NAME__
          tags:
            - name: kubernetes.io/cluster/__INFRASTRUCTURE_NAME__
              value: owned
            - name: Stack
              value: __STACK_TAG_VALUE__
            - name: config
              value: openshift-cluster
            - name: guid
              value: __GUID__
            - name: owner
              value: __OWNER__
            - name: uuid
              value: __UUID__
          userDataSecret:
            name: worker-user-data
