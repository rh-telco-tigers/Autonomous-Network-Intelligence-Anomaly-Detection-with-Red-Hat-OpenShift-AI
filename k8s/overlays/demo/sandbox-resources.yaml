apiVersion: apps/v1
kind: Deployment
metadata:
  name: rca-service
  namespace: ims-demo-lab
spec:
  strategy:
    type: Recreate
  template:
    spec:
      containers:
        - name: rca-service
          env:
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: demo-api-auth
                  key: API_KEY
            - name: CONTROL_PLANE_URL
              value: http://control-plane.ims-demo-lab.svc.cluster.local:8080
            - name: MILVUS_URI
              value: http://milvus.ims-demo-lab.svc.cluster.local:19530
            - name: MILVUS_COLLECTIONS
              value: ims_runbooks,incident_evidence,incident_reasoning,incident_resolution,ims_topology,ims_signal_patterns
            - name: LLM_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: llm-provider-config
                  key: LLM_ENDPOINT
            - name: LLM_MODEL
              valueFrom:
                configMapKeyRef:
                  name: llm-provider-config
                  key: LLM_MODEL
            - name: LLM_REQUEST_TIMEOUT_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: llm-provider-config
                  key: LLM_REQUEST_TIMEOUT_SECONDS
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-provider-auth
                  key: LLM_API_KEY
            - name: RAG_ROOT_DIR
              value: /app/ai/rag
          resources:
            $patch: replace
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-ui
  namespace: ims-demo-lab
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    spec:
      containers:
        - name: demo-ui
          resources:
            $patch: replace
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
