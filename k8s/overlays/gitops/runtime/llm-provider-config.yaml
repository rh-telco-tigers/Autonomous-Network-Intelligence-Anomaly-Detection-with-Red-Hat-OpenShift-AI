apiVersion: v1
kind: ConfigMap
metadata:
  name: llm-provider-config
data:
  LLM_ENDPOINT: http://guardrails-orchestrator-service.ani-datascience.svc.cluster.local:8090/rca
  LLM_MODEL: llama-32-3b-instruct
  LLM_REQUEST_HOST_HEADER: ""
  LLM_REQUEST_TIMEOUT_SECONDS: "60"
  TRUSTYAI_ORCHESTRATOR_ENDPOINT: https://guardrails-orchestrator-service.ani-datascience.svc.cluster.local:8032
  TRUSTYAI_ORCHESTRATOR_VERIFY_TLS: "false"
  TRUSTYAI_EXPLAINABILITY_ENDPOINT: ""
  TRUSTYAI_EXPLAINABILITY_VERIFY_TLS: "false"
  ANI_PLAYBOOK_GUARDRAILS_TRUSTYAI_ENABLED: "true"
  ANI_PLAYBOOK_GUARDRAILS_TIMEOUT_SECONDS: "15"
  ANI_INCIDENT_EXPLAINABILITY_TRUSTYAI_ENABLED: "true"
  ANI_INCIDENT_EXPLAINABILITY_TIMEOUT_SECONDS: "20"
  ANI_EXPLAINABILITY_SCHEMA_VERSION: ani.explainability.v1
  ANI_GUARDRAILS_CONTRACT_VERSION: ani.guardrails.v1
  ANI_GUARDRAILS_POLICY_VERSION: v1
  ANI_RCA_SCHEMA_VERSION: ani.rca.v1
  ANI_GUARDRAILS_CONFIDENCE_ALLOW_THRESHOLD: "0.60"
  ANI_GUARDRAILS_MIN_ALLOW_EVIDENCE_ITEMS: "2"
