apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: ani-datascience
commonAnnotations:
  argocd.argoproj.io/ignore-healthcheck: "true"
components:
  - ../../../components/image-registry/quay-public-images
resources:
  - ani-platform-config.yaml
  - image-streams.yaml
  - model-storage-credentials.yaml
  - tekton-image-access.yaml
  - ../../../base/kfp
  - ../../../base/feature-store
  - ../../../base/serving
patches:
  - target:
      group: serving.kserve.io
      version: v1alpha1
      kind: ServingRuntime
      name: ani-autogluon-mlserver-runtime
    patch: |-
      - op: replace
        path: /spec/containers/0/image
        value: quay.io/autonomousnetworkintelligence/ani-ai-featurestore-trainer:latest
