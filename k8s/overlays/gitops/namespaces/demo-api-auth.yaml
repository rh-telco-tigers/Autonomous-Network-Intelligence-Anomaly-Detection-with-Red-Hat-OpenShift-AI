apiVersion: v1
kind: Secret
metadata:
  name: demo-api-auth
  namespace: ims-datascience
type: Opaque
stringData:
  API_KEY: demo-token
  API_KEYS_JSON: |
    {
      "demo-token": {
        "subject": "demo-admin",
        "projects": ["ims-demo"],
        "roles": ["admin", "operator", "automation"]
      },
      "demo-operator-token": {
        "subject": "demo-operator",
        "projects": ["ims-demo"],
        "roles": ["operator"]
      },
      "demo-viewer-token": {
        "subject": "demo-viewer",
        "projects": ["ims-demo"],
        "roles": ["viewer"]
      },
      "eda-token": {
        "subject": "eda-automation",
        "projects": ["ims-demo"],
        "roles": ["operator", "automation"]
      }
    }
---
