apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: runtime-plane-route-read
rules:
  - apiGroups: ["route.openshift.io"]
    resources: ["routes"]
    resourceNames: ["plane-web"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: runtime-plane-route-read
subjects:
  - kind: ServiceAccount
    name: plane-integration-bootstrap
    namespace: ani-runtime
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: runtime-plane-route-read
