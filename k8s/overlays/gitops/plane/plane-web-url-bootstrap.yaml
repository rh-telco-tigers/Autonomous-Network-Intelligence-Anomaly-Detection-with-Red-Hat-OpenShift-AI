apiVersion: v1
kind: ServiceAccount
metadata:
  name: plane-web-url-bootstrap
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: plane-web-url-bootstrap
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["plane-app-vars"]
    verbs: ["get", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: ["plane-admin-wl", "plane-api-wl", "plane-live-wl", "plane-space-wl", "plane-web-wl"]
    verbs: ["get", "patch", "update"]
  - apiGroups: ["route.openshift.io"]
    resources: ["routes"]
    resourceNames: ["plane-web"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: plane-web-url-bootstrap
subjects:
  - kind: ServiceAccount
    name: plane-web-url-bootstrap
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: plane-web-url-bootstrap
---
apiVersion: batch/v1
kind: Job
metadata:
  name: plane-web-url-bootstrap
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  backoffLimit: 3
  template:
    spec:
      serviceAccountName: plane-web-url-bootstrap
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          image: quay.io/openshift/origin-cli:4.21
          command:
            - /bin/bash
            - -lc
            - |
              set -euo pipefail
              OC_TOKEN="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)"
              oc_cmd() {
                oc \
                  --token="${OC_TOKEN}" \
                  --server="https://${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT_HTTPS}" \
                  --certificate-authority=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt \
                  "$@"
              }
              for _ in $(seq 1 90); do
                host="$(oc_cmd get route plane-web -n "${POD_NAMESPACE}" -o jsonpath='{.spec.host}' 2>/dev/null || true)"
                if [ -n "${host}" ]; then
                  break
                fi
                sleep 5
              done
              if [ -z "${host:-}" ]; then
                echo "plane-web route host not available"
                exit 1
              fi
              web_url="https://${host}"
              oc_cmd patch configmap plane-app-vars -n "${POD_NAMESPACE}" --type merge -p "{\"data\":{\"APP_BASE_URL\":\"${web_url}\",\"WEB_URL\":\"${web_url}\",\"CORS_ALLOWED_ORIGINS\":\"${web_url}\"}}"
              for deployment in plane-admin-wl plane-api-wl plane-live-wl plane-space-wl plane-web-wl; do
                oc_cmd patch deployment "${deployment}" -n "${POD_NAMESPACE}" --type merge -p "{\"spec\":{\"template\":{\"metadata\":{\"annotations\":{\"ims.redhat.com/plane-web-url-ts\":\"$(date +%s)\"}}}}}"
              done
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
