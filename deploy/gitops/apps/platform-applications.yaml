apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ani-namespaces
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  destination:
    namespace: openshift-gitops
    server: https://kubernetes.default.svc
  project: ani-demo
  source:
    path: k8s/overlays/gitops/namespaces
    repoURL: http://gitea-http.gitea.svc.cluster.local:3000/gitadmin/IMS-Anomaly-Detection-with-Red-Hat-OpenShift-AI.git
    targetRevision: release/namespace-argo-split
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
      - SkipDryRunOnMissingResource=true
---
