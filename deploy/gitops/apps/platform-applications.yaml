apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ani-sipp-core
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "15"
spec:
  ignoreDifferences:
    - group: route.openshift.io
      kind: Route
      jsonPointers:
        - /metadata/annotations/openshift.io~1host.generated
        - /spec/host
    - group: apps
      kind: Deployment
      jqPathExpressions:
        - .spec.template.spec.containers[].image
        - .spec.template.spec.initContainers[]?.image
    - group: apps
      kind: Deployment
      name: ims-scscf
      namespace: ani-sipp
      jsonPointers:
        - /spec/replicas
    - group: apps
      kind: Deployment
      name: ims-pcscf
      namespace: ani-sipp
      jsonPointers:
        - /metadata/annotations/ani.demo~1rate-limit-review
  destination:
    namespace: ani-sipp
    server: https://kubernetes.default.svc
  project: ani-demo
  source:
    path: k8s/overlays/gitops/sipp-core
    repoURL: http://gitea-http.gitea.svc.cluster.local:3000/gitadmin/IMS-Anomaly-Detection-with-Red-Hat-OpenShift-AI.git
    targetRevision: release/namespace-argo-split
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
      - SkipDryRunOnMissingResource=true
---
