apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ani-datascience
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  ignoreDifferences:
    - group: route.openshift.io
      kind: Route
      jsonPointers:
        - /metadata/annotations/openshift.io~1host.generated
        - /spec/host
    - group: serving.kserve.io
      kind: InferenceService
      jsonPointers:
        - /metadata/annotations/ani-demo~1refresh-ts
        - /metadata/annotations/ani-demo~1runtime-fix-ts
        - /metadata/annotations/ani-demo~1storage-fix-ts
        - /metadata/annotations/ani-demo~1zero-cpu-ts
        - /metadata/finalizers
        - /spec/predictor/automountServiceAccountToken
        - /spec/predictor/model/name
  destination:
    namespace: ani-datascience
    server: https://kubernetes.default.svc
