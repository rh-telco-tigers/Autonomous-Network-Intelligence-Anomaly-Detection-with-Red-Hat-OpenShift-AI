apiVersion: batch/v1
kind: Job
metadata:
  name: argocd-bootstrap-application
  namespace: openshift-gitops
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: argocd-bootstrap
      containers:
        - name: bootstrap
          image: quay.io/openshift/origin-cli:4.21
          command:
            - /bin/bash
            - -lc
            - |
              set -euo pipefail
              wait_for_application() {
                local name="$1"
                local timeout_seconds="${2:-1800}"
                local deadline=$(( $(date +%s) + timeout_seconds ))
                while true; do
                  local sync_status health_status
                  sync_status="$(oc get application.argoproj.io "${name}" -n openshift-gitops -o jsonpath='{.status.sync.status}' 2>/dev/null || true)"
                  health_status="$(oc get application.argoproj.io "${name}" -n openshift-gitops -o jsonpath='{.status.health.status}' 2>/dev/null || true)"
                  if [ "${sync_status}" = "Synced" ] && [ "${health_status}" = "Healthy" ]; then
                    break
                  fi
                  if [ "$(date +%s)" -ge "${deadline}" ]; then
                    oc get application.argoproj.io "${name}" -n openshift-gitops -o yaml || true
                    echo "Timed out waiting for application ${name} to become Synced/Healthy" >&2
                    exit 1
                  fi
                  sleep 15
                done
              }
              wait_for_crd() {
                local name="$1"
                local timeout_seconds="${2:-1800}"
                local deadline=$(( $(date +%s) + timeout_seconds ))
                until oc get crd "${name}" >/dev/null 2>&1; do
                  if [ "$(date +%s)" -ge "${deadline}" ]; then
                    echo "Timed out waiting for CRD ${name}" >&2
                    exit 1
                  fi
                  sleep 15
                done
              }
              wait_for_rollout() {
                local resource="$1"
                local timeout_seconds="${2:-600}"
                local deadline=$(( $(date +%s) + timeout_seconds ))
                until oc get "${resource}" -n openshift-gitops >/dev/null 2>&1; do
                  if [ "$(date +%s)" -ge "${deadline}" ]; then
                    echo "Timed out waiting for ${resource} to exist" >&2
                    exit 1
                  fi
                  sleep 10
                done
                oc rollout status "${resource}" -n openshift-gitops --timeout="${timeout_seconds}s"
              }
              until oc get argocd openshift-gitops -n openshift-gitops >/dev/null 2>&1; do
                sleep 10
              done
              oc apply -f /manifests/openshift-gitops-tuning.yaml
              wait_for_rollout deployment/openshift-gitops-dex-server 600
              wait_for_rollout statefulset/openshift-gitops-application-controller 600
              for _ in $(seq 1 30); do
                if oc get deployment cluster -n openshift-gitops >/dev/null 2>&1; then
                  oc patch deployment cluster -n openshift-gitops --type=json -p='[{"op":"replace","path":"/spec/template/spec/containers/0/resources/requests/cpu","value":"5m"},{"op":"replace","path":"/spec/template/spec/containers/0/resources/requests/memory","value":"32Mi"},{"op":"replace","path":"/spec/template/spec/containers/0/resources/limits/cpu","value":"100m"},{"op":"replace","path":"/spec/template/spec/containers/0/resources/limits/memory","value":"64Mi"}]'
                fi
                if oc get deployment gitops-plugin -n openshift-gitops >/dev/null 2>&1; then
                  oc patch deployment gitops-plugin -n openshift-gitops --type=json -p='[{"op":"replace","path":"/spec/template/spec/containers/0/resources/requests/cpu","value":"5m"},{"op":"replace","path":"/spec/template/spec/containers/0/resources/requests/memory","value":"32Mi"},{"op":"replace","path":"/spec/template/spec/containers/0/resources/limits/cpu","value":"100m"},{"op":"replace","path":"/spec/template/spec/containers/0/resources/limits/memory","value":"64Mi"}]'
                  break
                fi
                sleep 5
              done
              oc apply -f /manifests/ims-demo-project.yaml
              oc apply -f /manifests/operators-application.yaml
              wait_for_application ims-demo-operators 1800
              for crd in \
                datascienceclusters.datasciencecluster.opendatahub.io \
                datasciencepipelinesapplications.datasciencepipelinesapplications.opendatahub.io \
                featurestores.feast.dev \
                inferenceservices.serving.kserve.io \
                servingruntimes.serving.kserve.io \
                kafkas.kafka.strimzi.io \
                kafkanodepools.kafka.strimzi.io \
                kafkatopics.kafka.strimzi.io; do
                wait_for_crd "${crd}" 1800
              done
              oc apply -f /manifests/platform-application.yaml
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: manifests
              mountPath: /manifests
      volumes:
        - name: manifests
          configMap:
            name: argocd-bootstrap-manifests
