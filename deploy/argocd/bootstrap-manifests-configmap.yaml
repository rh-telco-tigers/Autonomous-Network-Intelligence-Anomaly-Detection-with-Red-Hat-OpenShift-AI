apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-bootstrap-manifests
  namespace: openshift-gitops
data:
  ims-demo-project.yaml: |
    apiVersion: argoproj.io/v1alpha1
    kind: AppProject
    metadata:
      name: ims-demo
      namespace: openshift-gitops
    spec:
      clusterResourceWhitelist:
        - group: '*'
          kind: '*'
      destinations:
        - namespace: '*'
          server: https://kubernetes.default.svc
      namespaceResourceWhitelist:
        - group: '*'
          kind: '*'
      sourceRepos:
        - http://gitea-http.gitea.svc.cluster.local:3000/gitadmin/IMS-Anomaly-Detection-with-Red-Hat-OpenShift-AI.git
  openshift-gitops-tuning.yaml: |
    apiVersion: argoproj.io/v1beta1
    kind: ArgoCD
    metadata:
      name: openshift-gitops
      namespace: openshift-gitops
    spec:
      applicationSet:
        resources:
          limits:
            cpu: 100m
            memory: 128Mi
          requests:
            cpu: 5m
            memory: 32Mi
      controller:
        resources:
          limits:
            cpu: 100m
            memory: 2Gi
          requests:
            cpu: 5m
            memory: 512Mi
      rbac:
        defaultPolicy: role:readonly
        policy: |
          g, admin, role:admin
          g, system:cluster-admins, role:admin
          g, cluster-admins, role:admin
          g, system:authenticated, role:readonly
        scopes: '[groups]'
      redis:
        resources:
          limits:
            cpu: 100m
            memory: 64Mi
          requests:
            cpu: 5m
            memory: 32Mi
      repo:
        resources:
          limits:
            cpu: 100m
            memory: 128Mi
          requests:
            cpu: 5m
            memory: 32Mi
      server:
        resources:
          limits:
            cpu: 100m
            memory: 128Mi
          requests:
            cpu: 5m
            memory: 32Mi
      sso:
        dex:
          resources:
            limits:
              cpu: 100m
              memory: 64Mi
            requests:
              cpu: 5m
              memory: 32Mi
  operators-application.yaml: |
    apiVersion: argoproj.io/v1alpha1
    kind: Application
    metadata:
      name: ims-demo-operators
      namespace: openshift-gitops
    spec:
      destination:
        namespace: openshift-gitops
        server: https://kubernetes.default.svc
      project: ims-demo
      source:
        path: deploy/gitops/operators
        repoURL: http://gitea-http.gitea.svc.cluster.local:3000/gitadmin/IMS-Anomaly-Detection-with-Red-Hat-OpenShift-AI.git
        targetRevision: main
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
  platform-application.yaml: |
    apiVersion: argoproj.io/v1alpha1
    kind: Application
    metadata:
      name: ims-demo-platform
      namespace: openshift-gitops
    spec:
      ignoreDifferences:
        - group: route.openshift.io
          kind: Route
          jsonPointers:
            - /metadata/annotations/openshift.io~1host.generated
            - /spec/host
        - group: serving.kserve.io
          kind: InferenceService
          jsonPointers:
            - /metadata/annotations/ims-demo~1refresh-ts
            - /metadata/annotations/ims-demo~1runtime-fix-ts
            - /metadata/annotations/ims-demo~1storage-fix-ts
            - /metadata/annotations/ims-demo~1zero-cpu-ts
            - /metadata/finalizers
            - /spec/predictor/automountServiceAccountToken
            - /spec/predictor/model/name
      destination:
        namespace: ims-demo-lab
        server: https://kubernetes.default.svc
      project: ims-demo
      source:
        path: k8s/overlays/demo
        repoURL: http://gitea-http.gitea.svc.cluster.local:3000/gitadmin/IMS-Anomaly-Detection-with-Red-Hat-OpenShift-AI.git
        targetRevision: main
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - RespectIgnoreDifferences=true
          - SkipDryRunOnMissingResource=true
