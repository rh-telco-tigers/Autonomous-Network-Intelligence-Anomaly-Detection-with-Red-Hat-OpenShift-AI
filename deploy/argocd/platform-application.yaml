apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ims-demo-platform
  namespace: openshift-gitops
spec:
  ignoreDifferences:
    - group: route.openshift.io
      kind: Route
      jsonPointers:
        - /metadata/annotations/openshift.io~1host.generated
        - /spec/host
    - group: serving.kserve.io
      kind: InferenceService
      jsonPointers:
        - /metadata/annotations/ims-demo~1refresh-ts
        - /metadata/annotations/ims-demo~1runtime-fix-ts
        - /metadata/annotations/ims-demo~1storage-fix-ts
        - /metadata/annotations/ims-demo~1zero-cpu-ts
        - /metadata/finalizers
        - /spec/predictor/automountServiceAccountToken
        - /spec/predictor/model/name
  destination:
    namespace: ims-demo-lab
    server: https://kubernetes.default.svc
  project: ims-demo
  source:
    path: k8s/overlays/demo
    repoURL: http://gitea-http.gitea.svc.cluster.local:3000/gitadmin/IMS-Anomaly-Detection-with-Red-Hat-OpenShift-AI.git
    targetRevision: main
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
      - SkipDryRunOnMissingResource=true
